<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>AI 利活用カリキュラム — ハンズオン版</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
:root{
  --c-bg:#fff; --c-ink:#202124; --c-ink-2:#5f6368; --c-line:#dadce0;
  --c-primary:#1a73e8; --c-primary-d:#174ea6;
  --c-good:#137333; --c-good-bg:#e6f4ea; --c-good-bd:#34a853;
  --c-warn:#b06000; --c-warn-bg:#fef7e0; --c-warn-bd:#fbbc04;
  --c-danger:#a50e0e; --c-danger-bg:#fdecea; --c-danger-bd:#ea4335;
  --c-info-bg:#e8f0fe; --c-info-bd:#1a73e8;
  --c-card:#fafbfc;
  --c-sec-A:#1967d2; --c-sec-B:#137333; --c-sec-C:#b06000; --c-sec-D:#5e35b1;
}
*{box-sizing:border-box}
body{font-family:'Noto Sans JP','Hiragino Sans',sans-serif;margin:0;padding:0;background:#f1f3f4;color:var(--c-ink);line-height:1.7;}
code{font-family:Menlo,Consolas,monospace;background:#f1f3f4;padding:1px 6px;border-radius:3px;font-size:0.92em;}
pre{background:#f8f9fa;border:1px solid var(--c-line);border-radius:6px;padding:14px;overflow-x:auto;font-size:13px;line-height:1.55;white-space:pre-wrap;}
h1{margin:0 0 8px;font-size:24px;}
h2{margin:24px 0 10px;font-size:18px;border-left:4px solid var(--c-primary);padding-left:10px;color:var(--c-primary-d);}
h3{margin:18px 0 8px;font-size:15px;color:var(--c-ink);}
p{margin:8px 0 12px;}
.wrap{display:grid;grid-template-columns:280px 1fr;min-height:100vh;}

aside.nav{background:#fff;border-right:1px solid var(--c-line);padding:20px 16px;position:sticky;top:0;height:100vh;overflow-y:auto;}
aside.nav h1{font-size:14px;letter-spacing:1px;color:var(--c-primary-d);}
aside.nav .progress{font-size:11px;color:var(--c-ink-2);margin-bottom:14px;}
aside.nav .progress-bar{height:6px;background:#e8eaed;border-radius:999px;overflow:hidden;margin-top:4px;}
aside.nav .progress-bar > div{height:100%;background:var(--c-primary);transition:width .3s;}
aside.nav ul{list-style:none;margin:0;padding:0;}
aside.nav li.mod{margin:18px 0 6px;font-size:11px;color:var(--c-ink-2);letter-spacing:1px;}
aside.nav li.les{margin:0;}
aside.nav a.lesson{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--c-ink);text-decoration:none;}
aside.nav a.lesson:hover{background:#f1f3f4;}
aside.nav a.lesson.active{background:var(--c-info-bg);color:var(--c-primary-d);font-weight:600;}
aside.nav a.lesson .mark{font-size:11px;color:var(--c-good);}

main{padding:32px 48px;max-width:880px;}
.lesson-card{background:#fff;border:1px solid var(--c-line);border-radius:8px;padding:24px 28px;margin-bottom:20px;}
.lesson-card .meta{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--c-line);padding-bottom:10px;margin-bottom:14px;}
.lesson-card .meta .id{font-family:Menlo,monospace;font-size:11px;color:var(--c-ink-2);}
.lesson-card .meta .duration{font-size:11px;color:var(--c-ink-2);}
.tag{display:inline-block;padding:1px 8px;border-radius:999px;font-size:10px;font-weight:600;letter-spacing:1px;margin-right:6px;}
.tag.A{background:#e8f0fe;color:var(--c-sec-A);}
.tag.B{background:#e6f4ea;color:var(--c-sec-B);}
.tag.C{background:#fef7e0;color:var(--c-sec-C);}
.tag.D{background:#f3e8fd;color:var(--c-sec-D);}

.callout{border-left:4px solid var(--c-line);border-radius:0 6px 6px 0;padding:10px 14px;margin:14px 0;font-size:14px;background:var(--c-card);}
.callout.info{border-color:var(--c-info-bd);background:var(--c-info-bg);}
.callout.good{border-color:var(--c-good-bd);background:var(--c-good-bg);}
.callout.warn{border-color:var(--c-warn-bd);background:var(--c-warn-bg);}
.callout.danger{border-color:var(--c-danger-bd);background:var(--c-danger-bg);}
.callout h3{margin:0 0 6px;font-size:13px;}

table.matrix{width:100%;border-collapse:collapse;font-size:13px;margin:10px 0;}
table.matrix th,table.matrix td{border:1px solid var(--c-line);padding:8px 10px;text-align:left;vertical-align:top;}
table.matrix th{background:#f1f3f4;font-weight:600;}
table.matrix .ok{color:var(--c-good);font-weight:700;}
table.matrix .ng{color:var(--c-danger);font-weight:700;}
table.matrix .caution{color:var(--c-warn);font-weight:700;}

.exercise{background:#fff;border:2px dashed var(--c-primary);border-radius:8px;padding:20px;margin-top:18px;}
.exercise .ex-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.exercise .ex-head .ex-label{font-weight:700;color:var(--c-primary-d);font-size:13px;letter-spacing:1px;}
.exercise .ex-head .ex-type{font-size:11px;color:var(--c-ink-2);background:#f1f3f4;padding:2px 8px;border-radius:999px;}

.q-block{margin:14px 0;border:1px solid var(--c-line);border-radius:6px;padding:14px;background:#fff;}
.q-block .q-prompt{font-weight:600;margin-bottom:10px;font-size:14px;}
.q-block .opts label{display:block;padding:8px 12px;border:1px solid var(--c-line);border-radius:6px;margin-bottom:6px;cursor:pointer;font-size:13px;line-height:1.55;}
.q-block .opts label:hover{background:#f8f9fa;}
.q-block .opts label.sel{background:var(--c-info-bg);border-color:var(--c-info-bd);}
.q-block .opts label.right{background:var(--c-good-bg);border-color:var(--c-good-bd);}
.q-block .opts label.wrong{background:var(--c-danger-bg);border-color:var(--c-danger-bd);}
.q-block .opts label.miss{background:#fffde7;border-color:var(--c-warn-bd);}
.q-block input[type=checkbox]{margin-right:8px;}
.q-block .explain{margin-top:10px;font-size:13px;color:var(--c-ink-2);background:#f8f9fa;padding:8px 12px;border-radius:6px;line-height:1.6;display:none;}
.q-block.graded .explain{display:block;}

.prompt-task .scenario{background:#fff8e1;border-left:4px solid var(--c-warn-bd);padding:10px 14px;margin-bottom:10px;border-radius:0 6px 6px 0;font-size:13px;line-height:1.7;}
.prompt-task textarea{width:100%;min-height:220px;padding:12px;border:1px solid var(--c-line);border-radius:6px;font-family:'Noto Sans JP','Hiragino Sans',sans-serif;font-size:13px;line-height:1.7;resize:vertical;}
.prompt-task .rubric-result{margin-top:14px;font-size:13px;}
.rubric-row{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--c-line);}
.rubric-row:last-child{border-bottom:none;}
.rubric-row .r-name{flex:0 0 150px;font-weight:600;font-size:12px;}
.rubric-row .r-bar{flex:1;height:8px;background:#e8eaed;border-radius:999px;overflow:hidden;margin:0 14px;}
.rubric-row .r-bar > div{height:100%;background:var(--c-primary);transition:width .3s;}
.rubric-row .r-bar > div.full{background:var(--c-good-bd);}
.rubric-row .r-bar > div.partial{background:var(--c-warn-bd);}
.rubric-row .r-bar > div.none{background:var(--c-danger-bd);}
.rubric-row .r-score{flex:0 0 60px;text-align:right;font-family:Menlo,monospace;font-size:12px;}
.rubric-detail{padding:6px 12px 10px 30px;font-size:12px;color:var(--c-ink-2);line-height:1.6;background:#fafbfc;}
.rubric-detail .hit{color:var(--c-good);}
.rubric-detail .miss{color:var(--c-danger);}
.example-prompt{display:none;background:#f8f9fa;border-left:4px solid var(--c-good-bd);padding:12px 14px;margin-top:14px;border-radius:0 6px 6px 0;}
.example-prompt h3{margin:0 0 6px;font-size:13px;color:var(--c-good);}
.example-prompt pre{background:#fff;}

button{font-family:inherit;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:600;}
button.primary{background:var(--c-primary);color:#fff;}
button.primary:hover{background:var(--c-primary-d);}
button.ghost{background:transparent;color:var(--c-primary);border:1px solid var(--c-line);}
button.ghost:hover{background:#f1f3f4;}
button.complete{background:var(--c-good-bd);color:#fff;}
button.complete:hover{filter:brightness(0.95);}
button.complete.done{background:var(--c-good);}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;gap:10px;flex-wrap:wrap;}

.mod-hero{background:linear-gradient(135deg,var(--c-primary),var(--c-primary-d));color:#fff;padding:30px;border-radius:8px;margin-bottom:24px;}
.mod-hero h1{font-size:22px;margin-bottom:8px;}
.mod-hero p{font-size:14px;line-height:1.7;opacity:0.95;margin:0;}
.mod-hero .pill{display:inline-block;background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:999px;font-size:11px;letter-spacing:1px;margin-bottom:8px;}

.welcome{background:#fff;border-radius:8px;padding:40px;margin-bottom:24px;}
.welcome h1{font-size:28px;color:var(--c-primary-d);}
.welcome .lead{font-size:15px;line-height:1.8;}
.welcome .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 0;}
.welcome .stat{background:#fafbfc;border:1px solid var(--c-line);border-radius:6px;padding:14px;text-align:center;}
.welcome .stat .num{font-size:22px;font-weight:700;color:var(--c-primary);}
.welcome .stat .lbl{font-size:11px;color:var(--c-ink-2);margin-top:4px;}
.welcome ul{list-style:none;padding:0;}
.welcome ul li{padding:12px 14px;border:1px solid var(--c-line);border-radius:6px;margin-bottom:8px;background:#fafbfc;}

.topbar{background:#fff;border-bottom:1px solid var(--c-line);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;}
.topbar .title{font-weight:700;color:var(--c-primary-d);font-size:14px;}
.topbar .right{display:flex;gap:8px;}

@media (max-width:900px){
  .wrap{grid-template-columns:1fr;}
  aside.nav{position:relative;height:auto;border-right:none;border-bottom:1px solid var(--c-line);}
  main{padding:20px;}
  .welcome .stat-grid{grid-template-columns:repeat(2,1fr);}
}
@media print{
  aside.nav,.topbar,button{display:none;}
  .wrap{grid-template-columns:1fr;}
  main{padding:0;}
  .lesson-card{break-inside:avoid;}
}
</style>
</head>
<body>
<div class="topbar">
  <div class="title">📚 AI 利活用カリキュラム(ハンズオン版)</div>
  <div class="right">
    <button class="ghost" onclick="resetProgress()">進捗をリセット</button>
    <button class="ghost" onclick="window.print()">印刷 / PDF</button>
  </div>
</div>

<div class="wrap">
<aside class="nav">
  <h1>カリキュラム</h1>
  <div class="progress">
    <span id="progressLabel">進捗 0/0</span>
    <div class="progress-bar"><div id="progressFill" style="width:0%"></div></div>
  </div>
  <ul id="navList"></ul>
</aside>
<main id="main"></main>
</div>

<script>
const CURRICULUM = [
  {
    id:'m0', title:'はじめに',
    intro:'このカリキュラムは社内 AI アセスメントで問われる全領域を業務文脈で実践しながら学ぶ教材です。各レッスンは説明とハンズオン演習で構成され、プロンプト作成課題はブラウザでルーブリック採点されます。',
    lessons:[
      {
        id:'l0-1', title:'このカリキュラムについて', duration:'3分',
        content:`
<p>本カリキュラムは下記の 5 モジュール構成です。アセスメントの全領域(A〜D)に対応します。</p>
<table class="matrix">
<tr><th>モジュール</th><th>対応アセスメント</th><th>内容</th></tr>
<tr><td>1. AI 基礎理解</td><td><span class="tag A">Section A</span></td><td>LLM の仕組み、ハルシネーション対策、情報セキュリティ、プロンプト 5 要素、NotebookLM 特性、ラクスガイドライン</td></tr>
<tr><td>2. 業務活用判断</td><td><span class="tag B">Section B</span></td><td>議事録抽出、メール起案、提案資料作成、ツール選択、業務自動化の境界</td></tr>
<tr><td>3. マネジメント応用</td><td><span class="tag C">Section C</span></td><td>1on1・評価・組織課題、数値マネジメント・ピープルマネジメント</td></tr>
<tr><td>4. プロンプト設計演習</td><td><span class="tag D">Section D</span></td><td>業務シナリオ別プロンプト記述、ブラウザでルーブリック自動採点</td></tr>
<tr><td>5. アセスメント受験準備</td><td>—</td><td>試験の構成・時間配分・取り組み方</td></tr>
</table>
<h3>学び方</h3>
<p>左サイドバーから読みたいレッスンに移動できます。各レッスン末尾の「完了にする」ボタンで進捗(画面左上のバー)に反映。進捗はブラウザに保存され、次回継続できます。</p>
<div class="callout info"><b>💡 推奨される学習順序</b><br>初学者はモジュール 1 から順に進めることを推奨。プロンプト演習(モジュール 4)はモジュール 1 のプロンプト 5 要素を読んでから取り組むと効果的です。</div>`,
      },
      {
        id:'l0-2', title:'対応するアセスメントの全体像', duration:'3分',
        content:`
<table class="matrix">
<tr><th>セクション</th><th>内容</th><th>形式</th><th>配点</th></tr>
<tr><td><span class="tag A">A</span></td><td>L1 基礎理解(7 問)</td><td>複数選択</td><td>14 点</td></tr>
<tr><td><span class="tag B">B</span></td><td>L2 業務活用判断(10 問)</td><td>複数選択</td><td>30 点</td></tr>
<tr><td><span class="tag C">C</span></td><td>L3 マネジメント応用(3 問 / 管理職オンボは 5 問)</td><td>複数選択</td><td>15 / 25 点</td></tr>
<tr><td><span class="tag D">D</span></td><td>プロンプト記述(6 問プールから 3 問抽選)</td><td>記述・Gemini 自動採点</td><td>45 点</td></tr>
<tr><td>E</td><td>AI 活用ヒアリング(自由記述)</td><td>記述</td><td>採点対象外</td></tr>
</table>
<p>合格基準:</p>
<ul>
<li><b>及第点</b>: 総合 60% 以上 + セクション D 50% 以上</li>
<li><b>優良</b>: 総合 80% 以上 + セクション D 50% 以上</li>
<li><b>要努力</b>: 上記未満</li>
</ul>
<div class="callout warn">試験時間は <b>60 分</b>(タブを閉じても止まりません)。問題は受験ごとにバリアントが抽選されるので毎回内容が変わります。</div>`,
      },
    ],
  },
  {
    id:'m1', title:'モジュール 1: AI の基礎理解', sectionTag:'A',
    intro:'LLM の動作原理、ハルシネーション対策、情報セキュリティの境界、AI に任せていいタスクの判定、プロンプト 5 要素、NotebookLM、ラクスガイドラインの遵守。アセスメント Section A に対応。',
    lessons:[
      {
        id:'l1-1', title:'1.1 LLM の動作原理を 1 枚絵で理解する', duration:'6分', sectionTag:'A',
        content:`
<p>大規模言語モデル(LLM, 例: Gemini, ChatGPT)は、入力されたテキストに続く単語を「<b>もっとも自然な続き」として確率的に選んでいく</b>仕組みです。検索でも論理推論でもありません。</p>
<h3>4 つの重要事実</h3>
<table class="matrix">
<tr><th>事実</th><th>業務上の含意</th></tr>
<tr><td>① 確率的に単語を選ぶ</td><td>同じ問いでも出力が揺れる。温度パラメータで揺れ幅を調整できる</td></tr>
<tr><td>② コンテキストに強く影響される</td><td>前提を変えると出力傾向が変わる。「Few-shot プロンプト」が効く理由</td></tr>
<tr><td>③ 学習データに含まれない情報は推測で埋める</td><td>固有名詞・数値・最新情報は事実誤り(ハルシネーション)が混じる</td></tr>
<tr><td>④ 検索や論理エンジンを内蔵していない</td><td>「URL を出して」「確信度を出して」と頼んでも検証にはならない</td></tr>
</table>
<div class="callout danger"><b>⚠ よくある誤解</b><br>「Gemini は社内 Drive を検索している」「ChatGPT は最新情報を取りに行っている」「自信があると言ったら本当」「URL があれば信頼できる」 — どれも誤り。</div>
<h3>仕組みの含意 → 行動原則</h3>
<ul>
<li>事実の最終確認は人がやる(一次情報源で裏取り)</li>
<li>固有名詞・数値・日付は AI 単独で確定させない</li>
<li>プロンプトで前提情報を十分与える</li>
<li>同じ問いを言い回しを変えて複数回試し、安定する結論だけ採用候補にする</li>
</ul>`,
        exercise:{
          type:'quiz',
          questions:[{
            prompt:'LLM の動作原理として正しい説明をすべて選びなさい。',
            options:[
              '入力に続く単語を、学習データから得られた確率分布に基づき 1 つずつサンプリングして文章を生成する',
              '内部に Q&A データベースがあり、質問に最も近い登録済み回答を返している',
              '同じ入力でも出力に揺れが生じる(温度パラメータで揺れ幅を制御可能)',
              'インターネットをリアルタイム検索して、必ず最新の事実を取得してから回答する',
              '学習データに少ない領域では、推測で「もっともらしい」回答を返すことがある',
              'モデル内部に「正しい/正しくない」の判定機能があり、不確かな情報は自動で除外される',
            ],
            correctIndices:[0,2,4],
            explanation:'LLM は確率的トークン生成器です。DB 検索でも、Web 検索でも、真偽判定器でもありません。学習データに含まれない / 少ない領域は推測で補完されます。',
          }],
        },
      },
      {
        id:'l1-2', title:'1.2 ハルシネーション対策の実践', duration:'8分', sectionTag:'A',
        content:`
<p><b>ハルシネーション</b>とは、AI が「もっともらしい嘘」を返してしまう現象。学習データに無い、または少ないトピックで特に発生します。</p>
<h3>起きやすい場面</h3>
<ul>
<li>固有名詞(社名・人名・製品名)+ 具体数値を聞いた時</li>
<li>知識カットオフ以降の出来事</li>
<li>Web に書かれていないニッチ領域</li>
<li>「URL を併記して」と頼んだ時(URL ごと幻覚する)</li>
</ul>
<h3>有効な 5 つの対策</h3>
<table class="matrix">
<tr><th>対策</th><th>具体的にやること</th></tr>
<tr><td>一次情報で裏取り</td><td>固有名詞・数値は公式 IR・原典・社内 DB で確認</td></tr>
<tr><td>複数生成して比較</td><td>同じ問いを表現を変えて複数回投げ、安定する結論のみ採用</td></tr>
<tr><td>反証させる</td><td>「この出力に対する最も鋭い反論を 3 つ」を続けて出させ、崩れない部分のみ採用</td></tr>
<tr><td>事実と解釈を分離</td><td>[F]/[I] タグで分けさせ、[F] のみ検証</td></tr>
<tr><td>コンテキストを増やす</td><td>原文・データを渡して、推測で補完する余地を減らす</td></tr>
</table>
<div class="callout danger"><b>⚠ 効果が薄いもの</b><br>「確信度を出して」「URL を出して」「絶対正しい情報だけ書いて」はハルシネーション抑制になりません。AI 自身は自分の確信度や URL の真偽を内省できないためです。</div>`,
        exercise:{
          type:'quiz',
          questions:[{
            prompt:'AI の事実誤り(ハルシネーション)を業務利用で防ぐ行動として、適切なものをすべて選びなさい。',
            options:[

function gradePrompt(text, rubric, forbidden){
  const result = { items:[], total:0, maxTotal:0, forbidden:[] };
  rubric.forEach(r => {
    let hits = 0;
    const matched = [];
    r.patterns.forEach(p => {
      try {
        const re = new RegExp(p, 'i');
        if(re.test(text)){ hits++; matched.push(p); }
      } catch(e){}
    });
    const min = r.minMatch || 1;
    const score = Math.min(1, hits / min);
    const weight = r.weight || 1;
    const earned = score * weight;
    if(!r.optional) result.maxTotal += weight;
    result.total += earned;
    result.items.push({
      id:r.id, name:r.name, weight, score, earned,
      hits, min, matched, hint:r.hint, optional:!!r.optional,
    });
  });
  if(forbidden){
    forbidden.forEach(f => { if(f.pattern.test(text)) result.forbidden.push(f.message); });
  }
  return result;
}

function renderGradingResult(res){
  const totalPct = Math.round((res.total / Math.max(1,res.maxTotal)) * 100);
  let html = `
    <div class="rubric-result">
      <div style="margin-bottom:10px;padding:10px 14px;background:${totalPct >= 80 ? '#e6f4ea' : totalPct >= 60 ? '#fef7e0' : '#fdecea'};border-radius:6px;font-size:14px;">
        <b>採点結果: ${res.total.toFixed(1)} / ${res.maxTotal.toFixed(1)} 点 (${totalPct}%)</b>
        ${totalPct >= 80 ? ' — 優良' : totalPct >= 60 ? ' — 及第点' : ' — 要改善'}
      </div>
  `;
  res.items.forEach(item => {
    const cls = item.score >= 1 ? 'full' : item.score > 0 ? 'partial' : 'none';
    const optTag = item.optional ? ' <small style="color:#5f6368;">(加点)</small>' : '';
    html += `
      <div class="rubric-row">
        <div class="r-name">${escHtml(item.name)}${optTag}</div>
        <div class="r-bar"><div class="${cls}" style="width:${item.score * 100}%"></div></div>
        <div class="r-score">${item.earned.toFixed(1)}/${item.weight}</div>
      </div>
      <div class="rubric-detail">
        ${item.score >= 1
          ? `<span class="hit">✓ 該当: ${item.matched.map(escHtml).join(' / ')}</span>`
          : item.score > 0
            ? `<span>部分検出 (${item.hits}/${item.min}件): ${item.matched.map(escHtml).join(' / ') || '(なし)'}</span><br><small>ヒント: ${escHtml(item.hint)}</small>`
            : `<span class="miss">✗ 未検出</span><br><small>ヒント: ${escHtml(item.hint)}</small>`}
      </div>
    `;
  });
  if(res.forbidden.length){
    html += `<div class="callout danger" style="margin-top:14px;"><b>⚠ 禁止パターンを検出</b><ul style="margin:6px 0 0 18px;">`;
    res.forbidden.forEach(m => { html += `<li>${escHtml(m)}</li>`; });
    html += `</ul></div>`;
  }
  html += `</div>`;
  return html;
}

let currentLessonId = null;
const progress = loadProgress();

function loadProgress(){
  try { return JSON.parse(localStorage.getItem('aiCurriculumProgress') || '{}'); }
  catch(e){ return {}; }
}
function saveProgress(){
  try { localStorage.setItem('aiCurriculumProgress', JSON.stringify(progress)); } catch(e){}
}
function resetProgress(){
  if(!confirm('進捗をすべてリセットします。よろしいですか?')) return;
  Object.keys(progress).forEach(k => delete progress[k]);
  saveProgress();
  renderNav();
  renderCurrentLesson();
}
function escHtml(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function countAllLessons(){
  let n = 0;
  CURRICULUM.forEach(m => { n += (m.lessons || []).length; });
  return n;
}
function countCompleted(){
  return Object.values(progress).filter(v => v === true).length;
}

function renderNav(){
  const ul = document.getElementById('navList');
  ul.innerHTML = '';
  CURRICULUM.forEach(mod => {
    const liMod = document.createElement('li');
    liMod.className = 'mod';
    liMod.textContent = mod.title;
    ul.appendChild(liMod);
    (mod.lessons || []).forEach(les => {
      const liLes = document.createElement('li');
      liLes.className = 'les';
      const a = document.createElement('a');
      a.className = 'lesson' + (les.id === currentLessonId ? ' active' : '');
      a.href = '#' + les.id;
      a.onclick = (e) => { e.preventDefault(); navigateTo(les.id); };
      a.innerHTML = `<span>${escHtml(les.title)}</span>${progress[les.id] ? '<span class="mark">✓</span>' : ''}`;
      liLes.appendChild(a);
      ul.appendChild(liLes);
    });
  });
  const total = countAllLessons();
  const done = countCompleted();
  document.getElementById('progressLabel').textContent = `進捗 ${done}/${total} (${Math.round(done/total*100)}%)`;
  document.getElementById('progressFill').style.width = (done / total * 100) + '%';
}

function findLesson(id){
  for(const mod of CURRICULUM){
    for(const les of (mod.lessons || [])){
      if(les.id === id) return { mod, les };
    }
  }
  return null;
}
function getAdjacent(id){
  const flat = [];
  CURRICULUM.forEach(m => (m.lessons || []).forEach(l => flat.push(l.id)));
  const i = flat.indexOf(id);
  return { prev: i > 0 ? flat[i-1] : null, next: i < flat.length-1 ? flat[i+1] : null };
}

function navigateTo(id){
  currentLessonId = id;
  if(id) history.replaceState(null, '', '#' + id);
  else history.replaceState(null, '', '#');
  renderNav();
  renderCurrentLesson();
  window.scrollTo(0, 0);
}

function renderCurrentLesson(){
  const main = document.getElementById('main');
  if(!currentLessonId){ renderWelcome(); return; }
  const found = findLesson(currentLessonId);
  if(!found){ renderWelcome(); return; }
  const { mod, les } = found;
  const { prev, next } = getAdjacent(currentLessonId);

  let html = `
    <div class="mod-hero">
      <div class="pill">${escHtml(mod.title)}</div>
      <h1>${escHtml(les.title)}${les.sectionTag ? ` <span class="tag ${les.sectionTag}" style="vertical-align:middle;">Section ${les.sectionTag}</span>` : ''}</h1>
      <p>${escHtml(mod.intro || '')}</p>
    </div>
    <div class="lesson-card">
      <div class="meta">
        <div class="id">${escHtml(les.id)}</div>
        ${les.duration ? `<div class="duration">⏱ 所要 ${escHtml(les.duration)}</div>` : ''}
      </div>
      ${les.content || ''}
  `;
  if(les.exercise) html += renderExercise(les.exercise, les.id);

  html += `
      <div class="actions">
        ${prev ? `<button class="ghost" onclick="navigateTo('${prev}')">← 前のレッスン</button>` : '<div></div>'}
        <button class="complete ${progress[les.id] ? 'done' : ''}" onclick="toggleComplete('${les.id}')">${progress[les.id] ? '✓ 完了済み — もう一度学ぶ' : 'このレッスンを完了にする'}</button>
        ${next ? `<button class="primary" onclick="navigateTo('${next}')">次のレッスン →</button>` : '<button class="primary" onclick="navigateTo(null)">トップへ戻る</button>'}
      </div>
    </div>
  `;
  main.innerHTML = html;
}

function renderExercise(ex, lessonId){
  if(ex.type === 'quiz'){
    let h = `<div class="exercise"><div class="ex-head"><span class="ex-label">🧠 ハンズオン演習</span><span class="ex-type">理解確認クイズ</span></div>`;
    ex.questions.forEach((q, qi) => {
      h += `<div class="q-block" id="q-${lessonId}-${qi}">
        <div class="q-prompt">${escHtml(q.prompt)}</div>
        <div class="opts">
          ${q.options.map((opt, oi) => `
            <label data-q="${qi}" data-o="${oi}" onclick="toggleOpt(this)">
              <input type="checkbox"> ${escHtml(opt)}
            </label>
          `).join('')}
        </div>
        <div class="explain"><b>解説:</b> ${escHtml(q.explanation)}</div>
      </div>`;
    });
    h += `<div class="actions"><button class="primary" onclick="gradeQuiz('${lessonId}')">採点する</button><button class="ghost" onclick="resetQuiz('${lessonId}')">リセット</button></div></div>`;
    return h;
  }
  if(ex.type === 'prompt'){
    return `<div class="exercise prompt-task">
      <div class="ex-head"><span class="ex-label">✍️ ハンズオン演習</span><span class="ex-type">プロンプト作成 + 自動採点</span></div>
      <div class="scenario">${ex.scenario}</div>
      <textarea id="prompt-${lessonId}" placeholder="この業務状況に対する初期プロンプトをここに記述してください。役割・背景・依頼・制約・出力形式の 5 要素を盛り込むと採点が高くなります。"></textarea>
      <div class="actions" style="margin-top:10px;">
        <button class="primary" onclick="gradePromptUI('${lessonId}')">採点する</button>
        <button class="ghost" onclick="showExample('${lessonId}')">模範プロンプト例を見る</button>
        <button class="ghost" onclick="document.getElementById('prompt-${lessonId}').value=''">クリア</button>
      </div>
      <div id="grading-${lessonId}"></div>
      <div class="example-prompt" id="example-${lessonId}">
        <h3>📘 模範プロンプト例</h3>
        <pre>${escHtml(ex.example || '')}</pre>
      </div>
    </div>`;
  }
  return '';
}

function toggleOpt(lbl){
  setTimeout(()=>{
    const inp = lbl.querySelector('input');
    if(inp.checked) lbl.classList.add('sel');
    else lbl.classList.remove('sel');
  },0);
}

function gradeQuiz(lessonId){
  const found = findLesson(lessonId);
  if(!found) return;
  found.les.exercise.questions.forEach((q, qi) => {
    const block = document.getElementById('q-' + lessonId + '-' + qi);
    if(!block) return;
    block.classList.add('graded');
    const selected = new Set();
    block.querySelectorAll('input:checked').forEach(inp => {
      selected.add(parseInt(inp.closest('label').dataset.o, 10));
    });
    const correct = new Set(q.correctIndices);
    block.querySelectorAll('.opts label').forEach(lbl => {
      const oi = parseInt(lbl.dataset.o, 10);
      lbl.classList.remove('right','wrong','miss');
      const isCorrect = correct.has(oi);
      const isSelected = selected.has(oi);
      if(isCorrect && isSelected) lbl.classList.add('right');
      else if(!isCorrect && isSelected) lbl.classList.add('wrong');
      else if(isCorrect && !isSelected) lbl.classList.add('miss');
    });
  });
}
function resetQuiz(lessonId){
  const found = findLesson(lessonId);
  if(!found) return;
  found.les.exercise.questions.forEach((q, qi) => {
    const block = document.getElementById('q-' + lessonId + '-' + qi);
    if(!block) return;
    block.classList.remove('graded');
    block.querySelectorAll('input').forEach(inp => inp.checked = false);
    block.querySelectorAll('.opts label').forEach(lbl => {
      lbl.classList.remove('right','wrong','miss','sel');
    });
  });
}
function gradePromptUI(lessonId){
  const ta = document.getElementById('prompt-' + lessonId);
  if(!ta) return;
  const text = ta.value;
  if(text.trim().length < 30){
    document.getElementById('grading-' + lessonId).innerHTML = '<div class="callout warn">プロンプトが短すぎます(30 字以上で記述してください)。</div>';
    return;
  }
  const found = findLesson(lessonId);
  if(!found) return;
  const ex = found.les.exercise;
  const result = gradePrompt(text, ex.rubric, ex.forbidden);
  document.getElementById('grading-' + lessonId).innerHTML = renderGradingResult(result);
}
function showExample(lessonId){
  const el = document.getElementById('example-' + lessonId);
  if(el) el.style.display = 'block';
}

function toggleComplete(lessonId){
  progress[lessonId] = !progress[lessonId];
  saveProgress();
  renderNav();
  renderCurrentLesson();
}

  const done = countCompleted();
  const exCount = CURRICULUM.reduce((n,m)=>n + (m.lessons||[]).filter(l=>l.exercise).length, 0);
  main.innerHTML = `
    <div class="welcome">
      <h1>AI 利活用カリキュラム — ハンズオン版</h1>
      <p class="lead">社内 AI アセスメント(昇格試験 / 管理職オンボーディング)で問われる全領域を、ハンズオン演習中心で学ぶための教材です。読むだけでなく、<b>実際にプロンプトを書いてブラウザ上で自動採点</b>される演習をモジュール 4 に 5 つ用意しています。</p>
      <div class="stat-grid">
        <div class="stat"><div class="num">${CURRICULUM.length}</div><div class="lbl">モジュール</div></div>
        <div class="stat"><div class="num">${total}</div><div class="lbl">レッスン</div></div>
        <div class="stat"><div class="num">${exCount}</div><div class="lbl">ハンズオン演習</div></div>
        <div class="stat"><div class="num">${done}/${total}</div><div class="lbl">あなたの進捗</div></div>
      </div>
      <h2>カリキュラム構成</h2>
      <ul>
        ${CURRICULUM.map(m => `
          <li><b>${escHtml(m.title)}</b>${m.sectionTag ? ` <span class="tag ${m.sectionTag}">Section ${m.sectionTag}</span>` : ''}<br>
            <span style="color:#5f6368;font-size:13px;">${escHtml(m.intro || '')}</span>
            <br><small>${(m.lessons || []).length} レッスン</small>
          </li>
        `).join('')}
      </ul>
      <div class="callout info" style="margin-top:24px;">
        <b>💡 おすすめの進め方</b><br>
        モジュール 1 から順に進めるのが推奨ですが、すでに知識がある領域はスキップしても構いません。<b>モジュール 4 のハンズオン演習</b>は本番アセスメント Section D 対策に直結するので必ず取り組んでください。
      </div>
      <div class="actions" style="margin-top:24px;">
        <div></div>
        <button class="primary" onclick="navigateTo('${CURRICULUM[0].lessons[0].id}')">最初のレッスンから始める →</button>
      </div>
    </div>
  `;
}

window.addEventListener('load', () => {
  const hash = location.hash.replace('#', '');
  if(hash) currentLessonId = hash;
  renderNav();
  renderCurrentLesson();
});
window.addEventListener('hashchange', () => {
  const hash = location.hash.replace('#', '');
  if(hash !== currentLessonId){
    currentLessonId = hash || null;
    renderNav();
    renderCurrentLesson();
  }
});
