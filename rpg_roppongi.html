const CBLOCK=new Set(['W','t','p','k','T','Z','R','D','A','Q','E','B','F']);
// 地下鉄駅出入口 (実位置に最寄りの歩道セルへスナップ)
const STATIONS=[
 {x:66,y:78,n:'六本木駅',l:['#b5b5ac','#ce045b']},
 {x:69,y:84,n:'六本木駅',l:['#b5b5ac','#ce045b']},
 {x:22,y:39,n:'乃木坂駅',l:['#00ac9b']},
 {x:123,y:143,n:'麻布十番駅',l:['#ce045b','#00ac9b']},
 {x:190,y:79,n:'神谷町駅',l:['#b5b5ac']},
 {x:180,y:167,n:'赤羽橋駅',l:['#ce045b']},
 {x:240,y:104,n:'御成門駅',l:['#0079c2']},
 {x:141,y:41,n:'六本木一丁目駅',l:['#00ac9b']},
];
(function snapStations(){
 const ok=(x,y)=>{if(x<0||y<0||x>=GW||y>=GH)return false;const c=GRID[y][x];
  if(c!=='.')return false;
  for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]])if('rn'.includes(at(x+dx,y+dy)))return true;
  return false;};
 for(const s of STATIONS){
  if(ok(s.x,s.y))continue;
  outer:
  for(let r=1;r<8;r++)for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
   if(Math.max(Math.abs(dx),Math.abs(dy))!==r)continue;
   if(ok(s.x+dx,s.y+dy)){s.x+=dx;s.y+=dy;break outer;}
  }
 }
})();
const blk=new Uint8Array(GW*GH);
for(let y=0;y<GH;y++)for(let x=0;x<GW;x++)if(CBLOCK.has(GRID[y][x]))blk[y*GW+x]=1;
const SZ={1:[2,2],2:[2,3],3:[3,4],4:[4,6]};
for(const[bx,by,k]of BLDG){const[w,h]=SZ[k];
 for(let yy=by;yy<by+h;yy++)for(let xx=bx;xx<bx+w;xx++)blk[yy*GW+xx]=1;}
for(const s of STATIONS)blk[s.y*GW+s.x]=1;
const blocked=(x,y)=>(x<0||y<0||x>=GW||y>=GH)?1:blk[y*GW+x];
// 信号の設置位置 (bake と 3D ビューで共用)
const SIGNALS=(function(){
 const out=[];
 const JCT=[[66,81],[129,58],[123,107],[175,125],[190,78],[241,103],[179,168],[123,142],[141,40],[133,175]];
 for(const[jx,jy]of JCT){
  let n=0;
  for(let r=2;r<5&&n<2;r++)for(let dy=-r;dy<=r&&n<2;dy++)for(let dx=-r;dx<=r&&n<2;dx++){
   if(Math.max(Math.abs(dx),Math.abs(dy))!==r)continue;
   const x=jx+dx,y=jy+dy;
   if(x<1||y<1||x>=GW-1||y>=GH-1)continue;
   if(GRID[y][x]!=='.')continue;
   let rn=0;for(const[ax,ay]of[[1,0],[-1,0],[0,1],[0,-1]])if(isRoad(at(x+ax,y+ay)))rn++;
   if(rn>=2&&(n===0||(dx*1+dy*2)%2!==0)){out.push([x,y,dx<0]);n++;}
  }
 }
 return out;
})();
// 3D用: セルの内容物マップ (0=なし 1=木 2=針葉樹 3=岩 11-14=ビル 15=モール 16=超高層 23=駅)
const KIND=new Uint8Array(GW*GH);
const KACC={};
for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
 const c=GRID[y][x],i=y*GW+x;
 if(c==='t')KIND[i]=1;else if(c==='p')KIND[i]=2;else if(c==='k')KIND[i]=3;
 else if(c==='R'||c==='D'||c==='A')KIND[i]=16;
 else if(c==='Q'||c==='E'||c==='B'||c==='F'){KIND[i]=15;KACC[i]={Q:'#5a7ab4',E:'#b49a5a',B:'#4a9a6e',F:'#c05a48'}[c];}
}
for(const[bx,by,k]of BLDG){const[w,h]=SZ[k];
 for(let yy=by;yy<by+h;yy++)for(let xx=bx;xx<bx+w;xx++)KIND[yy*GW+xx]=10+k;}
for(const s of STATIONS)KIND[s.y*GW+s.x]=23;
const kindAt=(x,y)=>(x<0||y<0||x>=GW||y>=GH)?13:KIND[y*GW+x];
// ランドマーク中心 (3Dビルボード用)
function centerOf(ch){let x0=1e9,y0=1e9,x1=-1,y1=-1;
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++)if(GRID[y][x]===ch){x0=Math.min(x0,x);y0=Math.min(y0,y);x1=Math.max(x1,x);y1=Math.max(y1,y);}
 return x1<0?null:{x:(x0+x1+1)/2,y:(y0+y1+1)/2,w:x1-x0+1};}
const LM3D=[
 {c:centerOf('T'),k:'tower'},
 {c:centerOf('Z'),k:'zoji'},
 {c:centerOf('i'),k:'gate'},
];

function bake(){
 // ---- pass 1: ground (everything gets a base) ----
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
  const c=GRID[y][x],px=x*TS,py=y*TS,h=hs(x,y,1);
  if(c==='g'||c==='t'){
   mx.fillStyle='#5aa856';mx.fillRect(px,py,TS,TS);
   mx.fillStyle='#529c4e';mx.fillRect(px+((h*73)|0)%12,py+((h*37)|0)%12,3,2);
   if(h<.4){mx.fillStyle='#68b464';mx.fillRect(px+((h*97)|0)%13,py+((h*53)|0)%13,2,2);}
   continue;}
  if(c==='m'||c==='p'||c==='k'){ // 山林の地面
   mx.fillStyle='#4d8a4e';mx.fillRect(px,py,TS,TS);
   mx.fillStyle='#417a44';mx.fillRect(px+((h*73)|0)%12,py+((h*37)|0)%12,4,3);
   if(h<.35){mx.fillStyle='#5d975a';mx.fillRect(px+((h*97)|0)%13,py+((h*53)|0)%13,2,2);}
   if(h<.15){mx.fillStyle='#8a8478';mx.fillRect(px+((h*61)|0)%11,py+((h*29)|0)%11,3,2);}
   continue;}
  if(c==='c'){
   mx.fillStyle='#cbc7ba';mx.fillRect(px,py,TS,TS);
   if(h<.5){mx.fillStyle='#9aa0a2';mx.fillRect(px+4,py+5,5,8);mx.fillStyle='#b8bec0';mx.fillRect(px+4,py+5,5,2);}
   continue;}
  if(c==='W'){mx.fillStyle='#3d7dc8';mx.fillRect(px,py,TS,TS);
   if(h<.35){mx.fillStyle='#6aa4e0';mx.fillRect(px+3+((h*97)|0)%6,py+4+((h*53)|0)%7,6,1);}continue;}
  if(c==='Z'||c==='i'){
   mx.fillStyle='#ddd4be';mx.fillRect(px,py,TS,TS);
   if(h<.4){mx.fillStyle='#d0c7b0';mx.fillRect(px+((h*73)|0)%11,py+((h*37)|0)%11,4,3);}
   continue;}
  // urban ground (also under roads/icons/landmarks)
  mx.fillStyle='#d3cfc4';mx.fillRect(px,py,TS,TS);
  if(h<.3){mx.fillStyle='#c7c3b7';mx.fillRect(px+((h*73)|0)%12,py+((h*37)|0)%12,3,3);}
 }
 // ---- pass 1.5: sidewalk edging around road network ----
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
  if(GRID[y][x]!=='.')continue;
  let adj=false;
  for(const[dx,dy]of[[1,0],[-1,0],[0,1],[0,-1]])if(isRoad(at(x+dx,y+dy))){adj=true;break;}
  if(adj){const px=x*TS,py=y*TS;
   mx.fillStyle='#e0dccd';mx.fillRect(px,py,TS,TS);
   mx.fillStyle='rgba(150,146,134,.5)';
   if(hs(x,y,7)<.5)mx.fillRect(px+7,py+7,2,2);
  }
 }
 // ---- pass 2: roads with rounded corners + curb edging ----
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
  const c=GRID[y][x];if(!isRoad(c))continue;
  const px=x*TS,py=y*TS;
  const U=isRoad(at(x,y-1)),D=isRoad(at(x,y+1)),L=isRoad(at(x-1,y)),R=isRoad(at(x+1,y));
  const rad=7;
  const tl=(!U&&!L)?rad:0, tr=(!U&&!R)?rad:0, br=(!D&&!R)?rad:0, bl=(!D&&!L)?rad:0;
  mx.fillStyle=c==='r'?'#55565c':'#616268';
  mx.beginPath();mx.roundRect(px,py,TS,TS,[tl,tr,br,bl]);mx.fill();
  // asphalt texture
  const h=hs(x,y,2);
  if(h<.14){mx.fillStyle='rgba(255,255,255,.05)';mx.fillRect(px+((h*89)|0)%10,py+((h*41)|0)%12,5,4);}
  // 中央線 (内側セルのみ)
  if(U&&D&&L&&R&&(x+y)%2===0){mx.fillStyle='rgba(240,238,225,.30)';
   mx.fillRect(px+6,py+7,5,2);}
  // curb edging (縁取り)
  mx.strokeStyle='rgba(238,234,220,.75)';mx.lineWidth=2;
  mx.beginPath();
  if(!U){mx.moveTo(px+tl,py+1);mx.lineTo(px+TS-tr,py+1);}
  if(!D){mx.moveTo(px+bl,py+TS-1);mx.lineTo(px+TS-br,py+TS-1);}
  if(!L){mx.moveTo(px+1,py+tl);mx.lineTo(px+1,py+TS-bl);}
  if(!R){mx.moveTo(px+TS-1,py+tr);mx.lineTo(px+TS-1,py+TS-br);}
  mx.stroke();
  // rounded corner arcs
  mx.beginPath();
  if(tl)mx.arc(px+tl,py+tl,tl-1,Math.PI,1.5*Math.PI);
  if(tr)mx.arc(px+TS-tr,py+tr,tr-1,1.5*Math.PI,2*Math.PI);
  if(br)mx.arc(px+TS-br,py+TS-br,br-1,0,.5*Math.PI);
  if(bl)mx.arc(px+bl,py+TS-bl,bl-1,.5*Math.PI,Math.PI);
  mx.stroke();
 }
 // ---- pass 2.5: 商業モール帯 (六本木ヒルズ/ミッドタウン・ガレリア) ----
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
  const c=GRID[y][x];if(c!=='Q'&&c!=='E'&&c!=='B'&&c!=='F')continue;
  const px=x*TS,py=y*TS,h=hs(x,y,8);
  const ac={Q:'#5a7ab4',E:'#b49a5a',B:'#4a9a6e',F:'#c05a48'}[c]; // ヒルズ=青/ミッドタウン=金/麻布台=緑/フットタウン=赤
  const same=(xx,yy)=>at(xx,yy)===c;
  // 屋上ガラスパネル (格子リブ + 天窓 + 屋上庭園)
  mx.fillStyle=h<.5?'#b6bdc9':'#aeb6c2';mx.fillRect(px,py,TS,TS);
  mx.fillStyle='rgba(76,90,110,.45)';mx.fillRect(px,py,1,TS);mx.fillRect(px,py,TS,1);
  mx.fillStyle='rgba(76,90,110,.25)';mx.fillRect(px+8,py,1,TS);mx.fillRect(px,py+8,TS,1);
  if(h<.16){mx.fillStyle='#d8e6f2';mx.fillRect(px+2,py+2,12,12);  // 天窓
   mx.fillStyle='rgba(76,90,110,.4)';mx.fillRect(px+8,py+2,1,12);mx.fillRect(px+2,py+8,12,1);}
  else if(h<.30){mx.fillStyle='#6aa060';mx.fillRect(px+2,py+2,12,12); // 屋上庭園
   mx.fillStyle='#588a50';mx.fillRect(px+4,py+4,3,3);mx.fillRect(px+9,py+8,3,3);}
  else if(h>.88){mx.fillStyle='#9aa0aa';mx.fillRect(px+4,py+4,9,7);   // 屋上設備
   mx.fillStyle='#868c96';mx.fillRect(px+4,py+4,9,2);}
  // 露出辺: 店先ストライプ + 庇
  const edge=(dx,dy,ex,ey,ew,eh)=>{
   if(same(x+dx,y+dy))return;
   mx.fillStyle=ac;mx.fillRect(px+ex,py+ey,ew,eh);
   mx.fillStyle='#f3efe4';
   if(dy!==0){for(let i=2;i<TS-2;i+=5)mx.fillRect(px+i,py+(dy>0?TS-4:1),3,3);}
   else{for(let i=2;i<TS-2;i+=5)mx.fillRect(px+(dx>0?TS-4:1),py+i,3,3);}
  };
  edge(0,1,0,TS-6,TS,6);edge(0,-1,0,0,TS,6);edge(1,0,TS-6,0,6,TS);edge(-1,0,0,0,6,TS);
  // 外周アウトライン
  mx.fillStyle='rgba(30,26,24,.85)';
  if(!same(x,y-1))mx.fillRect(px,py,TS,1);
  if(!same(x,y+1))mx.fillRect(px,py+TS-1,TS,1);
  if(!same(x-1,y))mx.fillRect(px,py,1,TS);
  if(!same(x+1,y))mx.fillRect(px+TS-1,py,1,TS);
 }
 // ---- pass 3: building icons (y-sorted) ----
 const sorted=BLDG.slice().sort((a,b)=>(a[1]+SZ[a[2]][1])-(b[1]+SZ[b[2]][1]));
 for(const[bx,by,k]of sorted)drawIcon(bx*TS,by*TS,k,hs(bx,by,3));
 // ---- pass 4: trees (y-sorted natural overlap) ----
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
  const c=GRID[y][x];
  if(c==='k'){ // 岩
   const px=x*TS,py=y*TS,h=hs(x,y,6);
   mx.fillStyle='#7e786c';mx.beginPath();mx.roundRect(px+1,py+3,14,12,4);mx.fill();
   mx.fillStyle='#98928a';mx.fillRect(px+3,py+4,7,4);
   mx.fillStyle='#5e584e';mx.fillRect(px+3,py+12,10,2);
   if(h<.5){mx.fillStyle='#8e887e';mx.fillRect(px+10,py+7,4,3);}
   mx.strokeStyle='rgba(30,26,24,.7)';mx.lineWidth=1;
   mx.beginPath();mx.roundRect(px+1.5,py+3.5,13,11,4);mx.stroke();
   continue;}
  if(c!=='t'&&c!=='p')continue;
  const h=hs(x,y,4);
  let v;
  if(c==='p')v=h<.62?'pine':(h<.82?'pineS':'tree2'); // 山林は針葉樹主体
  else v=h<.5?'tree':(h<.8?'tree2':(h<.94?'pine':'treeA'));
  T(v,x*TS-8,y*TS-16);
 }
 // ---- pass 5: props ----
 for(let y=0;y<GH;y++)for(let x=0;x<GW;x++){
  if(GRID[y][x]!=='g')continue;if(hs(x,y,5)<.02)T('bench',x*TS,y*TS+2);
 }
 T('fountain',64*TS,49*TS,48,48);
 // ---- pass 6: landmark sprites ----
 const zb=bbox('Z');if(zb)drawZojoji(cxOf(zb),(zb.y1+1)*TS);
 const ib=bbox('i');if(ib){drawSanmon(cxOf(ib),(ib.y1+1)*TS);
  T('statue',cxOf(ib)-46,(ib.y1+1)*TS-18);T('statue2',cxOf(ib)+30,(ib.y1+1)*TS-18);}
 const rb=bbox('R');if(rb)drawMori(cxOf(rb),(rb.y1+1)*TS,(rb.x1-rb.x0+1)*TS);
 const db=bbox('D');if(db)drawMidtown(cxOf(db),(db.y1+1)*TS,(db.x1-db.x0+1)*TS);
 const ab=bbox('A');if(ab)drawAzabudai(cxOf(ab),(ab.y1+1)*TS,(ab.x1-ab.x0+1)*TS);
 const tb=bbox('T');if(tb)drawTower(cxOf(tb),(tb.y1+1)*TS);
 // ---- pass 7: 地下鉄出入口 + 信号 ----
 for(const s of STATIONS)drawStation(s.x*TS,s.y*TS,s.l);
 for(const g of SIGNALS)drawSignal(g[0]*TS,g[1]*TS,g[2]);
}

function bbox(ch){let x0=1e9,y0=1e9,x1=-1,y1=-1;

 return x1<0?null:{x0,y0,x1,y1};}

  mx.moveTo(x-1,y+14);mx.lineTo(x+7,y+2);mx.lineTo(x+25,y+2);mx.lineTo(x+33,y+14);mx.closePath();mx.fill();
  mx.fillStyle='rgba(255,252,240,.35)';mx.fillRect(x+7,y+2,18,2);

 }else if(k===2){ // 中層: 店舗/雑居ビル 32x48

  mx.fillStyle='#e8e4da';mx.fillRect(x,y+4,32,44);

   T('grayWin',x+1+cxx*16,y+11+r*14,14,12);

  outline(x,y+5,48,59,2);
 }else{ // 超高層: ガラスタワー 64x96
  const x=px,y=py;

  mx.fillStyle=g;mx.fillRect(x+2,y+8,60,88);
  for(let r=0;r<5;r++)for(let cxx=0;cxx<4;cxx++)
   T('glassWin',x+2+cxx*15,y+13+r*15,15,13);
  T('glassDoor',x+25,y+84,15,12);
  mx.fillStyle='#4c5870';mx.fillRect(x+2,y+8,60,4);

 }

function drawTower(bx,by){
 const R='#e8543a',W='#f4f0e6',D='#b03a26',H=190,topY=by-H;
 // 脚部アーチ(下1/3は2本脚)
 for(let i=0;i<48;i++){
  const f=i/48,y=topY+58+f*(H-58);
  const hw=6+(44-6)*f*f*1.35+f*10;
  const band=((y-topY)/14|0)%2===0;
  const sh=Math.ceil((H-58)/48)+1;
  mx.fillStyle=band?R:W;
  if(f<.62){mx.fillRect(bx-hw,y,hw*2,sh);
   if(i>6&&i%3!==0){mx.fillStyle='rgba(211,207,196,.5)';mx.fillRect(bx-hw*0.5,y,hw,2);}}
  else{const lw=12+f*6;                       // 2本脚
   mx.fillStyle=R;mx.fillRect(bx-hw,y,lw,sh);mx.fillRect(bx+hw-lw,y,lw,sh);}
 }
 mx.strokeStyle=D;mx.lineWidth=5;mx.beginPath();mx.arc(bx,by-2,30,Math.PI*1.08,Math.PI*1.92);mx.stroke(); // アーチ

 mx.fillStyle='#f8e8b0';for(let i=-20;i<20;i+=6)mx.fillRect(bx+i,topY+87,4,5);
 for(let i=0;i<10;i++){const y=topY+26+i*6;mx.fillStyle=i%2?W:R;mx.fillRect(bx-8-i*0.9,y,(8+i*0.9)*2,6);}
 mx.fillStyle=D;mx.fillRect(bx-11,topY+50,22,4);                 // トップデッキ

}

function cellsAt(hx,hy){
 const cs=[];const x0=hx>>1,y0=hy>>1;
 for(const xx of (hx&1)?[x0,x0+1]:[x0])for(const yy of (hy&1)?[y0,y0+1]:[y0])cs.push([xx,yy]);
 return cs;}
function canGo(hx,hy){
 if(hx<0||hy<0||hx>(GW-1)*2||hy>(GH-1)*2)return false;
 return cellsAt(hx,hy).every(([x,y])=>!blocked(x,y));}
const DIRS={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
const MOVE_MS=85;
function tryMove(d){
 if(P.moving||msgActive)return;
 P.dir=d;const[dx,dy]=DIRS[d];
 const nx=P.hx+dx,ny=P.hy+dy;
 if(!canGo(nx,ny))return;
 P.moving={fx:P.hx,fy:P.hy,tx:nx,ty:ny,t0:performance.now()};}
function frontCell(){const[dx,dy]=DIRS[P.dir];
 return[Math.round(P.hx/2+dx),Math.round(P.hy/2+dy)];}
function warpSafe(x,y){
 for(let r=0;r<10;r++)for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){
  if(Math.max(Math.abs(dx),Math.abs(dy))!==r)continue;
  const xx=x+dx,yy=y+dy;
  if(!blocked(xx,yy)){P.hx=xx*2;P.hy=yy*2;P.moving=null;checkArea();return true;}
 }return false;}

 msgActive=true;curLine=msgQ.shift();

function doA(){
 if(msgActive){nextMsg();return;}
 const[fx,fy]=frontCell();
 const px2=P.hx/2,py2=P.hy/2;
 for(const s of SPOTS){
  const hitF=fx>=s.x&&fx<s.x+s.w&&fy>=s.y&&fy<s.y+s.h;
  const hitP=px2>=s.x-.5&&px2<s.x+s.w+.5&&py2>=s.y-.5&&py2<s.y+s.h+.5;
  if(hitF||hitP){say(s.n,s.t);return;}}
 const c=at(fx,fy);
 if(blocked(fx,fy)&&'.'===c)say('',['ビルの入口だ。','ガラス扉に空が映っている。']);
 else if(c==='W')say('',['水面が光っている。']);
 else if(c==='t')say('',['木々が風に揺れている。']);
 else say('',['2026年、東京。','この街のどこかに「ほころび」がある。']);}

let view3d=false;
const DIRORDER=['up','right','down','left'];
const FWD={up:[0,-1],right:[1,0],down:[0,1],left:[-1,0]};
const RGT={up:[1,0],right:[0,1],down:[-1,0],left:[0,-1]};
const DIRNAME={up:'N',right:'E',down:'S',left:'W'};
function turn(dd){P.dir=DIRORDER[(DIRORDER.indexOf(P.dir)+dd+4)%4];}
let fpAnim=null;
function fpMove(back){
 if(msgActive||fpAnim)return;
 const[fx,fy]=FWD[P.dir];
 const dx=back?-fx:fx,dy=back?-fy:fy;
 if(canGo(P.hx+dx*2,P.hy+dy*2)&&canGo(P.hx+dx,P.hy+dy)){
  fpAnim={type:'move',sgn:back?-1:1,tx:P.hx+dx*2,ty:P.hy+dy*2,t0:performance.now(),dur:210};
 }
}
function snap3d(){
 const c=document.createElement('canvas');c.width=cw;c.height=chh;
 const g=c.getContext('2d');g.imageSmoothingEnabled=false;
 render3d(g,0);return c;
}
function fpTurn(dd){
 if(msgActive||fpAnim)return;
 const a=snap3d();
 turn(dd);
 const b=snap3d();
 fpAnim={type:'turn',sgn:dd,a,b,t0:performance.now(),dur:180};
}
function floorCol(c,d){
 switch(c){
  case 'r':return '#55565c';case 'n':return '#616268';
  case 'g':case 't':return '#5aa856';
  case 'm':case 'p':case 'k':return '#4d8a4e';
  case 'c':return '#cbc7ba';
  case 'W':return '#3d7dc8';
  case 'Z':case 'i':return '#ddd4be';
  default:return '#d3cfc4';
 }
}
function shade(hex,f){ // f<1 で暗く
 const n=parseInt(hex.slice(1),16);
 const r=Math.min(255,((n>>16)&255)*f)|0,g=Math.min(255,((n>>8)&255)*f)|0,b=Math.min(255,(n&255)*f)|0;
 return `rgb(${r},${g},${b})`;
}
function render3d(g,fr){fr=fr||0;
 const cx2=cw/2;
 const hor=chh*0.40;
 const f=cw*0.68, z0=0.9, EYE=0.48;
 const un=d=>1/Math.max(d-fr+z0,0.32);
 const uu=d=>f*un(d);
 const yF=d=>hor+EYE*uu(d);
 const MAXD=10;
 // 空
 const sky=g.createLinearGradient(0,0,0,hor);
 sky.addColorStop(0,'#7ab4e4');sky.addColorStop(1,'#d8ecf8');
 g.fillStyle=sky;g.fillRect(0,0,cw,hor);
 g.fillStyle='rgba(255,255,255,.7)';
 g.fillRect(cw*0.15,hor*0.3,60,10);g.fillRect(cw*0.6,hor*0.5,80,12);g.fillRect(cw*0.4,hor*0.18,50,8);
 // 遠景スカイライン
 g.fillStyle='#a8bed4';
 for(let i=0;i<12;i++){const bw=30+((i*53)%40),bh=18+((i*37)%42);g.fillRect(i*cw/11-10,hor-bh,bw,bh);}
 g.fillStyle='#c2d4e4';g.fillRect(0,hor-6,cw,6);
 const px2=P.hx/2,py2=P.hy/2;
 const[fx,fy]=FWD[P.dir],[rx,ry]=RGT[P.dir];
 const cellAt=(d,s)=>({x:Math.round(px2+fx*d+rx*s),y:Math.round(py2+fy*d+ry*s)});
 // 遠距離ランドマーク (奥→先に描く)
 for(const lm of LM3D){
  if(!lm.c)continue;
  const relx=lm.c.x-px2,rely=lm.c.y-py2;
  const fd=relx*fx+rely*fy, lt=relx*rx+rely*ry;
  if(fd<=MAXD+1||fd>90)continue;
  if(Math.abs(lt)>fd*1.1)continue;
  const w1=0.5*uu(fd);
  drawLM3d(g,lm.k,cx2+lt*2*w1,hor+EYE*uu(fd),w1,0.55);
 }
 // 地面ベース
 g.fillStyle='#8a8880';g.fillRect(0,hor,cw,chh-hor);
 // 床 (遠→近)
 for(let d=MAXD;d>=-1;d--){
  const y0=yF(d+1),y1=yF(d);
  const w0=0.5*uu(d+1),w1=0.5*uu(d);
  const SW=Math.ceil(cx2/w1)+1;
  for(let s=-SW;s<=SW;s++){
   const cc=cellAt(d+1,s);
   const c=at(cc.x,cc.y);
   g.fillStyle=floorCol(c);
   g.beginPath();
   g.moveTo(cx2+(s-0.5)*2*w0,y0);g.lineTo(cx2+(s+0.5)*2*w0,y0);
   g.lineTo(cx2+(s+0.5)*2*w1,y1);g.lineTo(cx2+(s-0.5)*2*w1,y1);
   g.closePath();g.fill();
   if(c==='r'&&s===0&&d%2===0){g.fillStyle='rgba(240,238,225,.5)';
    const mw=w1*0.08;g.fillRect(cx2-mw,(y0+y1)/2-1,mw*2,Math.max(2,(y1-y0)*0.3));}
  }
  // 霞
  g.fillStyle=`rgba(200,216,232,${Math.min(.5,d*0.05)})`;
  g.fillRect(0,y0,cw,y1-y0);
 }
 // 壁・ビルボード (遠→近, 外→中央)
 for(let d=MAXD;d>=0;d--){
  const w1=0.5*uu(d),w0=0.5*uu(d+1);
  const SW=Math.ceil(cx2/w1)+1;
  const fog=Math.min(.55,d*0.055);
  // ランドマークビルボード
  for(const lm of LM3D){
   if(!lm.c)continue;
   const relx=lm.c.x-px2,rely=lm.c.y-py2;
   const fd=relx*fx+rely*fy, lt=relx*rx+rely*ry;
   if(Math.round(fd)!==d+1)continue;
   if(Math.abs(lt)>SW+6)continue;
   drawLM3d(g,lm.k,cx2+lt*2*w1,yF(d),w1,fog);
  }
  // 信号 (この深度にあるものだけ)
  for(const sg of SIGNALS){
   const relx=sg[0]-px2,rely=sg[1]-py2;
   const fd=relx*fx+rely*fy, lt=relx*rx+rely*ry;
   if(Math.round(fd)!==d+1||Math.abs(lt)>SW)continue;
   const bx2=cx2+lt*2*w1,gy=yF(d);
   const ph=w1*2.6;
   g.fillStyle='#4a4e56';g.fillRect(bx2-ph*0.04,gy-ph,ph*0.08,ph);
   g.fillStyle='#2e3238';g.fillRect(bx2-ph*0.3,gy-ph,ph*0.6,ph*0.22);
   const ly=gy-ph+ph*0.05,lw=ph*0.13;
   g.fillStyle='#1cc86a';g.fillRect(bx2-ph*0.24,ly,lw,lw);
   g.fillStyle='#e8c22a';g.fillRect(bx2-ph*0.065,ly,lw,lw);
   g.fillStyle='#e84a3a';g.fillRect(bx2+ph*0.11,ly,lw,lw);
  }
  const order=[];
  for(let s=-SW;s<=SW;s++)order.push(s);
  order.sort((a,b)=>Math.abs(b)-Math.abs(a));
  for(const s of order){
   const cc=cellAt(d+1,s);
   const k=kindAt(cc.x,cc.y);
   if(!k)continue;
   const xl=cx2+(s-0.5)*2*w1, xr=cx2+(s+0.5)*2*w1;
   const xlF=cx2+(s-0.5)*2*w0, xrF=cx2+(s+0.5)*2*w0;
   const gy=yF(d), gyF=yF(d+1);
   const HB={11:0.75,12:1.15,13:1.9,14:3.0,15:0.85,16:5.2,23:0.4};
   if(k>=11){
    const hh=HB[k]||1;
    const wallH=hh*uu(d)*1.1, wallHF=hh*uu(d+1)*1.1;
    let col= k===11?'#e8dfc8': k===12?'#e0dcd2': k===13?'#98a0ac': k===14?'#8ca4c4': k===15?'#c2c8d0': k===16?'#7c94b4':'#3c424e';
    // 側面 (内側向き)
    if(s!==0&&kindAt(cellAt(d+1,s-Math.sign(s)).x,cellAt(d+1,s-Math.sign(s)).y)!==k){
     const inx1=s>0?xl:xr, inx0=s>0?xlF:xrF;
     g.fillStyle=shade(col,0.62*(1-fog*0.5));
     g.beginPath();
     g.moveTo(inx0,gyF);g.lineTo(inx0,gyF-wallHF);
     g.lineTo(inx1,gy-wallH);g.lineTo(inx1,gy);
     g.closePath();g.fill();
    }
    // 正面
    g.fillStyle=shade(col,1-fog*0.6);
    g.fillRect(xl,gy-wallH,xr-xl,wallH);
    g.strokeStyle='rgba(30,26,24,.5)';g.lineWidth=1;
    g.strokeRect(xl,gy-wallH,xr-xl,wallH);
    // 窓テクスチャ (アトラスのタイルを貼る)
    if(k>=11&&k<=16&&xr-xl>8&&wallH>8){
     const tn=k===11?'b1Win':k===12?'shopWinB':k===13?'grayWin':'glassWin';
     const tp=AP[tn];
     const rows=k===11?1:k===12?2:k===13?4:k===16?8:5;
     const cols=3;
     const bandT=k===12?wallH*0.16:wallH*0.08;
     const cellW=(xr-xl)/cols;
     let cellH2=(wallH-bandT)/rows;
     const capped=Math.min(cellH2,cellW*1.15);
     const blockTop=gy-(capped*rows);           // 窓ブロックは下詰め(1階が地面に付く)
     for(let r2=0;r2<rows;r2++)for(let c2=0;c2<cols;c2++){
      g.drawImage(img,tp[0],tp[1],tp[2],tp[3],
       xl+c2*cellW+cellW*0.06,blockTop+r2*capped+capped*0.08,cellW*0.88,capped*0.84);
     }
     if(k===12){const hcc=hs(cc.x,cc.y,9);
      g.fillStyle=['#3d6db4','#b43d3d','#3d8a6e'][(hcc*3)|0];
      g.fillRect(xl,gy-wallH,xr-xl,bandT);}
     if(k===14||k===16){g.strokeStyle='rgba(60,76,100,.4)';g.lineWidth=1;
      for(let c2=1;c2<cols;c2++){g.beginPath();g.moveTo(xl+c2*cellW,gy-wallH);g.lineTo(xl+c2*cellW,gy);g.stroke();}}
    }
    if(k===15){const i=cc.y*GW+cc.x;
     const sp=AP.shopWinB;
     const sh2=Math.min(wallH*0.55,(xr-xl)*0.5);
     for(let c2=0;c2<3;c2++)g.drawImage(img,sp[0],sp[1],sp[2],sp[3],
      xl+c2*(xr-xl)/3+2,gy-sh2,(xr-xl)/3-3,sh2-1);
     g.fillStyle=KACC[i]||'#888';g.fillRect(xl,gy-wallH,xr-xl,Math.max(3,wallH*0.2));}
    // 距離フォグ
    if(fog>0.05){g.fillStyle=`rgba(205,220,236,${fog*0.55})`;g.fillRect(xl,gy-wallH,xr-xl,wallH);}
    if(k===23){ // 駅: Mサイン
     g.fillStyle='#0069b3';g.fillRect((xl+xr)/2-5,gy-wallH-10,10,10);
     g.fillStyle='#fff';g.font='bold 8px monospace';g.fillText('M',(xl+xr)/2-3,gy-wallH-2);}
   }else if(k===1||k===2){ // 木 (アトラススプライト)
    const sz=(k===1?2.7:3.0)*w1;
    const bx2=(xl+xr)/2;
    const tp=k===1?AP.tree:AP.pine;
    g.drawImage(img,tp[0],tp[1],tp[2],tp[3],bx2-sz*0.55,gy-sz*1.1,sz*1.1,sz*1.1);
    if(fog>0.08){g.fillStyle=`rgba(205,220,236,${fog*0.4})`;
     g.fillRect(bx2-sz*0.55,gy-sz*1.1,sz*1.1,sz*1.1);}
   }else if(k===3){ // 岩
    const sz=w1*1.0,bx2=(xl+xr)/2;
    g.fillStyle=shade('#7e786c',1-fog*0.6);
    g.beginPath();g.arc(bx2,gy-sz*0.35,sz*0.45,Math.PI,2*Math.PI);g.fill();
    g.fillRect(bx2-sz*0.45,gy-sz*0.35,sz*0.9,sz*0.35);
   }
  }

 }
 // コンパスと枠
 g.fillStyle='rgba(10,12,20,.7)';g.fillRect(cx2-28,8,56,24);
 g.strokeStyle='#5a6472';g.strokeRect(cx2-28,8,56,24);
 g.fillStyle='#ffd77a';g.font='bold 15px monospace';
 g.fillText(DIRNAME[P.dir],cx2-5,25);
 g.strokeStyle='rgba(0,0,0,.5)';g.lineWidth=6;g.strokeRect(3,3,cw-6,chh-6);
}
function drawLM3d(g,k,bx,gy,w1,fog){
 if(k==='tower'){
  const h=w1*30,W2=w1*5.5;
  g.fillStyle=shade('#e8543a',1-fog*0.5);
  g.beginPath();g.moveTo(bx-W2,gy);g.lineTo(bx-w1*0.22,gy-h*0.72);g.lineTo(bx-w1*0.14,gy-h);
  g.lineTo(bx+w1*0.14,gy-h);g.lineTo(bx+w1*0.22,gy-h*0.72);g.lineTo(bx+W2,gy);g.closePath();g.fill();
  g.fillStyle=shade('#f4f0e6',1-fog*0.4);
  for(let i=1;i<6;i+=2){const f=i/7;g.fillRect(bx-W2*(1-f)*1.05,gy-h*f-h*0.05,W2*2*(1-f)*1.05,h*0.055);}
  g.fillStyle=shade('#b03a26',1-fog*0.5);
  g.fillRect(bx-W2*0.44,gy-h*0.55,W2*0.88,h*0.07);
 }else if(k==='zoji'){
  const W2=w1*6,h=w1*4;
  g.fillStyle=shade('#57544e',1-fog*0.5);
  g.beginPath();g.moveTo(bx-W2,gy-h*0.55);g.lineTo(bx-W2*0.6,gy-h);g.lineTo(bx+W2*0.6,gy-h);g.lineTo(bx+W2,gy-h*0.55);g.closePath();g.fill();
  g.fillStyle=shade('#f2ecdc',1-fog*0.4);g.fillRect(bx-W2*0.7,gy-h*0.55,W2*1.4,h*0.55);
  g.fillStyle=shade('#a03826',1-fog*0.4);
  for(let i=-2;i<=2;i++)g.fillRect(bx+i*W2*0.3-1,gy-h*0.55,Math.max(2,w1*0.1),h*0.55);
  g.fillStyle=shade('#2e2622',1-fog*0.4);g.fillRect(bx-w1*0.3,gy-h*0.4,w1*0.6,h*0.4);
 }else if(k==='gate'){
  const W2=w1*3.4,h=w1*3.4;
  g.fillStyle=shade('#c8402a',1-fog*0.4);
  g.fillRect(bx-W2*0.8,gy-h,W2*1.6,h*0.16);
  g.fillRect(bx-W2*0.7,gy-h*0.8,W2*0.16,h*0.8);
  g.fillRect(bx+W2*0.54,gy-h*0.8,W2*0.16,h*0.8);
  g.fillStyle=shade('#3a3f4a',1-fog*0.4);g.fillRect(bx-W2*0.9,gy-h*1.12,W2*1.8,h*0.14);
 }
}

// ============ loop ============
function tick(now){
 requestAnimationFrame(tick);
 if(!baked)return;
 if(view3d){
  if(fpAnim){
   const k=Math.min(1,(now-fpAnim.t0)/fpAnim.dur);
   const e=k<.5?2*k*k:1-Math.pow(-2*k+2,2)/2;
   if(fpAnim.type==='move'){
    render3d(ctx,e*fpAnim.sgn);
    if(k>=1){P.hx=fpAnim.tx;P.hy=fpAnim.ty;fpAnim=null;checkArea();}
   }else{
    const s=fpAnim.sgn;
    ctx.fillStyle='#0d0f14';ctx.fillRect(0,0,cw,chh);
    ctx.drawImage(fpAnim.a,-e*cw*s,0);
    ctx.drawImage(fpAnim.b,cw*(1-e)*s,0);
    if(k>=1)fpAnim=null;
   }
  }else render3d(ctx,0);
  return;}
 if(P.moving){
  const m=P.moving,k=Math.min(1,(now-m.t0)/MOVE_MS);
  if(k>=1){P.hx=m.tx;P.hy=m.ty;P.moving=null;P.step^=1;checkArea();}}
 if(!P.moving&&held)tryMove(held);
 let ix,iy;
 if(P.moving){
  const m=P.moving,k=Math.min(1,(performance.now()-m.t0)/MOVE_MS);
  ix=(m.fx+(m.tx-m.fx)*k)*8;iy=(m.fy+(m.ty-m.fy)*k)*8;
 }else{ix=P.hx*8;iy=P.hy*8;}
 const vw=cw/SC,vh=chh/SC;
 let camx=ix+8-vw/2,camy=iy+12-vh/2;
 camx=Math.max(0,Math.min(GW*TS-vw,camx));
 camy=Math.max(0,Math.min(GH*TS-vh,camy));
 ctx.fillStyle='#0d0f14';ctx.fillRect(0,0,cw,chh);
 ctx.drawImage(map,camx,camy,vw,vh,0,0,cw,chh);
 const hx=(ix-camx)*SC,hy=(iy-camy)*SC;
 let fr=0;
 if(P.dir==='down')fr=0;else if(P.dir==='up')fr=1;else fr=2+(P.moving?P.step:0);
 ctx.save();
 if(P.dir==='left'){ctx.translate(hx+16*SC,hy-8*SC);ctx.scale(-1,1);ctx.drawImage(hero,fr*16,0,16,24,0,0,16*SC,24*SC);}
 else ctx.drawImage(hero,fr*16,0,16,24,hx,hy-8*SC,16*SC,24*SC);
 ctx.restore();
}
requestAnimationFrame(tick);
checkArea();

window.DEBUG={
 st:()=>({x:P.hx/2,y:P.hy/2,dir:P.dir,area:curArea}),
 warp:(x,y)=>{P.hx=x*2;P.hy=y*2;P.moving=null;checkArea();},
 warpSafe,msgOff:()=>{msgQ=[];msgActive=false;msgEl.classList.remove('show');},
 line:()=>curLine,baked:()=>baked,mini:toggleMini,view:toggleView,setDir:d=>{P.dir=d;},is3d:()=>view3d,
};
</script>
