<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>コロコロボール 🎱 どこに おとす？</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#0d1b3e; font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { touch-action:none; display:block; border-radius:18px; box-shadow:0 12px 40px rgba(0,0,0,.5); }
  #start {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    background:radial-gradient(circle at 50% 35%, #2b4cff 0%, #0d1b3e 70%);
    color:#fff; text-align:center; padding:24px;
  }
  #start h1 { font-size:min(13vw,80px); text-shadow:0 4px 0 rgba(0,0,0,.25); letter-spacing:2px; }
  #start .sub { font-size:min(5vw,26px); opacity:.92; line-height:1.7; }
  .bigbtn {
    font-family:inherit; border:none; cursor:pointer;
    font-size:min(8vw,40px); font-weight:bold; color:#fff;
    padding:22px 54px; border-radius:60px;
    background:linear-gradient(#ffd23f,#ff9f1c);
    box-shadow:0 8px 0 #d97706, 0 14px 24px rgba(0,0,0,.4);
    transition:transform .08s, box-shadow .08s;
  }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 2px 0 #d97706, 0 6px 12px rgba(0,0,0,.4); }
  .emoji-row { font-size:min(11vw,64px); animation:bob 1.6s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>

<div id="start">
  <div class="emoji-row">🔴 ⬇️ 🏔️ 〰️ 🧺</div>
  <h1>コロコロボール</h1>
  <div class="sub">どこに おとすと カゴに はいるかな？<br>ばしょを かえて ためしてみよう！</div>
  <button class="bigbtn" id="startBtn">▶ あそぶ</button>
</div>

<script>
"use strict";
(function(){
  // ====== 論理座標（縦長 800 x 1320）======
  const W = 800, H = 1320;
  const WALL = 28;
  const FLOOR_Y = 1150, POCKET_Y = 1235, HALF = 72; // カゴ（穴）の半幅
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let scale = 1;

  function resize(){
    const s = Math.min(window.innerWidth / W, window.innerHeight / H);
    cv.style.width  = (W * s) + 'px';
    cv.style.height = (H * s) + 'px';
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    cv.width  = Math.round(W * s * dpr);
    cv.height = Math.round(H * s * dpr);
    ctx.setTransform(dpr * s, 0, 0, dpr * s, 0, 0);
    scale = s;
  }
  window.addEventListener('resize', resize);

  // ====== サウンド ======
  let actx = null;
  function audio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
  function tone(freq, dur, type, vol, when){
    const a = audio(); if(!a) return;
    const t0 = a.currentTime + (when||0);
    const o = a.createOscillator(), g = a.createGain();
    o.type = type||'sine'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol||0.2, t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g).connect(a.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  }
  const PENTA = [523.25,587.33,659.25,783.99,880.0,1046.5];
  let starIdx = 0;
  function sndStar(){ tone(PENTA[starIdx % PENTA.length], 0.5, 'triangle', 0.28); starIdx++; }
  function sndBounce(v){ tone(120 + Math.min(220, v*26), 0.08, 'sine', Math.min(0.1, 0.03+v*0.012)); }
  function sndDrop(){ tone(440,0.12,'square',0.12); }
  function sndGoal(){
    [523,659,784,1046,1318].forEach((f,i)=> tone(f, 0.32, 'triangle', 0.3, i*0.12));
    tone(196,0.6,'sine',0.18,0);
  }
  function sndFail(){ tone(392,0.22,'sine',0.18,0); tone(294,0.35,'sine',0.18,0.18); }

  // ====== レベル（手作りの分かれ道パズル）======
  // coreSegs: 山と坂、 cx: カゴの中心x、 stars: ヒントの星
  function buildLevel(coreSegs, stars, cx, theme){
    const segs = coreSegs.slice();
    // 左右の壁
    segs.push({x1:WALL, y1:140, x2:WALL, y2:FLOOR_Y});
    segs.push({x1:W-WALL, y1:140, x2:W-WALL, y2:FLOOR_Y});
    // 床（カゴの穴だけ空ける）
    segs.push({x1:WALL, y1:FLOOR_Y, x2:cx-HALF, y2:FLOOR_Y});
    segs.push({x1:cx+HALF, y1:FLOOR_Y, x2:W-WALL, y2:FLOOR_Y});
    // カゴ（穴）の左右の壁と底
    segs.push({x1:cx-HALF, y1:FLOOR_Y, x2:cx-HALF, y2:POCKET_Y});
    segs.push({x1:cx+HALF, y1:FLOOR_Y, x2:cx+HALF, y2:POCKET_Y});
    segs.push({x1:cx-HALF, y1:POCKET_Y, x2:cx+HALF, y2:POCKET_Y});
    return { segs, stars:stars.map(s=>({x:s[0], y:s[1], got:false})), cx, theme };
  }

  const THEMES = [
    {bg1:'#1b2a6b', bg2:'#0d1b3e', ramp:'#4dd0e1', star:'#ffd23f', ball:'#ff4757'},
    {bg1:'#2d5a27', bg2:'#16331a', ramp:'#aee571', star:'#fff176', ball:'#ff7043'},
    {bg1:'#6b2d5a', bg2:'#3a1530', ramp:'#f48fb1', star:'#ffe082', ball:'#42a5f5'},
  ];

  // 漏斗（ファネル）レベルを作る。cx=カゴの中心、th=漏斗の半幅。
  // 漏斗の壁がカゴの口までつながっているので、漏斗の中に落とせば必ずカゴへ。
  // 漏斗の外（端っこ）に落とすと床に落ちて失敗。→「どこに落とすか」で結果が変わる。
  function makeFunnel(cx, th, theme){
    const wallL = {x1:cx-th, y1:300, x2:cx-HALF, y2:FLOOR_Y};   // 左の漏斗壁
    const wallR = {x1:cx+th, y1:300, x2:cx+HALF, y2:FLOOR_Y};   // 右の漏斗壁
    const ledges = [                                            // ジグザグの段差（ピタゴラ風）
      {x1:cx-th+40, y1:520, x2:cx-40, y2:580},
      {x1:cx+th-40, y1:700, x2:cx+40, y2:760},
      {x1:cx-th+70, y1:880, x2:cx-40, y2:940},
    ];
    const stars = [ [cx-th/2,545], [cx+th/2,725], [cx-th/2+15,905] ];
    return buildLevel([wallL, wallR, ...ledges], stars, cx, theme);
  }

  const LEVELS = [
    makeFunnel(400, 250, THEMES[0]), // レベル1：まんなかに おとそう（両はじは しっぱい）
    makeFunnel(250, 230, THEMES[1]), // レベル2：ひだりに おとそう（みぎは しっぱい）
    makeFunnel(560, 230, THEMES[2]), // レベル3：みぎに おとそう（ひだりは しっぱい）
  ];
  let levelIdx = 0;
  function level(){ return LEVELS[levelIdx]; }
  function goalIn(x){ const c=level().cx; return x>c-HALF && x<c+HALF; }

  // ====== ボール物理 ======
  const R = 26, G = 0.55, REST = 0.30, FRIC = 0.985, AIR = 0.999;
  let ball = null;
  let confetti = [], stars2 = [];
  let state = 'aim';   // 'aim' | 'roll' | 'win' | 'lose'
  let stateT = 0, starsGot = 0, slowFrames = 0;
  let aim = null;

  function dropBall(x){
    x = Math.max(WALL+R+4, Math.min(W-WALL-R-4, x));
    for(const s of level().stars) s.got=false;
    starsGot = 0; slowFrames = 0;
    ball = { x, y: 150, vx:(Math.random()-0.5)*0.4, vy:0, trail:[] };
    state = 'roll'; stateT = 0;
    confetti = []; aim = null;
    sndDrop();
  }

  function collideSeg(b, s){
    const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
    const len2 = dx*dx + dy*dy || 1;
    let t = ((b.x - s.x1)*dx + (b.y - s.y1)*dy) / len2;
    t = Math.max(0, Math.min(1, t));
    const cx = s.x1 + t*dx, cy = s.y1 + t*dy;
    let nx = b.x - cx, ny = b.y - cy;
    let dist = Math.hypot(nx, ny);
    if(dist < R && dist > 0){
      nx/=dist; ny/=dist;
      b.x += nx*(R-dist); b.y += ny*(R-dist);
      const vn = b.vx*nx + b.vy*ny;
      if(vn < 0){
        const speed = Math.abs(vn);
        b.vx -= (1+REST)*vn*nx; b.vy -= (1+REST)*vn*ny;
        const tnx=-ny, tny=nx;
        let vt = (b.vx*tnx + b.vy*tny) * FRIC;
        const vnn = b.vx*nx + b.vy*ny;
        b.vx = vnn*nx + vt*tnx; b.vy = vnn*ny + vt*tny;
        if(speed > 1.4) sndBounce(speed);
      }
    }
  }

  function step(){
    if(state!=='roll' && state!=='win' && state!=='lose') return;
    if(state==='roll'){
      const SUB = 4, L = level();
      for(let k=0;k<SUB;k++){
        ball.vy += G/SUB; ball.vx*=AIR; ball.vy*=AIR;
        ball.x += ball.vx/SUB; ball.y += ball.vy/SUB;
        for(const s of L.segs) collideSeg(ball, s);
        if(ball.x < R+2){ ball.x=R+2; if(ball.vx<0) ball.vx*=-REST; }
        if(ball.x > W-R-2){ ball.x=W-R-2; if(ball.vx>0) ball.vx*=-REST; }
      }
      ball.trail.push({x:ball.x,y:ball.y});
      if(ball.trail.length>14) ball.trail.shift();

      for(const st of L.stars){
        if(!st.got && Math.hypot(ball.x-st.x, ball.y-st.y) < R+22){
          st.got=true; starsGot++; sndStar(); popStar(st.x,st.y);
        }
      }
      const sp = Math.hypot(ball.vx, ball.vy);
      // 成功：カゴ（穴）の中まで落ちた
      if(ball.y > FLOOR_Y + 26 && goalIn(ball.x)){
        state='win'; stateT=0; sndGoal(); burst();
      }
      // 失敗：床に止まった（穴の外）
      else if(ball.y > FLOOR_Y - R - 4 && !goalIn(ball.x) && sp < 1.4){
        slowFrames++;
        if(slowFrames>10){ state='lose'; stateT=0; sndFail(); }
      }
      // 途中で止まった（はさまった）→ 失敗あつかい
      else if(sp < 0.6 && ball.y < FLOOR_Y - R - 4){
        slowFrames++;
        if(slowFrames>110){ state='lose'; stateT=0; sndFail(); }
      } else slowFrames = 0;
    } else {
      // win/lose 中も少し物理を動かして落ち着かせる
      ball.vy += G; ball.x += ball.vx; ball.y += ball.vy;
      for(const s of level().segs) collideSeg(ball, s);
      ball.vx*=0.9;
      stateT++;
    }
  }

  // ====== エフェクト ======
  function popStar(x,y){
    for(let i=0;i<10;i++){ const a=Math.random()*7, sp=2+Math.random()*4;
      stars2.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1}); }
  }
  function burst(){
    const cols=['#ff4757','#ffd23f','#4dd0e1','#aee571','#ff7ac6','#fff'];
    for(let i=0;i<150;i++) confetti.push({
      x:level().cx+(Math.random()-0.5)*180, y:1060,
      vx:(Math.random()-0.5)*12, vy:-(7+Math.random()*13),
      rot:Math.random()*6, vr:(Math.random()-0.5)*0.4,
      c:cols[i%cols.length], s:8+Math.random()*8, life:1
    });
  }

  // ====== 描画 ======
  function roundRect(x,y,w,h,r){ ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function draw(){
    const L=level(), th=L.theme, cx=L.cx;
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,th.bg1); g.addColorStop(1,th.bg2);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // 上部 操作エリア
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(0,0,W,150);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center';
    ctx.fillText('👆 どこに おとす？', W/2, 72);
    if(aim!==null && state==='aim'){
      ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.setLineDash([10,12]); ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(aim,120); ctx.lineTo(aim,FLOOR_Y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=th.ball; ctx.beginPath(); ctx.arc(aim,120,R,0,7); ctx.fill();
    }

    // 坂・壁
    ctx.lineCap='round';
    for(const s of L.segs){
      ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=22;
      ctx.beginPath(); ctx.moveTo(s.x1,s.y1+4); ctx.lineTo(s.x2,s.y2+4); ctx.stroke();
      ctx.strokeStyle=th.ramp; ctx.lineWidth=16;
      ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke();
    }

    // カゴ（光る穴）
    const glow = state==='win' ? 26 : 12;
    ctx.save(); ctx.shadowColor=th.star; ctx.shadowBlur=glow;
    ctx.fillStyle='rgba(255,255,255,0.10)';
    roundRect(cx-HALF+6, FLOOR_Y+6, HALF*2-12, POCKET_Y-FLOOR_Y-10, 14); ctx.fill();
    ctx.restore();
    ctx.font='58px sans-serif'; ctx.textAlign='center';
    ctx.fillText('🧺', cx, POCKET_Y-18);

    // 星
    for(const st of L.stars){ if(!st.got) drawStar(st.x, st.y, 22, th.star); }

    // トレイル＆ボール
    if(ball){
      for(let i=0;i<ball.trail.length;i++){ const p=ball.trail[i], a=i/ball.trail.length;
        ctx.globalAlpha=a*0.4; ctx.fillStyle=th.ball;
        ctx.beginPath(); ctx.arc(p.x,p.y,R*a*0.8,0,7); ctx.fill(); }
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(0,0,0,0.2)';
      ctx.beginPath(); ctx.ellipse(ball.x,ball.y+R-2,R*0.9,R*0.4,0,0,7); ctx.fill();
      const bg=ctx.createRadialGradient(ball.x-8,ball.y-8,4,ball.x,ball.y,R);
      bg.addColorStop(0,'#fff'); bg.addColorStop(0.25,th.ball); bg.addColorStop(1,shade(th.ball,-40));
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(ball.x,ball.y,R,0,7); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.65)';
      ctx.beginPath(); ctx.arc(ball.x-8,ball.y-4,3.2,0,7); ctx.arc(ball.x+8,ball.y-4,3.2,0,7); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=2.4;
      if(state==='lose'){ ctx.beginPath(); ctx.arc(ball.x,ball.y+9,7,1.15*Math.PI,1.85*Math.PI); ctx.stroke(); }
      else { ctx.beginPath(); ctx.arc(ball.x,ball.y+3,7,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }
    }

    for(const p of stars2){ ctx.globalAlpha=p.life; ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
    for(const c of confetti){ ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot);
      ctx.globalAlpha=Math.max(0,c.life); ctx.fillStyle=c.c;
      ctx.fillRect(-c.s/2,-c.s/2,c.s,c.s*0.6); ctx.restore(); }
    ctx.globalAlpha=1;

    // 上部UI
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='bold 30px sans-serif';
    ctx.fillText('🌟 '+starsGot, 20, 38);
    ctx.textAlign='right'; ctx.fillText('レベル '+(levelIdx+1)+'/'+LEVELS.length, W-20, 38);
    ctx.textAlign='center';

    drawBtn(btnAgain,'🔄'); drawBtn(btnNext,'➡️');

    // 結果メッセージ
    if(state==='win'){
      const a=Math.min(1,stateT/12); ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,0.35)'; roundRect(120,500,560,170,30); ctx.fill();
      ctx.fillStyle='#ffd23f'; ctx.font='bold 78px sans-serif';
      ctx.fillText('やったー！🎉', W/2, 590);
      ctx.fillStyle='#fff'; ctx.font='30px sans-serif';
      ctx.fillText('🌟 を '+starsGot+'こ あつめたよ！ ➡️ で つぎへ', W/2, 638);
      ctx.globalAlpha=1;
    } else if(state==='lose'){
      const a=Math.min(1,stateT/12); ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,0.35)'; roundRect(120,500,560,170,30); ctx.fill();
      ctx.fillStyle='#ff9f1c'; ctx.font='bold 70px sans-serif';
      ctx.fillText('あれれ〜？ 😅', W/2, 585);
      ctx.fillStyle='#fff'; ctx.font='30px sans-serif';
      ctx.fillText('ちがう ばしょに おとしてみよう！', W/2, 635);
      ctx.globalAlpha=1;
    }
  }

  const btnAgain = {x:170, y:H-72, r:54};
  const btnNext  = {x:W-170, y:H-72, r:54};
  function drawBtn(b,emoji){
    ctx.fillStyle='rgba(255,255,255,0.16)';
    ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    ctx.font='46px sans-serif'; ctx.textAlign='center';
    ctx.fillText(emoji,b.x,b.y+16);
  }
  function hit(b,x,y){ return Math.hypot(x-b.x,y-b.y) < b.r+12; }

  function drawStar(cx,cy,r,color){
    ctx.save(); ctx.translate(cx,cy);
    const t=(typeof performance!=='undefined'?performance.now():0)/600;
    ctx.rotate(Math.sin(t+cx)*0.2);
    ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=14;
    ctx.beginPath();
    for(let i=0;i<5;i++){ const a=-Math.PI/2+i*2*Math.PI/5;
      ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
      const a2=a+Math.PI/5; ctx.lineTo(Math.cos(a2)*r*0.45,Math.sin(a2)*r*0.45); }
    ctx.closePath(); ctx.fill(); ctx.restore(); ctx.shadowBlur=0;
  }
  function shade(hex,amt){ let c=hex.replace('#',''); if(c.length===3) c=c.split('').map(x=>x+x).join('');
    let r=Math.max(0,Math.min(255,parseInt(c.substr(0,2),16)+amt));
    let gg=Math.max(0,Math.min(255,parseInt(c.substr(2,2),16)+amt));
    let b=Math.max(0,Math.min(255,parseInt(c.substr(4,2),16)+amt));
    return '#'+[r,gg,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }

  // ====== ループ ======
  function update(){
    step();
    for(const p of stars2){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; }
    stars2=stars2.filter(p=>p.life>0);
    for(const c of confetti){ c.x+=c.vx; c.y+=c.vy; c.vy+=0.3; c.vx*=0.99; c.rot+=c.vr; c.life-=0.006; }
    confetti=confetti.filter(c=>c.life>0 && c.y<H+40);
  }
  function loop(){ update(); draw(); requestAnimationFrame(loop); }

  // ====== 入力 ======
  function toLogical(clientX,clientY){ const rect=cv.getBoundingClientRect();
    return { x:(clientX-rect.left)/scale, y:(clientY-rect.top)/scale }; }
  function onDown(x,y){
    audio();
    const p=toLogical(x,y);
    if(hit(btnAgain,p.x,p.y)){ retry(); return; }
    if(hit(btnNext,p.x,p.y)){ nextLevel(); return; }
    if(state==='roll') return;            // ころがり中はさわってもOK（無視）
    if(state==='win'||state==='lose'){ retry(); return; } // 結果画面をタップ→やり直し
    if(p.y < FLOOR_Y) dropBall(p.x);      // 好きな場所に落とす
  }
  function onMove(x,y){
    if(state!=='aim') return;
    const p=toLogical(x,y);
    if(p.y<220) aim=Math.max(WALL+R+4,Math.min(W-WALL-R-4,p.x));
  }
  cv.addEventListener('mousedown', e=>onDown(e.clientX,e.clientY));
  cv.addEventListener('mousemove', e=>onMove(e.clientX,e.clientY));
  cv.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.changedTouches[0]; onMove(t.clientX,t.clientY); onDown(t.clientX,t.clientY); },{passive:false});
  cv.addEventListener('touchmove', e=>{ e.preventDefault(); const t=e.changedTouches[0]; onMove(t.clientX,t.clientY); },{passive:false});

  function retry(){ ball=null; confetti=[]; stars2=[]; state='aim'; aim=null;
    for(const s of level().stars) s.got=false; starsGot=0; }
  function nextLevel(){ levelIdx=(levelIdx+1)%LEVELS.length; retry(); tone(660,0.12,'square',0.15); }

  document.getElementById('startBtn').addEventListener('click', ()=>{
    audio(); document.getElementById('start').style.display='none';
    tone(880,0.15,'triangle',0.2); resize(); loop();
  });
  resize();
})();
</script>
