<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>ピタゴラ・コロコロ 🎢</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; background:#0b1020; font-family:"Hiragino Maru Gothic ProN","Rounded Mplus 1c",sans-serif; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { touch-action:none; display:block; border-radius:18px; box-shadow:0 12px 40px rgba(0,0,0,.55); }
  #start {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    background:radial-gradient(circle at 50% 32%, #28408f 0%, #0b1020 72%);
    color:#fff; text-align:center; padding:24px;
  }
  #start h1 { font-size:min(12vw,76px); text-shadow:0 4px 0 rgba(0,0,0,.25); letter-spacing:1px; }
  #start .sub { font-size:min(4.6vw,24px); opacity:.92; line-height:1.8; }
  .bigbtn {
    font-family:inherit; border:none; cursor:pointer;
    font-size:min(8vw,40px); font-weight:bold; color:#fff;
    padding:22px 56px; border-radius:60px;
    background:linear-gradient(#ffd23f,#ff9f1c);
    box-shadow:0 8px 0 #d97706, 0 14px 24px rgba(0,0,0,.4);
    transition:transform .08s, box-shadow .08s;
  }
  .bigbtn:active { transform:translateY(6px); box-shadow:0 2px 0 #d97706, 0 6px 12px rgba(0,0,0,.4); }
  .emoji-row { font-size:min(10vw,58px); animation:bob 1.8s ease-in-out infinite; }
  @keyframes bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
</style>
</head>
<body>
<div id="wrap"><canvas id="cv"></canvas></div>

<div id="start">
  <div class="emoji-row">🔴 ⚙️ 🎠 ↔️ 🧺</div>
  <h1>ピタゴラ・コロコロ</h1>
  <div class="sub">ボールを どこに おとすか かんがえよう！<br>ふうしゃ・シーソー・ベルトを とおって…<br>うまく カゴに はいるかな？（4さい〜）</div>
  <button class="bigbtn" id="startBtn">▶ あそぶ</button>
</div>

<script>
"use strict";
(function(){
  // ============ 基本定数 ============
  const W=800, H=1380, WALL=28, FLOOR_Y=1180, POCKET_Y=1270, HALF=74;
  const R=24, G=0.5, REST=0.28, AIR=0.999;     // ボールは1種類（弾性固定）
  const BALLCOL='#ff4757';

  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  let scale=1;
  function resize(){
    const s=Math.min(window.innerWidth/W, window.innerHeight/H);
    cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
    const dpr=Math.min(window.devicePixelRatio||1,2);
    cv.width=Math.round(W*s*dpr); cv.height=Math.round(H*s*dpr);
    ctx.setTransform(dpr*s,0,0,dpr*s,0,0); scale=s;
  }
  window.addEventListener('resize',resize);

  // ============ サウンド ============
  let actx=null;
  function audio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return actx; }
  function tone(freq,dur,type,vol,when){ const a=audio(); if(!a)return;
    const t0=a.currentTime+(when||0), o=a.createOscillator(), g=a.createGain();
    o.type=type||'sine'; o.frequency.value=freq;
    g.gain.setValueAtTime(0,t0); g.gain.linearRampToValueAtTime(vol||0.2,t0+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t0+dur);
    o.connect(g).connect(a.destination); o.start(t0); o.stop(t0+dur+0.02); }
  const PENTA=[523.25,587.33,659.25,783.99,880,1046.5]; let starIdx=0;
  function sndStar(){ tone(PENTA[starIdx%PENTA.length],0.5,'triangle',0.28); starIdx++; }
  function sndHit(v){ tone(150+Math.min(260,v*22),0.07,'sine',Math.min(0.11,0.03+v*0.01)); }
  function sndDrop(){ tone(440,0.12,'square',0.12); }
  function sndGoal(){ [523,659,784,1046,1318].forEach((f,i)=>tone(f,0.32,'triangle',0.3,i*0.12)); tone(196,0.6,'sine',0.18,0); }
  function sndFail(){ tone(392,0.22,'sine',0.18,0); tone(294,0.35,'sine',0.18,0.18); }
  function sndTick(){ tone(660,0.05,'square',0.05); }

  // ============ コース定義 ============
  const TH=[
    {bg1:'#1b2a6b',bg2:'#0b1020',ramp:'#4dd0e1',star:'#ffd23f',gear:'#ffb74d'},
    {bg1:'#2d5a27',bg2:'#0c1a0e',ramp:'#aee571',star:'#fff176',gear:'#9ccc65'},
    {bg1:'#6b2d5a',bg2:'#1e0d19',ramp:'#f48fb1',star:'#ffe082',gear:'#f06292'},
    {bg1:'#155e63',bg2:'#06222a',ramp:'#80deea',star:'#b2ff59',gear:'#4dd0e1'},
    {bg1:'#7a4a16',bg2:'#241405',ramp:'#ffc77d',star:'#fff1b8',gear:'#ffa726'},
    {bg1:'#4a2d6b',bg2:'#160b26',ramp:'#b388ff',star:'#ffd23f',gear:'#9575cd'},
    {bg1:'#5a1f1f',bg2:'#1c0808',ramp:'#ff8a80',star:'#ffd23f',gear:'#ff7043'}, // むずかしい用
    {bg1:'#143a4a',bg2:'#06181f',ramp:'#26c6da',star:'#b2ebf2',gear:'#00bcd4'},
    {bg1:'#3a2a0a',bg2:'#140d02',ramp:'#ffca28',star:'#fff59d',gear:'#ffb300'},
  ];
  const S=(x1,y1,x2,y2)=>({x1,y1,x2,y2});
  const P=(x,y,r)=>({x,y,r:r||16});

  // キャッチ用ファネル（壁がカゴの口まで繋がる→入れば必ずカゴ）
  const funnel=(cx,th,topY)=>[ S(cx-th,topY,cx-HALF,FLOOR_Y), S(cx+th,topY,cx+HALF,FLOOR_Y) ];

  // 各コース: {name,hint,cx,theme,statics,pegs,gimmicks,stars}
  // 方針: ギミックで派手に動かしつつ、下のファネルが確実にカゴへ。落とす場所で成功/失敗。
  function makeCourses(){ return [

    // 1) シーソー：板に落とすと傾いて転がり、下のファネルでカゴへ
    { name:'シーソー', hint:'まんなかへ', cx:400, theme:TH[0],
      statics:[ ...funnel(400,260,400) ],
      pegs:[],
      gimmicks:[ {type:'seesaw', x:400, y:560, len:165, angle:0, maxA:0.40, omega:0} ],
      stars:[[400,1120],[330,650]] },

    // 2) ふうしゃ：羽根で弾かれて、下のファネルでカゴへ
    { name:'ふうしゃ', hint:'まんなかへ', cx:400, theme:TH[2],
      statics:[ ...funnel(400,300,360) ],
      pegs:[],
      gimmicks:[ {type:'windmill', x:400, y:540, arm:86, n:4, omega:0.05, phase:0} ],
      stars:[[400,1120],[500,690]] },

    // 3) ベルト：左へ運ばれて、左のカゴへ（右に落とすと外れる）
    { name:'ベルト', hint:'ベルトの うえへ', cx:230, theme:TH[3],
      statics:[ ...funnel(230,200,820) ],
      pegs:[],
      gimmicks:[ {type:'conveyor', x1:300,y1:560, x2:620,y2:560, speed:-3.6, scroll:0} ],
      stars:[[430,520],[230,1120]] },

    // 4) ぐるぐる：回転バーで弾かれて、下のファネルでカゴへ
    { name:'ぐるぐる', hint:'まんなかへ', cx:400, theme:TH[5],
      statics:[ ...funnel(400,300,360) ],
      pegs:[ P(280,720,15), P(520,720,15) ],
      gimmicks:[ {type:'spinner', x:400, y:520, len:108, omega:0.07, phase:0} ],
      stars:[[400,1120],[300,690]] },

    // 5) ピタゴラそうち：シーソー→ベルト→ふうしゃ→ファネル
    { name:'ピタゴラそうち', hint:'ひだりうえへ', cx:600, theme:TH[4],
      statics:[ S(120,360,300,440), ...funnel(600,180,860) ],
      pegs:[],
      gimmicks:[
        {type:'seesaw', x:330, y:560, len:140, angle:0, maxA:0.40, omega:0},
        {type:'conveyor', x1:380,y1:700, x2:640,y2:700, speed:3.2, scroll:0},
        {type:'windmill', x:640, y:560, arm:64, n:4, omega:0.06, phase:0},
      ],
      stars:[[330,500],[510,665],[600,1120]] },

    // 6) わかれ道：右に落とすとカゴ、左に落とすと外れ（風車つき）
    { name:'わかれ道', hint:'みぎが せいかい', cx:600, theme:TH[1],
      statics:[
        S(400,300,210,440), S(400,300,590,440),         // 中央の山
        S(W-WALL,470,600+HALF,FLOOR_Y), S(400,470,600-HALF,FLOOR_Y), // 右ファネル→カゴ
        S(400,470,150,1060),                            // 左のはずれ坂
      ],
      pegs:[],
      gimmicks:[ {type:'windmill', x:600, y:560, arm:58, n:4, omega:-0.06, phase:0} ],
      stars:[[600,1120],[600,690]] },

    // ===== ここから むずかしい（6さい〜）=====

    // 7) ふりこ：揺れる振り子をよけて、せまいカゴへ（タイミング）
    { name:'ふりこ ★', hint:'まんなか＋タイミング', cx:400, theme:TH[6],
      statics:[ ...funnel(400,185,560) ],
      pegs:[],
      gimmicks:[ {type:'pendulum', x:400, y:210, len:300, amp:0.95, w:0.033, t:0} ],
      stars:[[400,1120],[400,300]] },

    // 8) うごくゆか：動く床がカゴの口を ふさいだり あけたり
    { name:'うごくゆか ★', hint:'あいてる ときに！', cx:400, theme:TH[7],
      statics:[ ...funnel(400,175,560) ],
      pegs:[],
      gimmicks:[ {type:'mover', x:400, y:470, len:135, amp:150, w:0.028, t:0} ],
      stars:[[400,1120],[230,650]] },

    // 9) だいパニック：風車＋振り子の大あばれを くぐりぬけろ
    { name:'だいパニック ★', hint:'よく みて！', cx:400, theme:TH[8],
      statics:[ ...funnel(400,250,520) ],
      pegs:[ P(250,430,14), P(550,430,14) ],
      gimmicks:[
        {type:'windmill', x:400, y:600, arm:70, n:4, omega:0.06, phase:0},
        {type:'pendulum', x:400, y:180, len:250, amp:0.7, w:0.045, t:0},
      ],
      stars:[[400,1120],[250,360]] },

  ]; }

  let LEVELS=makeCourses();
  LEVELS.forEach(L=>{ L.stars=L.stars.map(s=>({x:s[0],y:s[1],got:false})); });
  let levelIdx=0;
  const lv=()=>LEVELS[levelIdx];
  const goalIn=x=>{ const c=lv().cx; return x>c-HALF && x<c+HALF; };

  // ============ ギミック更新 ============
  function updateGimmicks(world, ball){
    for(const g of world.gimmicks){
      if(g.type==='windmill'||g.type==='spinner'){ g.phase+=g.omega; }
      else if(g.type==='conveyor'){ g.scroll=(g.scroll||0)+g.speed; }
      else if(g.type==='pendulum'){ g.t=(g.t||0)+1; g.omega=g.amp*g.w*Math.cos(g.t*g.w); g.angle=g.amp*Math.sin(g.t*g.w); }
      else if(g.type==='mover'){ g.t=(g.t||0)+1; g.cxNow=g.x+g.amp*Math.sin(g.t*g.w); g.svx=g.amp*g.w*Math.cos(g.t*g.w); }
      else if(g.type==='seesaw'){
        let target=0;
        if(ball){
          const onX=ball.x>g.x-g.len-R && ball.x<g.x+g.len+R;
          const py=g.y+Math.sin(g.angle)*(ball.x-g.x);
          const near=ball.y>py-R-44 && ball.y<py+R+70;
          if(onX&&near) target=Math.sign(ball.x-g.x)*g.maxA;
        }
        const prev=g.angle;
        g.angle+=(target-g.angle)*0.10;
        g.angle=Math.max(-g.maxA,Math.min(g.maxA,g.angle));
        g.omega=g.angle-prev;
      }
    }
  }

  // ギミック→セグメント（svx,svy=面の速度, grip=引きずり, rest=反発）
  function collectSegs(world){
    const segs=[], cx=world.cx;
    for(const s of world.statics) segs.push({...s,svx:0,svy:0,grip:0.03,rest:REST});
    for(const g of world.gimmicks){
      if(g.type==='windmill'){
        for(let i=0;i<g.n;i++){ const a=g.phase+i*2*Math.PI/g.n;
          segs.push({x1:g.x,y1:g.y,x2:g.x+Math.cos(a)*g.arm,y2:g.y+Math.sin(a)*g.arm,svx:0,svy:0,grip:0.35,rest:0.45,_rot:g}); }
      } else if(g.type==='spinner'){
        const a=g.phase;
        segs.push({x1:g.x-Math.cos(a)*g.len,y1:g.y-Math.sin(a)*g.len,x2:g.x+Math.cos(a)*g.len,y2:g.y+Math.sin(a)*g.len,svx:0,svy:0,grip:0.25,rest:0.4,_rot:g});
      } else if(g.type==='pendulum'){
        const an=g.angle||0, bx=g.x+Math.sin(an)*g.len, by=g.y+Math.cos(an)*g.len;
        segs.push({x1:g.x,y1:g.y,x2:bx,y2:by,svx:0,svy:0,grip:0.2,rest:0.45,_rot:g});
      } else if(g.type==='mover'){
        const c=g.cxNow!=null?g.cxNow:g.x;
        segs.push({x1:c-g.len,y1:g.y,x2:c+g.len,y2:g.y,svx:g.svx||0,svy:0,grip:0.3,rest:0.2});
      } else if(g.type==='seesaw'){
        const c=Math.cos(g.angle),s=Math.sin(g.angle);
        segs.push({x1:g.x-c*g.len,y1:g.y-s*g.len,x2:g.x+c*g.len,y2:g.y+s*g.len,svx:0,svy:0,grip:0.06,rest:0.2,_see:g});
      } else if(g.type==='conveyor'){
        const dx=g.x2-g.x1,dy=g.y2-g.y1,L=Math.hypot(dx,dy)||1;
        segs.push({x1:g.x1,y1:g.y1,x2:g.x2,y2:g.y2,svx:g.speed*dx/L,svy:g.speed*dy/L,grip:0.3,rest:REST});
      }
    }
    segs.push(S(WALL,140,WALL,FLOOR_Y), S(W-WALL,140,W-WALL,FLOOR_Y),
      S(WALL,FLOOR_Y,cx-HALF,FLOOR_Y), S(cx+HALF,FLOOR_Y,W-WALL,FLOOR_Y),
      S(cx-HALF,FLOOR_Y,cx-HALF,POCKET_Y), S(cx+HALF,FLOOR_Y,cx+HALF,POCKET_Y),
      S(cx-HALF,POCKET_Y,cx+HALF,POCKET_Y));
    return segs;
  }

  // ============ 衝突 ============
  function collide(b,s){
    const dx=s.x2-s.x1, dy=s.y2-s.y1, L=dx*dx+dy*dy||1;
    let t=((b.x-s.x1)*dx+(b.y-s.y1)*dy)/L; t=Math.max(0,Math.min(1,t));
    const cx=s.x1+t*dx, cy=s.y1+t*dy;
    let nx=b.x-cx, ny=b.y-cy, d=Math.hypot(nx,ny);
    if(d<R&&d>0){
      nx/=d; ny/=d; b.x+=nx*(R-d); b.y+=ny*(R-d);
      let svx=s.svx||0, svy=s.svy||0;
      if(s._see){ svx=-s._see.omega*(cy-s._see.y); svy=s._see.omega*(cx-s._see.x); }
      if(s._rot){ svx=-s._rot.omega*(cy-s._rot.y); svy=s._rot.omega*(cx-s._rot.x); }
      let rvx=b.vx-svx, rvy=b.vy-svy; const vn=rvx*nx+rvy*ny;
      if(vn<0){
        const rest=s.rest!=null?s.rest:REST, grip=s.grip!=null?s.grip:0.03;
        rvx-=(1+rest)*vn*nx; rvy-=(1+rest)*vn*ny;
        const tnx=-ny,tny=nx; let vt=(rvx*tnx+rvy*tny)*(1-grip);
        const vnn=rvx*nx+rvy*ny; rvx=vnn*nx+vt*tnx; rvy=vnn*ny+vt*tny;
        b.vx=svx+rvx; b.vy=svy+rvy;
        if(Math.abs(vn)>1.6) sndHit(Math.abs(vn));
      }
    }
  }
  function collidePeg(b,p){
    let nx=b.x-p.x, ny=b.y-p.y, d=Math.hypot(nx,ny), rr=R+p.r;
    if(d<rr&&d>0){ nx/=d; ny/=d; b.x+=nx*(rr-d); b.y+=ny*(rr-d);
      const vn=b.vx*nx+b.vy*ny;
      if(vn<0){ b.vx-=(1.4)*vn*nx; b.vy-=(1.4)*vn*ny; if(Math.abs(vn)>1.6) sndHit(Math.abs(vn)); } }
  }

  // ============ 状態 ============
  let ball=null, state='aim', stateT=0, slowFrames=0, starsGot=0, aim=null;
  let confetti=[], sparks=[];

  function dropBall(x){
    x=Math.max(WALL+R+4,Math.min(W-WALL-R-4,x));
    for(const st of lv().stars) st.got=false;
    starsGot=0; slowFrames=0;
    ball={x,y:150,vx:(Math.random()-0.5)*0.5,vy:0,trail:[]};
    state='roll'; stateT=0; confetti=[]; aim=null; sndDrop();
  }

  function physics(){
    const world=lv();
    if(state==='roll'){
      updateGimmicks(world, ball);
      const segs=collectSegs(world);
      for(let k=0;k<4;k++){
        ball.vy+=G/4; ball.vx*=AIR; ball.vy*=AIR; ball.x+=ball.vx/4; ball.y+=ball.vy/4;
        for(const s of segs) collide(ball,s);
        for(const p of world.pegs) collidePeg(ball,p);
        if(ball.x<R+2){ ball.x=R+2; if(ball.vx<0) ball.vx*=-REST; }
        if(ball.x>W-R-2){ ball.x=W-R-2; if(ball.vx>0) ball.vx*=-REST; }
        // 星はサブステップ内で判定（高速通過でも取りこぼさない）
        for(const st of world.stars){ if(!st.got && Math.hypot(ball.x-st.x,ball.y-st.y)<R+52){ st.got=true; starsGot++; sndStar(); popSpark(st.x,st.y); } }
      }
      ball.trail.push({x:ball.x,y:ball.y}); if(ball.trail.length>16) ball.trail.shift();
      const sp=Math.hypot(ball.vx,ball.vy);
      if(ball.y>FLOOR_Y+30 && goalIn(ball.x)){ state='win'; stateT=0; sndGoal(); burst(); }
      else if(ball.y>FLOOR_Y-R-4 && !goalIn(ball.x) && sp<1.3){ slowFrames++; if(slowFrames>12){ state='lose'; stateT=0; sndFail(); } }
      else if(sp<0.45 && ball.y<FLOOR_Y-R-4){ slowFrames++; if(slowFrames>170){ state='lose'; stateT=0; sndFail(); } }
      else slowFrames=0;
    } else {
      updateGimmicks(world, (state==='win'||state==='lose')?ball:null);
      if(ball){ const segs=collectSegs(world);
        ball.vy+=G; ball.x+=ball.vx; ball.y+=ball.vy;
        for(const s of segs) collide(ball,s); for(const p of world.pegs) collidePeg(ball,p);
        ball.vx*=0.9; }
      stateT++;
    }
  }

  // ============ エフェクト ============
  function popSpark(x,y){ for(let i=0;i<10;i++){ const a=Math.random()*7,s=2+Math.random()*4; sparks.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1}); } }
  function burst(){ const cols=['#ff4757','#ffd23f','#4dd0e1','#aee571','#ff7ac6','#fff'];
    for(let i=0;i<160;i++) confetti.push({x:lv().cx+(Math.random()-0.5)*200,y:1080,vx:(Math.random()-0.5)*13,vy:-(7+Math.random()*13),rot:Math.random()*6,vr:(Math.random()-0.5)*0.4,c:cols[i%cols.length],s:8+Math.random()*8,life:1}); }

  // ============ 描画 ============
  function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }
  function shade(hex,amt){ let c=hex.replace('#',''); if(c.length===3)c=c.split('').map(x=>x+x).join('');
    const f=i=>Math.max(0,Math.min(255,parseInt(c.substr(i,2),16)+amt)); return '#'+[f(0),f(2),f(4)].map(v=>v.toString(16).padStart(2,'0')).join(''); }

  function drawSeg(s,col){ ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=22; ctx.beginPath(); ctx.moveTo(s.x1,s.y1+4); ctx.lineTo(s.x2,s.y2+4); ctx.stroke();
    ctx.strokeStyle=col; ctx.lineWidth=16; ctx.beginPath(); ctx.moveTo(s.x1,s.y1); ctx.lineTo(s.x2,s.y2); ctx.stroke(); }

  function drawStar(cx,cy,r,color){ ctx.save(); ctx.translate(cx,cy); ctx.rotate(Math.sin(perfNow()/600+cx)*0.2);
    ctx.fillStyle=color; ctx.shadowColor=color; ctx.shadowBlur=14; ctx.beginPath();
    for(let i=0;i<5;i++){ const a=-Math.PI/2+i*2*Math.PI/5; ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r); const a2=a+Math.PI/5; ctx.lineTo(Math.cos(a2)*r*0.45,Math.sin(a2)*r*0.45); }
    ctx.closePath(); ctx.fill(); ctx.restore(); ctx.shadowBlur=0; }
  function perfNow(){ return (typeof performance!=='undefined'?performance.now():0); }

  function drawGimmick(g,th){
    if(g.type==='windmill'){
      // 中心ハブ
      ctx.save();
      for(let i=0;i<g.n;i++){ const a=g.phase+i*2*Math.PI/g.n;
        ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=20; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(g.x,g.y+3); ctx.lineTo(g.x+Math.cos(a)*g.arm,g.y+Math.sin(a)*g.arm+3); ctx.stroke();
      }
      const cols=[th.gear,'#ff8a65','#ffd54f','#4fc3f7'];
      for(let i=0;i<g.n;i++){ const a=g.phase+i*2*Math.PI/g.n;
        ctx.strokeStyle=cols[i%cols.length]; ctx.lineWidth=15; ctx.lineCap='round';
        ctx.beginPath(); ctx.moveTo(g.x,g.y); ctx.lineTo(g.x+Math.cos(a)*g.arm,g.y+Math.sin(a)*g.arm); ctx.stroke();
        ctx.fillStyle=cols[i%cols.length]; ctx.beginPath(); ctx.arc(g.x+Math.cos(a)*g.arm,g.y+Math.sin(a)*g.arm,9,0,7); ctx.fill();
      }
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(g.x,g.y,13,0,7); ctx.fill();
      ctx.fillStyle=shade(th.gear,-40); ctx.beginPath(); ctx.arc(g.x,g.y,7,0,7); ctx.fill();
      ctx.restore();
    } else if(g.type==='spinner'){
      const a=g.phase;
      ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=20; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(g.x-Math.cos(a)*g.len,g.y-Math.sin(a)*g.len+3); ctx.lineTo(g.x+Math.cos(a)*g.len,g.y+Math.sin(a)*g.len+3); ctx.stroke();
      ctx.strokeStyle=th.gear; ctx.lineWidth=15;
      ctx.beginPath(); ctx.moveTo(g.x-Math.cos(a)*g.len,g.y-Math.sin(a)*g.len); ctx.lineTo(g.x+Math.cos(a)*g.len,g.y+Math.sin(a)*g.len); ctx.stroke();
      ctx.fillStyle='#ff8a65'; for(const sg of [1,-1]){ ctx.beginPath(); ctx.arc(g.x+sg*Math.cos(a)*g.len,g.y+sg*Math.sin(a)*g.len,10,0,7); ctx.fill(); }
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(g.x,g.y,11,0,7); ctx.fill();
    } else if(g.type==='pendulum'){
      const an=g.angle||0, bx=g.x+Math.sin(an)*g.len, by=g.y+Math.cos(an)*g.len;
      // 可動範囲のうっすらした弧
      ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(g.x,g.y,g.len,Math.PI/2-g.amp,Math.PI/2+g.amp); ctx.stroke();
      // 棒
      ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=10; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(g.x,g.y+3); ctx.lineTo(bx,by+3); ctx.stroke();
      ctx.strokeStyle=th.gear; ctx.lineWidth=7; ctx.beginPath(); ctx.moveTo(g.x,g.y); ctx.lineTo(bx,by); ctx.stroke();
      // おもり
      const bg=ctx.createRadialGradient(bx-7,by-7,3,bx,by,26); bg.addColorStop(0,'#fff'); bg.addColorStop(0.3,'#ff8a65'); bg.addColorStop(1,shade('#ff8a65',-50));
      ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.arc(bx,by+4,26,0,7); ctx.fill();
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(bx,by,26,0,7); ctx.fill();
      // 支点
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(g.x,g.y,9,0,7); ctx.fill();
      ctx.fillStyle=shade(th.gear,-40); ctx.beginPath(); ctx.arc(g.x,g.y,5,0,7); ctx.fill();
    } else if(g.type==='mover'){
      const c=g.cxNow!=null?g.cxNow:g.x;
      // レール（可動範囲）
      ctx.strokeStyle='rgba(255,255,255,0.10)'; ctx.lineWidth=4; ctx.setLineDash([6,10]);
      ctx.beginPath(); ctx.moveTo(g.x-g.amp-g.len,g.y); ctx.lineTo(g.x+g.amp+g.len,g.y); ctx.stroke(); ctx.setLineDash([]);
      // 板
      ctx.fillStyle='rgba(0,0,0,0.28)'; rr(c-g.len,g.y-9+4,g.len*2,18,9); ctx.fill();
      const grd=ctx.createLinearGradient(0,g.y-9,0,g.y+9); grd.addColorStop(0,shade(th.gear,30)); grd.addColorStop(1,shade(th.gear,-30));
      ctx.fillStyle=grd; rr(c-g.len,g.y-9,g.len*2,18,9); ctx.fill();
      // 動く方向の矢印
      const dir=Math.sign(g.svx||1)||1; ctx.strokeStyle='#fff'; ctx.lineWidth=4; ctx.lineCap='round';
      for(const ox of [-g.len*0.45,0,g.len*0.45]){ const px=c+ox; ctx.beginPath();
        ctx.moveTo(px-7*dir,g.y-6); ctx.lineTo(px+7*dir,g.y); ctx.lineTo(px-7*dir,g.y+6); ctx.stroke(); }
    } else if(g.type==='seesaw'){
      const c=Math.cos(g.angle), s=Math.sin(g.angle);
      const lx=g.x-c*g.len,ly=g.y-s*g.len, rx2=g.x+c*g.len,ry2=g.y+s*g.len;
      // 支点（三角）
      ctx.fillStyle=shade(th.gear,-30); ctx.beginPath(); ctx.moveTo(g.x,g.y); ctx.lineTo(g.x-26,g.y+54); ctx.lineTo(g.x+26,g.y+54); ctx.closePath(); ctx.fill();
      // 板
      drawSeg({x1:lx,y1:ly,x2:rx2,y2:ry2}, th.gear);
      ctx.fillStyle='#ff8a65'; for(const e of [[lx,ly],[rx2,ry2]]){ ctx.beginPath(); ctx.arc(e[0],e[1],10,0,7); ctx.fill(); }
      ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(g.x,g.y,7,0,7); ctx.fill();
    } else if(g.type==='conveyor'){
      const dx=g.x2-g.x1,dy=g.y2-g.y1,L=Math.hypot(dx,dy)||1, ux=dx/L,uy=dy/L, nx=-uy,ny=ux;
      // ベルト本体
      ctx.strokeStyle='rgba(0,0,0,0.3)'; ctx.lineWidth=26; ctx.lineCap='round';
      ctx.beginPath(); ctx.moveTo(g.x1,g.y1+4); ctx.lineTo(g.x2,g.y2+4); ctx.stroke();
      ctx.strokeStyle='#37474f'; ctx.lineWidth=22; ctx.beginPath(); ctx.moveTo(g.x1,g.y1); ctx.lineTo(g.x2,g.y2); ctx.stroke();
      // 矢印（動く方向）
      const dir=Math.sign(g.speed); ctx.strokeStyle=th.gear; ctx.lineWidth=4; ctx.lineCap='round';
      const off=((g.scroll||0)%40+40)%40;
      for(let d=off; d<L; d+=40){ const px=g.x1+ux*d, py=g.y1+uy*d;
        ctx.beginPath(); ctx.moveTo(px-ux*7*dir-nx*5,py-uy*7*dir-ny*5); ctx.lineTo(px+ux*7*dir,py+uy*7*dir); ctx.lineTo(px-ux*7*dir+nx*5,py-uy*7*dir+ny*5); ctx.stroke(); }
      // ローラー
      ctx.fillStyle=th.gear; for(const e of [[g.x1,g.y1],[g.x2,g.y2]]){ ctx.beginPath(); ctx.arc(e[0],e[1],13,0,7); ctx.fill(); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(e[0],e[1],5,0,7); ctx.fill(); ctx.fillStyle=th.gear; }
    }
  }

  function draw(){
    const L=lv(), th=L.theme, cx=L.cx;
    const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,th.bg1); g.addColorStop(1,th.bg2);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);

    // 上部操作エリア
    ctx.fillStyle='rgba(255,255,255,0.06)'; ctx.fillRect(0,0,W,150);
    ctx.fillStyle='rgba(255,255,255,0.9)'; ctx.font='bold 32px sans-serif'; ctx.textAlign='center';
    ctx.fillText('👆 どこに おとす？', W/2, 70);
    if(aim!==null && state==='aim'){
      ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.setLineDash([10,12]); ctx.lineWidth=4;
      ctx.beginPath(); ctx.moveTo(aim,120); ctx.lineTo(aim,FLOOR_Y); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=BALLCOL; ctx.beginPath(); ctx.arc(aim,120,R,0,7); ctx.fill();
    }

    ctx.lineCap='round';
    for(const s of L.statics) drawSeg(s,th.ramp);
    for(const p of L.pegs){ ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.beginPath(); ctx.arc(p.x,p.y+4,p.r,0,7); ctx.fill();
      const pg=ctx.createRadialGradient(p.x-5,p.y-5,2,p.x,p.y,p.r); pg.addColorStop(0,'#fff'); pg.addColorStop(1,th.ramp);
      ctx.fillStyle=pg; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
    for(const gm of L.gimmicks) drawGimmick(gm,th);

    // カゴ
    const glow=state==='win'?26:12; ctx.save(); ctx.shadowColor=th.star; ctx.shadowBlur=glow;
    ctx.fillStyle='rgba(255,255,255,0.10)'; rr(cx-HALF+6,FLOOR_Y+6,HALF*2-12,POCKET_Y-FLOOR_Y-10,14); ctx.fill(); ctx.restore();
    ctx.font='58px sans-serif'; ctx.textAlign='center'; ctx.fillText('🧺',cx,POCKET_Y-16);

    for(const st of L.stars){ if(!st.got) drawStar(st.x,st.y,21,th.star); }

    if(ball){
      for(let i=0;i<ball.trail.length;i++){ const p=ball.trail[i],a=i/ball.trail.length; ctx.globalAlpha=a*0.4; ctx.fillStyle=BALLCOL; ctx.beginPath(); ctx.arc(p.x,p.y,R*a*0.8,0,7); ctx.fill(); }
      ctx.globalAlpha=1;
      ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(ball.x,ball.y+R-2,R*0.9,R*0.4,0,0,7); ctx.fill();
      const bg=ctx.createRadialGradient(ball.x-7,ball.y-7,3,ball.x,ball.y,R); bg.addColorStop(0,'#fff'); bg.addColorStop(0.25,BALLCOL); bg.addColorStop(1,shade(BALLCOL,-40));
      ctx.fillStyle=bg; ctx.beginPath(); ctx.arc(ball.x,ball.y,R,0,7); ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.beginPath(); ctx.arc(ball.x-7,ball.y-4,3,0,7); ctx.arc(ball.x+7,ball.y-4,3,0,7); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.65)'; ctx.lineWidth=2.2;
      if(state==='lose'){ ctx.beginPath(); ctx.arc(ball.x,ball.y+8,6,1.15*Math.PI,1.85*Math.PI); ctx.stroke(); }
      else { ctx.beginPath(); ctx.arc(ball.x,ball.y+3,6,0.15*Math.PI,0.85*Math.PI); ctx.stroke(); }
    }

    for(const p of sparks){ ctx.globalAlpha=p.life; ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(p.x,p.y,4,0,7); ctx.fill(); }
    ctx.globalAlpha=1;
    for(const c of confetti){ ctx.save(); ctx.translate(c.x,c.y); ctx.rotate(c.rot); ctx.globalAlpha=Math.max(0,c.life); ctx.fillStyle=c.c; ctx.fillRect(-c.s/2,-c.s/2,c.s,c.s*0.6); ctx.restore(); }
    ctx.globalAlpha=1;

    // 上部UI
    ctx.textAlign='left'; ctx.fillStyle='#fff'; ctx.font='bold 28px sans-serif'; ctx.fillText('🌟 '+starsGot,20,36);
    ctx.textAlign='center'; ctx.fillStyle='#fff'; ctx.font='bold 26px sans-serif'; ctx.fillText(L.name,W/2,128);
    ctx.textAlign='right'; ctx.fillText((levelIdx+1)+'/'+LEVELS.length,W-20,36);
    ctx.textAlign='center';

    drawBtn(btnHome,'🏠'); drawBtn(btnAgain,'🔄'); drawBtn(btnNext,'➡️');

    if(state==='win'){ const a=Math.min(1,stateT/12); ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,0.35)'; rr(110,520,580,168,30); ctx.fill();
      ctx.fillStyle='#ffd23f'; ctx.font='bold 76px sans-serif'; ctx.fillText('やったー！🎉',W/2,606);
      ctx.fillStyle='#fff'; ctx.font='28px sans-serif'; ctx.fillText('🌟 '+starsGot+'こ！ ➡️ で つぎへ',W/2,652); ctx.globalAlpha=1;
    } else if(state==='lose'){ const a=Math.min(1,stateT/12); ctx.globalAlpha=a;
      ctx.fillStyle='rgba(0,0,0,0.35)'; rr(110,520,580,168,30); ctx.fill();
      ctx.fillStyle='#ff9f1c'; ctx.font='bold 66px sans-serif'; ctx.fillText('あれれ〜？ 😅',W/2,600);
      ctx.fillStyle='#fff'; ctx.font='28px sans-serif'; ctx.fillText('ちがう ばしょを ためそう！',W/2,648); ctx.globalAlpha=1;
    }
  }

  const BY=H-66, BR=50;
  const btnHome={x:140,y:BY,r:BR}, btnAgain={x:400,y:BY,r:BR}, btnNext={x:660,y:BY,r:BR};
  function drawBtn(b,emoji){ ctx.fillStyle='rgba(255,255,255,0.16)'; ctx.beginPath(); ctx.arc(b.x,b.y,b.r,0,7); ctx.fill();
    ctx.font='42px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(emoji,b.x,b.y+2); ctx.textBaseline='alphabetic'; }
  function hitB(b,x,y){ return Math.hypot(x-b.x,y-b.y)<b.r+12; }

  // ============ ループ ============
  function update(){
    physics();
    for(const p of sparks){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.03; } sparks=sparks.filter(p=>p.life>0);
    for(const c of confetti){ c.x+=c.vx; c.y+=c.vy; c.vy+=0.3; c.vx*=0.99; c.rot+=c.vr; c.life-=0.006; } confetti=confetti.filter(c=>c.life>0&&c.y<H+40);
    // aim中もギミックを動かす（命を感じる）
    if(state==='aim') updateGimmicks(lv(), null);
  }
  function loop(){ update(); draw(); requestAnimationFrame(loop); }

  // ============ 入力 ============
  function toL(cx,cy){ const r=cv.getBoundingClientRect(); return {x:(cx-r.left)/scale,y:(cy-r.top)/scale}; }
  function onDown(x,y){ audio(); const p=toL(x,y);
    if(hitB(btnHome,p.x,p.y)){ goTitle(); return; }
    if(hitB(btnAgain,p.x,p.y)){ retry(); return; }
    if(hitB(btnNext,p.x,p.y)){ nextLevel(); return; }
    if(state==='roll') return;
    if(state==='win'||state==='lose'){ retry(); return; }
    if(p.y<FLOOR_Y) dropBall(p.x);
  }
  function onMove(x,y){ if(state!=='aim') return; const p=toL(x,y); if(p.y<230) aim=Math.max(WALL+R+4,Math.min(W-WALL-R-4,p.x)); }
  cv.addEventListener('mousedown',e=>onDown(e.clientX,e.clientY));
  cv.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
  cv.addEventListener('touchstart',e=>{e.preventDefault();const t=e.changedTouches[0];onMove(t.clientX,t.clientY);onDown(t.clientX,t.clientY);},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();const t=e.changedTouches[0];onMove(t.clientX,t.clientY);},{passive:false});

  function retry(){ ball=null; confetti=[]; sparks=[]; state='aim'; aim=null; for(const st of lv().stars) st.got=false; starsGot=0; }
  function nextLevel(){ levelIdx=(levelIdx+1)%LEVELS.length; retry(); sndTick(); }
  function goTitle(){ retry(); document.getElementById('start').style.display='flex'; }

  let started=false;
  document.getElementById('startBtn').addEventListener('click',()=>{ audio(); document.getElementById('start').style.display='none'; tone(880,0.15,'triangle',0.2); resize(); if(!started){ started=true; loop(); } });
  resize();
})();
</script>
</body>
</html>
