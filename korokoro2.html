<script>
'use strict';
/* =========================================================
   ころころスイッチ工房
   6さいむけ 2D ぶつり パズル (ギミック配置型 / ルールB)
   - どうぐ箱からギミックをドラッグして置く
   - ▶ ためす でボールがころがる
   - ゴールにはいったら「できた！」
   ========================================================= */
const { Engine, Bodies, Body, Composite, Constraint, Events } = Matter;
// v7: ステージが小さく 衝突速度も おそい。既定の resting しきい値(4)だと
// はねかえし が 反発しないため さげる
Matter.Resolver._restingThresh = 1.6;

/* ---------- 定数 ---------- */
const STAGE_W = 800, STAGE_H = 480, TOOL_H = 120, SIDE_W = 208;
const CX = STAGE_W / 2;                 // ステージ中央(UIの中心に使う)
let W = STAGE_W, H = STAGE_H + TOOL_H;   // キャンバス論理サイズ(むきで かわる)
let landscape = false;                   // よこながレイアウト(どうぐ箱を みぎに)
const GRID = 32;                // v7: 48→32。盤面が実質 25×15 マスに
const BALL_R = 12;              // v7: 18→12
const GOAL_W = 44, GOAL_H = 44;
const GOAL_SUCK = 34;           // ゴール吸い込み半径(v6の46は抜け道製造機だった)
const SPRING_V = 7.2;           // ジャンプ台の上向き速度(v7: 弱体化。頂点≒3グリッド)
const FAN_FORCE = 0.0015;       // 扇風機の横方向の力
const FAN_RANGE = 155;          // 扇風機の風のとどく距離
const FAN_ZONE_H = 75;          // 風のとどく高さ
const RUN_SUBSTEP = 1000 / 120; // 物理サブステップ

/* ---------- ギミック定義 ---------- */
const GADGET_DEFS = {
  ramp:   { label: 'さか',        w: 80,  h: 40,  flip: true  },
  spring: { label: 'ジャンプだい', w: 56,  h: 18,  flip: false },
  bumper: { label: 'はねかえし',   w: 43,  h: 67,  flip: true  },
  fan:    { label: 'せんぷうき',   w: 37,  h: 43,  flip: true  },
  seesaw: { label: 'シーソー',     w: 112, h: 52,  flip: false }, // アンカー=いた上面中心
  switch_blue:   { label: 'あおボタン',   w: 56, h: 12, flip: false, swColor: 'blue' },
  switch_red:    { label: 'あかボタン',   w: 56, h: 12, flip: false, swColor: 'red' },
  switch_yellow: { label: 'きいろボタン', w: 56, h: 12, flip: false, swColor: 'yellow' },
  mover:  { label: 'うごくゆか',   w: 64,  h: 12,  flip: false }, // アンカー=いた上面中心(よこに いったりきたり)
  pendulum:{ label: 'ふりこ',      w: 24,  h: 24,  flip: true  }, // アンカー=支点。flip=最初に ふりあげる がわ
  cannon: { label: 'たいほう',     w: 40,  h: 40,  flip: true  }, // アンカー=下端中央。ななめ上に うちだす
  belt:   { label: 'ベルト',       w: 96,  h: 14,  flip: true  }, // アンカー=上面中央。上の ボールを よこに はこぶ
  domino: { label: 'ドミノ',       w: 14,  h: 48,  flip: false }, // アンカー=下端中央。とうかいれんさ(物理)
};
const SEESAW_LEN = 104, SEESAW_HALF = 52, SEESAW_MAXA = 25 * Math.PI / 180;
const SEESAW_DROP = 6; // アンカーy=いたの上面。かいてん中心は そこから DROP だけ下。
// うごくゆか: よこに sin で いったりきたり(板は実体。摩擦で はこぶ)
const MOVE_HALF = 32, MOVE_AMP = 64, MOVE_W = 2 * Math.PI / 2400;
// ふりこ: 支点から ぶらさがる おもり(動的ボディ+ピン拘束。重力で ふれる)
const PEND_LEN = 80, PEND_AMP = 0.9, PEND_BOB = 12;
const PEND_TARGETV = 4.3;      // 最下点の 目標speed(振幅0.9radぶん)。拘束の減衰を escapement で おぎなう
// たいほう: ボールを ななめ上に うちだす / ベルト: 上の ボールを よこに はこぶ
const CANNON_VX = 5.5, CANNON_VY = 8.0, CANNON_H = 40;
const BELT_HALF = 48, BELT_SPEED = 3.4;
const WARP_R = 18, STAR_R = 12;           // ワープの あな / あつめる ほし
const DOMINO_W = 10, DOMINO_H = 48;       // ドミノ(立てた いた)
function moverX(ax, t, ph) { return ax - MOVE_AMP * Math.cos(t * MOVE_W + (ph || 0)); }  // 左端から しずかに うごきだす(ph で 初期位相)
// スイッチ床・作動対象の いろ (スイッチと おなじ いろの とびら/はし/せんぷうきが うごく)
const TRIGGER_COLORS = {
  blue:   { main: '#3d8bff', dark: '#1f5fd0', light: '#cfe3ff' },
  red:    { main: '#ef476f', dark: '#c22c50', light: '#ffd4de' },
  yellow: { main: '#f4b400', dark: '#c68a00', light: '#ffebb0' },
};

/* ---------- レベルデータ ----------
   すべての座標はステージ左上原点。ギミックの (x,y) は下端中央アンカー。
   B(x1,y1,x2,y2): 固定ブロック / F(x1,x2): ゆか(上面432)
   hints = こたえ(ゴースト表示にも、自動テストにも使う) */
function B(x1, y1, x2, y2, kind) {
  return { type: kind || 'block', x: (x1 + x2) / 2, y: (y1 + y2) / 2, w: x2 - x1, h: y2 - y1 };
}
function F(x1, x2) { return B(x1, 416, x2, 480, 'floor'); }   // v7: ゆか上面416(=13×32、グリッド一致)
function R(x, y, w, h) { return { x, y, w, h }; }
function Hn(type, x, y, flip) { return { type, x, y, flip: !!flip }; }
// 作動対象(ステージに もとから ある しかけ)。color は スイッチと そろえる。
function Door(color, x, top, h)   { return { kind: 'door',   color, x, y: top, w: 18, h }; }
function Bridge(color, x, top, w) { return { kind: 'bridge', color, x, y: top, w, h: 12 }; }
function TFan(color, x, ybottom, dir) { return { kind: 'fan', color, x, y: ybottom, dir: dir || 1 }; }
// ワープ: いりぐち(ax,ay)に はいると でぐち(bx,by)へ / ほし: あつめてから ゴール
function Warp(ax, ay, bx, by) { return { ax, ay, bx, by }; }
function Star(x, y) { return { x, y }; }

/* ---------- キャンバス ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let viewScale = 1;
function fitCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  // よこに ひろい画面(スマホ横向きなど)では どうぐ箱を みぎに おいて はばを ひろく つかう
  landscape = vw / vh > 1.5;
  if (landscape) { W = STAGE_W + SIDE_W; H = STAGE_H; }
  else { W = STAGE_W; H = STAGE_H + TOOL_H; }
  layoutUI();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const s = Math.min(vw / W, vh / H);
  viewScale = s;
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
  canvas.width = Math.round(W * s * dpr);
  canvas.height = Math.round(H * s * dpr);
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}

}

/* ---------- 配置ルール ---------- */
function gadgetBBox(type, x, y) {
  if (type === 'seesaw') return { x: x - SEESAW_HALF - 4, y: y - 26, w: SEESAW_LEN + 8, h: 54 }; // アンカー=いた上面
  if (type === 'mover') { // アンカー=いた上面中心。よこ移動ぶんも ふくむ
    const half = MOVE_HALF + MOVE_AMP;
    return { x: x - half, y: y - 4, w: half * 2, h: 14 };
  }
  if (type === 'pendulum') { // アンカー=支点(うえ)。下の ふれる はんいを ふくむ
    const reach = Math.sin(PEND_AMP) * PEND_LEN + PEND_BOB;
    return { x: x - reach, y: y - 8, w: reach * 2, h: PEND_LEN + PEND_BOB + 10 };
  }
  if (type === 'cannon') return { x: x - 20, y: y - CANNON_H, w: 40, h: CANNON_H };
  if (type === 'belt') return { x: x - BELT_HALF, y: y - 2, w: BELT_HALF * 2, h: 16 }; // アンカー=上面
  if (type === 'domino') return { x: x - 7, y: y - DOMINO_H, w: 14, h: DOMINO_H };
  const d = GADGET_DEFS[type];
  return { x: x - d.w / 2, y: y - d.h, w: d.w, h: d.h };
}
function rectsOverlap(a, b, pad) {
  pad = pad || 0;
  return a.x + pad < b.x + b.w && a.x + a.w - pad > b.x &&
         a.y + pad < b.y + b.h && a.y + a.h - pad > b.y;
}
function overlapDepth(a, b) {
  const ix = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
  const iy = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
  return (ix > 0 && iy > 0) ? Math.min(ix, iy) : 0;
}
function circleRectDist(cx, cy, r) {
  const dx = Math.max(r.x - cx, 0, cx - (r.x + r.w));
  const dy = Math.max(r.y - cy, 0, cy - (r.y + r.h));
  return Math.hypot(dx, dy);
}
function snap(v) { return Math.round(v / GRID) * GRID; }

function canPlace(type, x, y, ignoreIndex) {
  const bb = gadgetBBox(type, x, y);
  const A = level.area;
  // 配置可能エリアの中
  if (bb.x < A.x - 1 || bb.y < A.y - 1 || bb.x + bb.w > A.x + A.w + 1 || bb.y + bb.h > A.y + A.h + 1) return false;
  // 画面内
  if (bb.x < 0 || bb.x + bb.w > W || bb.y < 0 || y > STAGE_H) return false;
  // ボールのスタート位置(すべての ボール)
  for (const s of ballStarts()) if (circleRectDist(s.x, s.y, bb) < BALL_R + 4) return false;
  // ゴール(うごくゆかは 移動はんい全体でなく いた本体で 判定 — ゴールの そばを 通るのは OK)
  const g = { x: level.goal.x - GOAL_W / 2, y: level.goal.y - GOAL_H / 2, w: GOAL_W, h: GOAL_H };
  const gbb = type === 'mover' ? { x: x - MOVE_HALF, y: y - 4, w: MOVE_HALF * 2, h: 14 } : bb;
  if (rectsOverlap(gbb, g, 0)) return false;
  // スイッチ床・たいほう・ドミノは ゆかの うえだけ (くうちゅうには おけない)
  if (type.startsWith('switch') || type === 'cannon' || type === 'domino') {
    let onFloor = false;
    for (const s of level.statics) {
      const top = s.y - s.h / 2;
      if (Math.abs(top - y) < 18 && x > s.x - s.w / 2 - 12 && x < s.x + s.w / 2 + 12) onFloor = true;
    }
    if (!onFloor) return false;
  }
  // ドミノどうしは 16px(半マス)以上 はなす
  if (type === 'domino') {
    const all0 = placements.concat(level.fixed || []);
    for (let i = 0; i < all0.length; i++) {
      if (i === ignoreIndex) continue;
      if (all0[i].type === 'domino' && Math.abs(all0[i].x - x) < 16 && Math.abs(all0[i].y - y) < DOMINO_H) return false;
    }
  }
  // ワープの あな・ほし の うえには おけない
  for (const w of (level.warps || [])) if (circleRectDist(w.ax, w.ay, bb) < WARP_R + 4 || circleRectDist(w.bx, w.by, bb) < WARP_R + 4) return false;
  for (const st of (level.stars || [])) if (circleRectDist(st.x, st.y, bb) < STAR_R + 4) return false;
  // 固定の壁・ゆか (すこしの重なりはOK)。シーソーは あなに はしを かける ので ゆか判定は ゆるめ。
  const overlapMax = (type === 'seesaw' || type === 'pendulum') ? 28 : (type === 'mover' || type === 'belt' ? 16 : 10);
  for (const s of level.statics) {
    const sr = { x: s.x - s.w / 2, y: s.y - s.h / 2, w: s.w, h: s.h };
    if (overlapDepth(bb, sr) > overlapMax) return false;
  }
  // 作動対象(とびら・はし)とも かさならない
  for (const t of (level.triggers || [])) {
    if (t.kind === 'door') { if (rectsOverlap(bb, { x: t.x - t.w / 2, y: t.y, w: t.w, h: t.h }, 2)) return false; }
  }
  // ほかのギミック
  const all = placements.concat(level.fixed || []);
  for (let i = 0; i < all.length; i++) {
    if (i === ignoreIndex) continue;
    if (all[i].fixedSwitch) continue;
    if (rectsOverlap(bb, gadgetBBox(all[i].type, all[i].x, all[i].y), 2)) return false;
  }
  return true;
}
function remainCount(type) {
  const total = (level.gadgets[type] || 0);
  const used = placements.filter(p => p.type === type).length;
  return total - used;
}
// ドロップ位置が そのままでは おけない ときは、いちばん ちかい おける マスに すいつく
// (壁ぎわなどで ぴったり おけない のを たすける)
function findPlace(type, rawX, rawY, ignoreIndex) {
  const gy0 = Math.min(rawY, STAGE_H);
  const sx0 = snap(rawX), sy0 = snap(gy0);
  if (canPlace(type, sx0, sy0, ignoreIndex)) return { x: sx0, y: sy0 };
  let best = null, bestD = Infinity;
  const R = 3;                                   // さがす はんい(グリッドすう)
  for (let dx = -R; dx <= R; dx++) {
    for (let dy = -R; dy <= R; dy++) {
      if (dx === 0 && dy === 0) continue;
      const x = sx0 + dx * GRID, y = sy0 + dy * GRID;
      if (!canPlace(type, x, y, ignoreIndex)) continue;
      const d = Math.hypot(x - rawX, y - gy0);
      if (d < bestD) { bestD = d; best = { x, y }; }
    }
  }
  return best;                                   // どこにも おけない ときは null
}

/* =========================================================
   物理 (Matter.js)
   ========================================================= */
function rampBody(x, y, flip) {
  // アンカー(x,y)=下端中央 / flip=false:「＼」(左が高い) true:「∕」(右が高い)
  let verts, cx, cy;
  if (!flip) { verts = [{ x: -40, y: 0 }, { x: 40, y: 0 }, { x: -40, y: -40 }]; cx = -13.3; cy = -13.3; }
  else       { verts = [{ x: -40, y: 0 }, { x: 40, y: 0 }, { x: 40, y: -40 }];  cx = 13.3;  cy = -13.3; }
  const b = Bodies.fromVertices(x + cx, y + cy, [verts], {
    isStatic: true, friction: 0.002, restitution: 0.1,
  });
  b.plugin = { kind: 'ramp' };
  return b;
}
function springBody(x, y, key) {
  const b = Bodies.rectangle(x, y - 9, 56, 18, { isStatic: true, friction: 0.1, restitution: 0 });
  b.plugin = { kind: 'spring', key };
  return b;
}

  // ながさ73のかたむいた板 (70°)。flip=false:「＼」おちてくるボールを右へ / true:「∕」左へ
  const ang = (flip ? -1 : 1) * Math.PI * 7 / 18;
  const b = Bodies.rectangle(x, y - 32, 73, 12, {
    isStatic: true, angle: ang, friction: 0, restitution: 1.4,
  });
  b.plugin = { kind: 'bumper' };
  return b;
}
function fanBody(x, y) {

  b.plugin = { kind: 'fan' };
  return b;
}

  if (rigid) {
    const b = Bodies.rectangle(px, py + SEESAW_DROP, SEESAW_LEN, 10, { isStatic: true, friction: 0.012, restitution: 0.08 });
    b.plugin = { kind: 'seesaw' };
    return { body: b, pin: null };
  }
  const b = Bodies.rectangle(px, py + SEESAW_DROP, SEESAW_LEN, 10, {
    friction: 0.02, frictionAir: 0.008, restitution: 0.05, density: 0.002,
  });

  const pin = Constraint.create({ pointA: { x: px, y: py + SEESAW_DROP }, bodyB: b, pointB: { x: 0, y: 0 }, stiffness: 1, length: 0, damping: 0.1 });

}

function buildWorld() {

  engine.gravity.y = 1;

    // friction 0.8: ドミノが すべらず たおれる ため(ボールは pair min で 影響なし)
    const b = Bodies.rectangle(s.x, s.y, s.w, s.h, { isStatic: true, friction: 0.04, restitution: 0.05 });

      b.plugin = { kind: 'mover' };

  ballBodies = []; ballMeta = [];
  ballStarts().forEach((s, bi) => {

        let nx = -Math.sin(a), ny = Math.cos(a);
        const rel = { x: ball.position.x - other.position.x, y: ball.position.y - other.position.y };
        if (nx * rel.x + ny * rel.y < 0) { nx = -nx; ny = -ny; }   // ボールの いる がわの 法線
        const v = ball.velocity;
        const dot = v.x * nx + v.y * ny;
        let rx = v.x - 2 * dot * nx, ry = v.y - 2 * dot * ny;
        const sp = Math.hypot(rx, ry);
        const target = Math.max(3.4, sp * 1.1);
        if (sp > 0.01) { rx = rx / sp * target; ry = ry / sp * target; }
        else { rx = nx * target; ry = ny * target; }
        Body.setVelocity(ball, { x: rx, y: ry });
        if (!simMode) SND.pon();
      }
    }
  });
}

function activateTrigger(color) {
  if (triggerStates[color]) return;
  triggerStates[color] = true;
  lastEventT = runT;
  for (const d of doorList) if (d.obj.color === color && !d.opened) {
    Composite.remove(engine.world, d.body); d.opened = true; d.openT = runT;
    // とびらの まえで まっていた ボールを かるく おしだす(あいた ときの ごほうび)
    for (const bb of ballBodies) {
      const t = d.obj;
      if (Math.abs(bb.position.y - (t.y + t.h / 2)) < t.h / 2 + 30 && Math.abs(bb.position.x - t.x) < 44) {
        Body.setVelocity(bb, { x: Math.sign(t.x - bb.position.x) * 1.6 || 1.6, y: bb.velocity.y });
      }
    }
  }
  for (const br of bridgeList) if (br.obj.color === color && !br.shown) { Composite.add(engine.world, br.body); br.shown = true; br.showT = runT; }
  if (!simMode) SND.open();
}

let simMode = false;
let pendingSprings = [];
function startRun(sim) {
  simMode = !!sim;
  stopRun();
  buildWorld();
  scene = 'run';
  runT = 0; contactMs = 0; stallMs = 0; runResult = null;
  if (!sim) SND.start();
}

function stepPhysics(dtMs) {
  if (!engine || runResult) return;
  const steps = Math.round(dtMs / RUN_SUBSTEP);
  const all = placements.concat(level.fixed || []);
  const g = level.goal;
  const gr = { x: g.x - GOAL_W / 2, y: g.y - GOAL_H / 2, w: GOAL_W, h: GOAL_H };
  for (let i = 0; i < steps; i++) {
    // ちからを かける まえに 各ボールの よこの いきおいを おぼえる
    for (const bb of ballBodies) bb._pvx = bb.velocity.x;
    // 風・ゴール吸い込みは 各ボールに
    for (const bb of ballBodies) {
      const bp = bb.position;
      for (const p of all) {
        if (p.type !== 'fan') continue;
        const dir = p.flip ? -1 : 1;
        const zx1 = dir > 0 ? p.x - 10 : p.x + 10 - FAN_RANGE;
        if (bp.x > zx1 && bp.x < zx1 + FAN_RANGE && bp.y > p.y - FAN_ZONE_H && bp.y < p.y + 10) Body.applyForce(bb, bp, { x: dir * FAN_FORCE, y: 0 });
      }
      for (const f of fanTrigList) {
        if (!triggerStates[f.obj.color]) continue;
        const dir = f.obj.dir;
        const zx1 = dir > 0 ? f.obj.x - 10 : f.obj.x + 10 - FAN_RANGE;
        if (bp.x > zx1 && bp.x < zx1 + FAN_RANGE && bp.y > f.obj.y - FAN_ZONE_H && bp.y < f.obj.y + 10) Body.applyForce(bb, bp, { x: dir * FAN_FORCE, y: -0.00008 });
      }
      const dgx = g.x - bp.x, dgy = g.y - bp.y, dg = Math.hypot(dgx, dgy);
      if (dg < GOAL_SUCK && dg > 1 && starsDone()) Body.applyForce(bb, bp, { x: dgx / dg * 0.00025, y: dgy / dg * 0.00025 });
    }
    // スイッチ床: ボール または たおれた ドミノが 0.15びょう のれば ON
    for (const sw of switchList) {
      if (triggerStates[sw.color]) continue;
      let over = false;
      for (const bb of ballBodies) { const bp = bb.position; if (bp.x > sw.x - 32 && bp.x < sw.x + 32 && bp.y > sw.y - 36 && bp.y < sw.y + 12) { over = true; break; } }
      if (!over) for (const dm of dominoList) {
        const dp = dm.body.position;
        if (Math.abs(dm.body.angle) > 0.5 && dp.x > sw.x - 48 && dp.x < sw.x + 48 && dp.y > sw.y - 40 && dp.y < sw.y + 12) { over = true; break; }
      }
      if (over) { sw.pressMs += RUN_SUBSTEP; if (sw.pressMs >= 100) activateTrigger(sw.color); }
      else sw.pressMs = Math.max(0, sw.pressMs - RUN_SUBSTEP * 0.5);
    }
    // シーソー: ボールの重さで かたむく (動的いた+ピン留め・角度せいげん)
    for (const s of seesawList) {
      if (s.slow) { s.place._angle = 0; continue; }
      const b = s.body;
      Body.setPosition(b, { x: s.px, y: s.cy });
      if (b.angle > SEESAW_MAXA) { Body.setAngle(b, SEESAW_MAXA); if (b.angularVelocity > 0) Body.setAngularVelocity(b, 0); }
      else if (b.angle < -SEESAW_MAXA) { Body.setAngle(b, -SEESAW_MAXA); if (b.angularVelocity < 0) Body.setAngularVelocity(b, 0); }
      s.place._angle = b.angle;
    }
    // うごくゆか(物理): 位置と いっしょに 速度も わたす → 摩擦で ボールが はこばれる
    for (const mv of moverList) {
      const cx = moverX(mv.ax, runT, level.moverPhase);
      const dx = cx - mv.prevCx;                       // px / サブステップ = いたの ほんとうの速度
      // updateVelocity=true: いたの 速度が 衝突応答に つたわる(よこから おす・摩擦)
      Body.setPosition(mv.body, { x: cx, y: mv.ay + 7 }, true);
      mv.prevCx = cx; mv.place._cx = cx;
      // 摩擦の たすけ(クーロン摩擦の 近似): のっている ボールを いたの 速度へ ちかづける。
      // 吸着や座標セットは しない → いたの はしから しぜんに おちる
      const topY = mv.ay;
      // Matter 0.19 の velocity は 16.6ms基準の正規化値 → サブステップ変位は 2倍して わたす
      const vPlank = dx * ((1000 / 60) / RUN_SUBSTEP);
      for (const bb of ballBodies) {
        const bp = bb.position;
        // ゴールの ちかくでは 手を はなす(すいこみに まかせる)
        if (Math.hypot(g.x - bp.x, g.y - bp.y) < GOAL_SUCK + 18 && starsDone()) continue;
        if (bp.x > cx - MOVE_HALF - 16 && bp.x < cx + MOVE_HALF + 16 && bp.y > topY - BALL_R - 6 && bp.y < topY - BALL_R + 4 && Math.abs(bb.velocity.y) < 4) {
          Body.setVelocity(bb, { x: bb.velocity.x + (vPlank - bb.velocity.x) * 0.5, y: bb.velocity.y });
        }
      }
    }
    // ふりこ(物理): おもりは 動的ボディ+ピン拘束。ここでは 描画用の 角度と、
    // 振幅の めべり を おぎなう さいしょうげんの エネルギー補給 だけ おこなう
    for (const pd of pendList) {
      const b = pd.body;
      const dx = b.position.x - pd.px, dy = b.position.y - pd.py;
      pd.place._ang = Math.atan2(dx, dy);              // 0=ました
      // escapement: 拘束ソルバの 減衰ぶんを 最下点通過時に そっと おぎなう
      // (時計の しくみと おなじ。衝突の 瞬間の 応答には ふれない)
      const sp = Math.hypot(b.velocity.x, b.velocity.y);
      if (Math.abs(pd.place._ang) < 0.3) {
        if (sp > 0.05 && sp < PEND_TARGETV * 0.95) {
          const k = Math.min(1.06, (PEND_TARGETV * 0.98) / sp);
          Body.setVelocity(b, { x: b.velocity.x * k, y: b.velocity.y * k });
        } else if (sp <= 0.05) {
          // 完全に とまったら 初期の ふれの ほうへ よわく おしなおす
          const dir0 = pd.place.flip ? -1 : 1;
          Body.setVelocity(b, { x: dir0 * 0.3, y: 0 });
        }
      }
    }
    // たいほう: くちに はいった ボールを ななめ上に うちだす
    for (const cn of cannonList) {
      const mx = cn.place.x, my = cn.place.y - 15;
      for (let bi = 0; bi < ballBodies.length; bi++) {
        const bb = ballBodies[bi], bp = bb.position;
        if (Math.hypot(bp.x - mx, bp.y - my) < 20) {
          if (!cn.fireT[bi] || runT - cn.fireT[bi] > 500) {
            cn.fireT[bi] = runT;
            lastEventT = runT;
            Body.setPosition(bb, { x: mx, y: my });
            Body.setVelocity(bb, { x: cn.dir * CANNON_VX, y: -CANNON_VY });
            if (!simMode) SND.boing();
          }
        }
      }
    }
    // ベルト: 上に のった ボールを よこに はこぶ
    for (const bl of beltList) {
      const bx = bl.place.x, topY = bl.place.y;
      for (const bb of ballBodies) {
        const bp = bb.position;
        if (bp.x > bx - BELT_HALF - 2 && bp.x < bx + BELT_HALF + 2 && bp.y > topY - BALL_R - 10 && bp.y < topY + 8 && bb.velocity.y > -1.5) {
          const target = bl.dir * BELT_SPEED;
          Body.setVelocity(bb, { x: bb.velocity.x + (target - bb.velocity.x) * 0.3, y: bb.velocity.y });
        }
      }
    }
    // ワープ: いりぐちに はいると でぐちへ とぶ
    for (const w of warpList) {
      const o = w.obj;
      for (let bi = 0; bi < ballBodies.length; bi++) {
        const bb = ballBodies[bi], bp = bb.position;
        if ((w.coolT[bi] == null || runT - w.coolT[bi] > 400) && Math.hypot(bp.x - o.ax, bp.y - o.ay) < WARP_R) {
          w.coolT[bi] = runT;
          lastEventT = runT;
          Body.setPosition(bb, { x: o.bx, y: o.by });
          // よこの いきおいを のこして でぐちから でる(はいった むきに すすむ)
          Body.setVelocity(bb, { x: Math.max(-6, Math.min(6, bb.velocity.x)), y: Math.max(1.5, bb.velocity.y * 0.3) });
          if (!simMode) SND.pon();
        }
      }
    }
    // ほし: ボールが ふれると あつめる
    for (const st of starList) {
      if (st.got) continue;
      for (const bb of ballBodies) {
        if (Math.hypot(bb.position.x - st.obj.x, bb.position.y - st.obj.y) < STAR_R + BALL_R) { st.got = true; lastEventT = runT; if (!simMode) SND.press(); break; }
      }
    }
    pendingSprings = [];
    Engine.update(engine, RUN_SUBSTEP);
    for (const ps of pendingSprings) {
      const topY = ps.spring.bounds.min.y - BALL_R - 1;
      if (ps.ball.position.y > topY) Body.setPosition(ps.ball, { x: ps.ball.position.x, y: topY });
      Body.setVelocity(ps.ball, { x: ps.ball._pvx, y: -SPRING_V });
    }
    pendingSprings = [];
    runT += RUN_SUBSTEP;

    // ゴール判定(どれかの ボール) & しっぱい判定
    let aliveCount = 0, allStalled = true;
    for (let bi = 0; bi < ballBodies.length; bi++) {
      const bb = ballBodies[bi], m = ballMeta[bi];
      if (!m.alive) continue;
      const bp = bb.position;
      const centerIn = bp.x > gr.x && bp.x < gr.x + gr.w && bp.y > gr.y && bp.y < gr.y + gr.h;
      const touching = circleRectDist(bp.x, bp.y, gr) < BALL_R;
      if (touching) m.contactMs += RUN_SUBSTEP; else m.contactMs = 0;
      // goalBall が していされていれば その ボールだけ ゴールできる(みちを つくる ボールは ゴール しても クリアにならない)
      const canGoal = (level.goalBall == null || bi === level.goalBall) && starsDone();
      if (canGoal && (centerIn || m.contactMs >= 300)) { finishRun('win'); return; }
      // がめんの そとに でた ボールは たいじょう(みちを つくる ボールは でても OK)
      if (bp.y > STAGE_H + 140 || bp.x < -80 || bp.x > STAGE_W + 80) { m.alive = false; continue; }
      aliveCount++;
      const sp = Math.hypot(bb.velocity.x, bb.velocity.y);
      if (runT > 1200 && sp < 0.22) m.stallMs += RUN_SUBSTEP; else m.stallMs = 0;
      if (m.stallMs <= 2500) allStalled = false;
    }
    // ドミノの 詰まりかいしょう: たおれかけ(0.3rad超)で 完全に とまった いたは
    // たおれる ほうへ ごく小さく おしてやる(かさなり摩擦で ひっかかる のを ふせぐ)
    for (const dm of dominoList) {
      const b = dm.body;
      if (Math.abs(b.angle) > 0.12 && Math.abs(b.angle) < 1.45 && Math.abs(b.angularVelocity) < 0.015) {
        Body.setAngularVelocity(b, Math.sign(b.angle) * 0.06);
      }
    }
    // できごと(トリガーON・ほし・ワープ・たいほう)や ドミノの うごきが あれば「まち」とみなす
    let dominoActive = false;
    for (const dm of dominoList) {
      const b = dm.body;
      if (Math.hypot(b.velocity.x, b.velocity.y) > 0.2 || Math.abs(b.angularVelocity) > 0.03) { dominoActive = true; break; }
    }
    if (dominoActive || runT - lastEventT < 2500) {
      for (const m of ballMeta) m.stallMs = 0;
      allStalled = false;
    }
    if (aliveCount === 0) { finishRun('fail', 'そとに でちゃった'); return; }
    if (allStalled) { finishRun('fail', 'とまっちゃった'); return; }
    if (runT > level.limit * 1000) { finishRun('fail', 'じかんぎれ'); return; }
  }
  // 演出用トレイル(各ボール)
  if (!simMode) {
    for (let bi = 0; bi < ballBodies.length; bi++) {
      const m = ballMeta[bi]; if (!m.alive) continue;
      m.trail.push({ x: ballBodies[bi].position.x, y: ballBodies[bi].position.y });
      if (m.trail.length > 70) m.trail.shift();
    }
  }
}

const MISS_TEXTS = ['おしい！ もういちど ためそう', 'ちょっと なおしてみよう！'];
let missCount = 0;
function finishRun(result, reason) {
  runResult = { result, reason, t: runT };
  if (simMode) return;
  runEndAt = globalT;
  if (result === 'win') {
    SND.win();
    progress.stars[levelIdx + 1] = true;
    saveProgress();
    burstConfetti(level.goal.x, level.goal.y - 20);
    setTimeout(() => { if (scene === 'run') scene = 'win'; }, 900);
  } else {
    SND.miss();
    toast = { text: MISS_TEXTS[(missCount++) % MISS_TEXTS.length], until: globalT + 1800, kind: 'miss' };
    setTimeout(() => { if (scene === 'run') { stopRun(); scene = 'edit'; } }, 1500);
  }
}

/* 自動テスト用: ヒントどおりに置いて、そのまま物理をまわす */
function simulateSolution(i) {
  loadLevel(i);
  for (const h of LEVELS[i].hints) {
    // プレイヤーと おなじく グリッドに スナップして おく
    const sx = snap(h.x), sy = snap(Math.min(h.y, STAGE_H));
    if (!canPlace(h.type, sx, sy, -1)) return { result: 'error', reason: 'hint snaps invalid: ' + JSON.stringify({ t: h.type, hx: h.x, hy: h.y, sx, sy }) };
    placements.push({ type: h.type, x: sx, y: sy, flip: !!h.flip });
  }
  startRun(true);
  const maxMs = (level.limit + 4) * 1000;
  const trace = [];
  let lastMark = -500;
  while (!runResult && runT < maxMs) {
    stepPhysics(1000 / 60);
    if (runT - lastMark >= 500 && ballBodies.length) {
      lastMark = runT;
      trace.push({ t: Math.round(runT), x: Math.round(ballBodies[0].position.x), y: Math.round(ballBodies[0].position.y), vx: +ballBodies[0].velocity.x.toFixed(1),
        b: ballBodies.map((bb, k) => [Math.round(bb.position.x), Math.round(bb.position.y), ballMeta[k].alive ? 1 : 0]) });
    }
  }
  const out = Object.assign({ trace }, runResult || { result: 'fail', reason: 'no result' });
  stopRun(); scene = 'edit'; placements = [];
  return out;
}
window.KOROKORO = {
  levels: LEVELS.length,
  goto: i => loadLevel(i),
  test: i => simulateSolution(i),
  testAll() { return LEVELS.map((l, i) => Object.assign({ level: i + 1, name: l.name }, simulateSolution(i))); },
  state: () => ({ scene, levelIdx, runResult }),
};

/* =========================================================
   えがく
   ========================================================= */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, STAGE_H);
  g.addColorStop(0, '#c9ecff'); g.addColorStop(1, '#f3fbf1');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, STAGE_H);
  // くも
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  const clouds = [[120, 70, 34], [190, 62, 26], [560, 100, 30], [620, 92, 24], [380, 50, 22]];
  for (const [x, y, r] of clouds) {
    const dx = Math.sin(globalT / 4000 + x) * 6;
    ctx.beginPath(); ctx.arc(x + dx, y, r, 0, 7); ctx.arc(x + dx + r * 0.9, y + 6, r * 0.75, 0, 7); ctx.fill();
  }
}
function drawStatics() {
  for (const s of level.statics) {
    const x = s.x - s.w / 2, y = s.y - s.h / 2;
    ctx.fillStyle = '#e3b077';
    rr(x, y, s.w, s.h, 6); ctx.fill();
    ctx.fillStyle = '#8fd06c';                       // 上のくさ
    rr(x, y, s.w, Math.min(10, s.h), 5); ctx.fill();
    ctx.strokeStyle = 'rgba(140,90,40,.35)'; ctx.lineWidth = 2;
    rr(x + 1, y + 1, s.w - 2, s.h - 2, 6); ctx.stroke();
  }
}
function warpRing(x, y, col1, col2, spin) {
  ctx.save(); ctx.translate(x, y);
  const g = ctx.createRadialGradient(0, 0, 3, 0, 0, WARP_R);
  g.addColorStop(0, col2); g.addColorStop(1, col1);
  ctx.fillStyle = g; ctx.globalAlpha = 0.55; ctx.beginPath(); ctx.arc(0, 0, WARP_R, 0, 7); ctx.fill();
  ctx.globalAlpha = 1; ctx.strokeStyle = col1; ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(0, 0, WARP_R, 0, 7); ctx.stroke();
  ctx.rotate(spin); ctx.strokeStyle = col2; ctx.lineWidth = 3; ctx.lineCap = 'round';
  for (let i = 0; i < 3; i++) { ctx.rotate(Math.PI * 2 / 3); ctx.beginPath(); ctx.arc(0, 0, WARP_R - 8, 0, 1.4); ctx.stroke(); }
  ctx.restore();
}
function drawWarps() {
  for (const w of (level.warps || [])) {
    warpRing(w.ax, w.ay, '#3d8bff', '#bfe0ff', globalT / 400);
    warpRing(w.bx, w.by, '#f4820a', '#ffe0b0', -globalT / 400);
  }
}
function drawStars() {
  for (const s of (level.stars || [])) {
    const got = scene === 'run' && starList.find(z => z.obj === s && z.got);
    ctx.save(); ctx.globalAlpha = got ? 0.25 : 1;
    if (!got) { ctx.shadowColor = '#ffd166'; ctx.shadowBlur = 10 + Math.sin(globalT / 200) * 5; }
    drawStar(s.x, s.y + Math.sin(globalT / 300) * 3, STAR_R, got ? '#c9c2a8' : '#ffd166');
    ctx.restore();
  }
}
function drawDoor(t) {
  const c = TRIGGER_COLORS[t.color];
  let openOff = 0, alpha = 1;
  if (scene === 'run') { const d = doorList.find(d => d.obj === t); if (d && d.opened) { const k = Math.min(1, (runT - d.openT) / 400); openOff = k * (t.h + 8); alpha = 1 - k * 0.85; } }
  ctx.save(); ctx.globalAlpha = alpha;
  const dx = t.x - t.w / 2, dy = t.y - openOff;
  ctx.fillStyle = c.main; rr(dx, dy, t.w, t.h, 5); ctx.fill();
  ctx.strokeStyle = c.dark; ctx.lineWidth = 3; rr(dx, dy, t.w, t.h, 5); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 2;
  for (let yy = dy + 20; yy < dy + t.h - 8; yy += 26) { ctx.beginPath(); ctx.moveTo(dx + 5, yy); ctx.lineTo(dx + t.w - 5, yy); ctx.stroke(); }
  ctx.restore();
}
function drawBridge(t) {
  const c = TRIGGER_COLORS[t.color];
  const br = scene === 'run' ? bridgeList.find(b => b.obj === t) : null;
  const shown = br && br.shown;
  if (!shown) {
    ctx.save(); ctx.globalAlpha = 0.5 + Math.sin(globalT / 300) * 0.12;
    ctx.strokeStyle = c.main; ctx.lineWidth = 2.5; ctx.setLineDash([9, 7]);
    rr(t.x - t.w / 2, t.y, t.w, t.h, 6); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
  } else {
    const k = Math.min(1, (runT - br.showT) / 280);
    ctx.save(); ctx.globalAlpha = k;
    ctx.fillStyle = c.main; rr(t.x - t.w / 2, t.y, t.w, t.h, 6); ctx.fill();
    ctx.strokeStyle = c.dark; ctx.lineWidth = 3; rr(t.x - t.w / 2, t.y, t.w, t.h, 6); ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,.5)'; ctx.lineWidth = 2;
    for (let xx = t.x - t.w / 2 + 16; xx < t.x + t.w / 2 - 8; xx += 20) { ctx.beginPath(); ctx.moveTo(xx, t.y + 3); ctx.lineTo(xx, t.y + t.h - 3); ctx.stroke(); }
    ctx.restore();
  }
}
function drawFanTrig(t) {
  const active = scene === 'run' && triggerStates[t.color];
  const c = TRIGGER_COLORS[t.color]; const x = t.x, y = t.y, dir = t.dir;
  if (active) {
    ctx.save(); ctx.globalAlpha = 0.55; ctx.strokeStyle = c.main; ctx.lineWidth = 4; ctx.lineCap = 'round';
    for (let i = 0; i < 3; i++) { const phase = ((globalT / 8) + i * 70) % FAN_RANGE; const wx = x + dir * (28 + phase); const wy = y - 26 - i * 20; ctx.beginPath(); ctx.moveTo(wx, wy); ctx.lineTo(wx + dir * 22, wy); ctx.stroke(); }
    ctx.restore();

  ctx.fillStyle = c.main; rr(x - 24, y - 62, 48, 62, 8); ctx.fill();
  ctx.strokeStyle = c.dark; ctx.lineWidth = 3; rr(x - 24, y - 62, 48, 62, 8); ctx.stroke();
  ctx.save(); ctx.translate(x + dir * 6, y - 38); ctx.rotate(active ? globalT / 70 : globalT / 1600);
  ctx.fillStyle = '#fff';
  for (let i = 0; i < 3; i++) { ctx.rotate(Math.PI * 2 / 3); ctx.beginPath(); ctx.ellipse(0, -9, 4.5, 10, 0, 0, 7); ctx.fill(); }
  ctx.beginPath(); ctx.fillStyle = c.dark; ctx.arc(0, 0, 4, 0, 7); ctx.fill(); ctx.restore();
}
function drawTriggers() {
  if (!level.triggers || !level.triggers.length) return;
  // スイッチと 同じ色の 作動対象を てんせんで つなぐ(色べつ)
  const switches = placements.concat(level.fixed || []).filter(p => p.type.startsWith('switch'));
  for (const t of level.triggers) {
    const tx = t.x, ty = t.kind === 'fan' ? t.y - 30 : t.y + (t.h ? t.h / 2 : 0);
    const c = TRIGGER_COLORS[t.color];
    for (const sw of switches) {
      if ((GADGET_DEFS[sw.type].swColor || 'blue') !== t.color) continue;
      ctx.save(); ctx.globalAlpha = 0.55; ctx.strokeStyle = c.main; ctx.lineWidth = 2; ctx.setLineDash([3, 7]);
      ctx.beginPath(); ctx.moveTo(sw.x, sw.y - 10); ctx.lineTo(tx, ty); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
    }
  }
  for (const t of level.triggers) {
    if (t.kind === 'door') drawDoor(t);
    else if (t.kind === 'bridge') drawBridge(t);
    else if (t.kind === 'fan') drawFanTrig(t);

}

function drawStar(x, y, r, color) {
  ctx.save(); ctx.translate(x, y); ctx.fillStyle = color;
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const a = -Math.PI / 2 + i * Math.PI / 5;
    const rad = i % 2 === 0 ? r : r * 0.45;
    ctx.lineTo(Math.cos(a) * rad, Math.sin(a) * rad);
  }
  ctx.closePath(); ctx.fill(); ctx.restore();
}
function drawBall(x, y, angle, ci) {

  ctx.beginPath(); ctx.ellipse(0, BALL_R - 2, BALL_R * 0.8, 5, 0, 0, 7); ctx.fill();

  g.addColorStop(0, c.g0); g.addColorStop(1, c.g1);

  ctx.beginPath(); ctx.arc(0, 0, BALL_R - 1, 0, 7); ctx.stroke();

function drawArea() {
  const A = level.area;
  const glow = hintStage >= 1 ? 0.16 + Math.sin(globalT / 220) * 0.08 : 0.075 + Math.sin(globalT / 500) * 0.03;
  ctx.fillStyle = `rgba(66,165,245,${Math.max(0.04, glow)})`;
  rr(A.x, A.y, A.w, A.h, 10); ctx.fill();
  ctx.strokeStyle = 'rgba(66,165,245,.5)'; ctx.lineWidth = 2.5; ctx.setLineDash([10, 8]);
  rr(A.x, A.y, A.w, A.h, 10); ctx.stroke();
  ctx.setLineDash([]);
  // グリッドのてん
  ctx.fillStyle = 'rgba(66,165,245,.3)';
  for (let gx = Math.ceil(A.x / GRID) * GRID; gx <= A.x + A.w; gx += GRID)
    for (let gy = Math.ceil(A.y / GRID) * GRID; gy <= A.y + A.h; gy += GRID) {
      ctx.beginPath(); ctx.arc(gx, gy, 2, 0, 7); ctx.fill();
    }
  if (scene === 'edit') {
    ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = 'rgba(30,110,190,.75)';
    ctx.fillText('ここに おけるよ', A.x + A.w / 2, A.y + 20);
  }
}
function drawTrail() {
  for (let bi = 0; bi < ballMeta.length; bi++) {
    const m = ballMeta[bi], c = BALL_COLORS[bi % BALL_COLORS.length];
    ctx.fillStyle = c.g1;
    for (let i = 0; i < m.trail.length; i++) {
      ctx.globalAlpha = (i / m.trail.length) * 0.3;
      ctx.beginPath(); ctx.arc(m.trail[i].x, m.trail[i].y, 3, 0, 7); ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}
function drawConfetti(dt) {
  const colors = ['#ffd166', '#ef476f', '#06d6a0', '#118ab2', '#f78c6b'];
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.vy += 0.18; c.x += c.vx; c.y += c.vy; c.rot += c.vr; c.life -= dt;
    if (c.life <= 0) { confetti.splice(i, 1); continue; }
    ctx.save(); ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.globalAlpha = Math.min(1, c.life / 600);
    if (c.star) drawStar(0, 0, c.size, colors[c.ci]);
    else { ctx.fillStyle = colors[c.ci]; ctx.fillRect(-c.size / 2, -c.size / 2, c.size, c.size); }
    ctx.restore();
  }
}
function burstConfetti(x, y) {
  for (let i = 0; i < 34; i++) {
    const a = Math.random() * Math.PI * 2, sp = 2 + Math.random() * 5;
    confetti.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 4, vr: (Math.random() - .5) * .3, rot: Math.random() * 6, size: 5 + Math.random() * 8, ci: (Math.random() * 5) | 0, life: 1400 + Math.random() * 700, star: Math.random() < 0.5 });

  ctx.fillStyle = 'rgba(0,0,0,.12)';

  ctx.fillStyle = color;

function inBtn(b, x, y) { return Math.hypot(x - b.x, y - b.y) <= b.r + 8; }

function toolboxSlots() {
  const types = Object.keys(level.gadgets);
  const slots = [];
  if (landscape) {
    // みぎの パネル。5しゅるい までは 1れつ、それより おおいと 2れつ
    if (types.length <= 5) {
      const sw = 132, sh = Math.min(88, Math.floor((STAGE_H - 74 - 96) / Math.max(1, types.length)) - 6);
      const x = STAGE_W + (SIDE_W - sw) / 2;
      let y = 60;
      for (const t of types) { slots.push({ type: t, x, y, w: sw, h: sh }); y += sh + 6; }
    } else {
      const sw = 94, sh = 74;
      const rows = Math.ceil(types.length / 2);
      types.forEach((t, i) => {
        const col = i % 2, row = (i / 2) | 0;
        slots.push({ type: t, x: STAGE_W + 8 + col * (sw + 6), y: 56 + row * (sh + 6), w: sw, h: sh });
      });
    }
  } else {
    // した。はばに あわせて スロットを ちぢめる(さいしょう88px)
    const avail = 640;                       // ためすボタンの ひだりまで
    const sw = Math.max(88, Math.min(104, Math.floor(avail / types.length) - 8));
    let x = 20;
    for (const t of types) { slots.push({ type: t, x, y: STAGE_H + 12, w: sw, h: 96 }); x += sw + 8; }
  }

  if (scene === 'select') {
    if (selectTabBtns) {
      for (const key of ['std', 'adv']) {
        const t = selectTabBtns[key];
        if (p.x > t.x - t.w / 2 && p.x < t.x + t.w / 2 && p.y > t.y - t.h / 2 && p.y < t.y + t.h / 2) {
          if (selectTab !== key) { SND.tap(); selectTab = key; }
          return;
        }
      }
    }
    for (const b of selectBtns) {
      if (inBtn(b, p.x, p.y) && levelOpen(b.idx)) { SND.tap(); loadLevel(b.idx); return; }
    }
    return;
  }
  if (scene === 'win') {
    if (winBtns && inBtn(winBtns.next, p.x, p.y)) {
      SND.tap();
      // 帯の さいご(スタンダード55 / アドバンスド30)では せんたくへ もどる
      if (levelIdx !== STD_COUNT - 1 && levelIdx < LEVELS.length - 1) loadLevel(levelIdx + 1);
      else { scene = 'select'; stopRun(); }
      return;
    }
    if (winBtns && inBtn(winBtns.retry, p.x, p.y)) { SND.tap(); const i = levelIdx; loadLevel(i); return; }
    return;
  }
  // きょうつうボタン
  if (inBtn(BTN.home, p.x, p.y)) { SND.tap(); scene = 'select'; stopRun(); return; }
  if (inBtn(BTN.reset, p.x, p.y)) {
    SND.back();
    if (scene === 'run') { stopRun(); scene = 'edit'; }
    else { placements = []; }
    return;
  }
  if (scene === 'edit' && inBtn(BTN.hint, p.x, p.y)) {
    SND.hint();
    hintStage = Math.min(hintStage + 1, 3);
    return;
  }
  if (inBtn(BTN.start, p.x, p.y)) {
    if (scene === 'edit') startRun(false);
    return;
  }
  if (scene !== 'edit') return;

  // ゆびで つかんだ どうぐは、ゆびに かくれないよう すこし うえに もちあげて みせる
  const lift = e.pointerType === 'touch' ? 48 : 0;
  // どうぐばこから
  for (const s of toolboxSlots()) {
    if (p.x > s.x && p.x < s.x + s.w && p.y > s.y && p.y < s.y + s.h && remainCount(s.type) > 0) {
      SND.pick();
      drag = { type: s.type, x: p.x, y: p.y - lift - (lift ? 0 : 20), fx: p.x, fy: p.y, lift, flip: false, from: 'box', origIndex: -1, moved: false, downX: p.x, downY: p.y, downT: performance.now() };
      return;
    }
  }
  // おいてあるギミック
  const idx = placedAt(p.x, p.y);
  if (idx >= 0) {
    const g0 = placements[idx];
    SND.pick();
    drag = { type: g0.type, x: p.x, y: p.y - lift, fx: p.x, fy: p.y, lift, flip: g0.flip, from: 'stage', origIndex: idx, orig: Object.assign({}, g0), moved: false, downX: p.x, downY: p.y, downT: performance.now() };
    return;
  }
});
canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointer || !drag) return;
  const p = evtPos(e);
  drag.fx = p.x; drag.fy = p.y;
  drag.x = p.x; drag.y = p.y - drag.lift;
  if (Math.hypot(p.x - drag.downX, p.y - drag.downY) > 10) drag.moved = true;
});
function endDrag(e) {
  if (e.pointerId !== activePointer) return;
  activePointer = null;
  if (!drag) return;
  const d = drag; drag = null;

  // タップ(うごかしてない) → はんてん
  if (d.from === 'stage' && !d.moved && performance.now() - d.downT < 400) {
    const g0 = placements[d.origIndex];
    if (GADGET_DEFS[g0.type].flip) { g0.flip = !g0.flip; SND.flip(); }
    else { SND.tap(); }
    return;
  }
  // どうぐばこへドロップ(どうぐの ひょうじいちが どうぐ箱の うえ) → もどす
  if (overToolbox(d.x, d.y)) {
    if (d.from === 'stage') { placements.splice(d.origIndex, 1); SND.back(); }
    else SND.back();
    return;
  }
  const tgt = findPlace(d.type, d.x, d.y, d.from === 'stage' ? d.origIndex : -1);
  if (tgt) {
    if (d.from === 'stage') {
      placements[d.origIndex].x = tgt.x; placements[d.origIndex].y = tgt.y;
    } else {
      placements.push({ type: d.type, x: tgt.x, y: tgt.y, flip: d.flip });
    }
    SND.put();
  } else {
    // おけないばしょ → もとへ (すでにあったものは そのまま)
    SND.back();
  }
}
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', e => { if (e.pointerId === activePointer) { activePointer = null; drag = null; } });

/* =========================================================
   メインループ
   ========================================================= */
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(50, now - lastT);
  lastT = now;
  globalT = now;
  for (const k in springAnims) springAnims[k] += dt;

  if (scene === 'run' || (scene === 'win' && engine)) {
    if (scene === 'run' && !runResult) stepPhysics(dt);
  }
  if (scene === 'select') drawSelect();
  else drawGame(dt);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
