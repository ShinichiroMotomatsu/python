function hsh(a,b){return(((a*73856093)^(b*19349663))>>>0);}

/* ---------- しらべるスポット ---------- */
const SPOTS=[
 {x0:9,y0:5,x1:12,y1:7, past:["王の塔だ。","ここで『ほころび』調査の命を受けた——","「色を失う土地が ひろがっている。原因を つきとめよ」"],

 {x0:8,y0:12,x1:9,y1:13, past:["石畳が 色を失っている。","音も、においも、ここだけ 消えている。","(ほころびは 町の中にまで 及んでいる——)"],

                        now:["更地に『売地』の看板。","ここに何があったのか、どうしても 思い出せない。"]},
 {x0:14,y0:29,x1:14,y1:29, past:["道端の祠。ほら貝が ひび割れて、声が届かない。","(祠まで ほころびに 蝕まれている——)"],
                        now:["赤い前掛けの地蔵。","だれかが 新しい花を 供えている。"]},
 {x0:18,y0:31,x1:21,y1:34, past:["澄んだ池だ。","魚影が…… いや、影だけが 泳いでいる。"],

 {x0:2,y0:50,x1:3,y1:51, past:["わたしの家だ。","母が『気をつけて』と 手を振っていた。"],

const CAT={x:7,y:57};
const CAT_TEXT={past:["ねこが ひなたぼっこを している。"],
                now:["ねこが ひなたぼっこを している。","……40年前と、同じ模様だ。"]};
function areaName(y,era){
  if(y<=16)return era==="past"?"リーメンの都":"団地";
  if(y<=22)return era==="past"?"大きな川":"多摩川";
  if(y<=44)return era==="past"?"街道":"土手の道";
  if(y<=63)return era==="past"?"はじまりの村":"ふるさとの住宅地";
  return era==="past"?"南の森":"雑木林";
}

/* =====================================================================
 *  過去ワールド (PC-88 · 16px · 2フェーズ)
 * ===================================================================== */
const PALc=[[18,20,44],[46,74,170],[120,178,236],[232,226,196],[40,116,58],[122,196,74],[178,120,50],[214,74,58]];
const PAL32=PALc.map(c=>(255<<24)|(c[2]<<16)|(c[1]<<8)|c[0]);
const PALs=PALc.map(c=>`rgb(${c[0]},${c[1]},${c[2]})`);
const BAYER=[0,8,2,10,12,4,14,6,3,11,1,9,15,7,13,5];
const PTS=16,PWX=GW*PTS,PWY=GH*PTS;
function bakePast(phase){
  const cv=document.createElement("canvas");cv.width=PWX;cv.height=PWY;
  const c=cv.getContext("2d");
  const img=c.createImageData(PWX,PWY);const buf=new Uint32Array(img.data.buffer);
  const ps=(x,y,ci)=>{x|=0;y|=0;if(x<0||y<0||x>=PWX||y>=PWY)return;buf[y*PWX+x]=PAL32[ci];};
  const pr=(ci,x,y,w,h)=>{for(let j=0;j<h;j++)for(let i=0;i<w;i++)ps(x+i,y+j,ci);};
  const pd=(x,y,t,a,b)=>{ps(x,y,t>(BAYER[(y&3)*4+(x&3)]+0.5)/16?b:a);};
  const pdr=(x,y,w,h,t,a,b)=>{for(let j=0;j<h;j++)for(let i=0;i<w;i++)pd(x+i,y+j,t,a,b);};
  for(let ty=0;ty<GH;ty++)for(let tx=0;tx<GW;tx++){
    const ch=at(tx,ty),px=tx*PTS,py=ty*PTS,h=hsh(tx,ty);
    switch(ch){
      case".":{pdr(px,py,PTS,PTS,0.30,4,5);
        if(h%3===0)pr(4,px+2+h%6,py+3+(h>>4)%6,2,1);
        if(h%5===1)pr(5,px+9,py+10+(h>>3)%4,2,2);
        if(h%23===7){ps(px+4,py+4,3);ps(px+5,py+5,7);}break;}
      case"f":{pdr(px,py,PTS,PTS,0.42,0,4);
        const sm=(a,b)=>at(a,b)==="f";
        if(!sm(tx-1,ty))for(let j=0;j<PTS;j++)ps(px,py+j,0);
        if(!sm(tx+1,ty))for(let j=0;j<PTS;j++)ps(px+PTS-1,py+j,0);
        if(!sm(tx,ty-1)){for(let i=0;i<PTS;i++)ps(px+i,py,0);pdr(px,py+1,PTS,1,0.55,4,5);}
        if(!sm(tx,ty+1))for(let i=0;i<PTS;i++){ps(px+i,py+PTS-1,0);ps(px+i,py+PTS-2,0);}
        if(h%2===0)pr(5,px+3+h%5,py+2+(h>>3)%5,2,1);
        if(h%3===1)pr(0,px+8-(h>>2)%4,py+8+(h>>4)%4,3,2);break;}
      case"r":case"g":{pdr(px,py,PTS,PTS,0.78,0,6);
        if(at(tx-1,ty)!=="r"&&at(tx-1,ty)!=="g")for(let j=0;j<PTS;j++){ps(px,py+j,0);pd(px+1,py+j,0.4,0,6);}
        if(at(tx+1,ty)!=="r"&&at(tx+1,ty)!=="g")for(let j=0;j<PTS;j++){ps(px+PTS-1,py+j,0);pd(px+14,py+j,0.4,0,6);}
        break;}
      case"~":{pdr(px,py,PTS,PTS,0.5,1,1);
        for(let y2=py+2;y2<py+PTS;y2+=4){const off=((y2>>2)+phase)%2===0?0:8;
          for(let x2=px+off;x2<px+PTS;x2+=16){const hh=hsh(x2,y2);if(hh%3!==0)pr(2,x2+(hh%5),y2,4+(hh>>3)%4,1);}}
        if(at(tx,ty-1)!=="~"&&at(tx,ty-1)!=="b")for(let i=0;i<PTS;i++){ps(px+i,py,0);pd(px+i,py+1,0.4,0,1);}
        if(at(tx,ty+1)!=="~"&&at(tx,ty+1)!=="b")for(let i=0;i<PTS;i++){ps(px+i,py+PTS-1,0);pd(px+i,py+PTS-2,0.4,0,1);}
        break;}
      case"b":{pr(0,px-2,py,PTS+4,PTS);pdr(px,py,PTS,PTS,0.6,0,6);
        for(let y2=py;y2<py+PTS;y2+=4)pr(0,px,y2,PTS,1);
        if(at(tx-1,ty)==="~"){pr(3,px,py,1,PTS);pr(6,px-2,py+2,2,5);}
        if(at(tx+1,ty)==="~"){pr(3,px+PTS-1,py,1,PTS);pr(6,px+PTS,py+9,2,5);}
        break;}
      case"W":{pdr(px,py,PTS,PTS,0.5,6,3);
        pr(0,px,py,PTS,1);pr(0,px,py+PTS-1,PTS,1);
        for(let x2=px;x2<px+PTS;x2+=8)pr(0,x2,py+((ty%2)?4:9),5,2);break;}
      case"s":{pdr(px,py,PTS,PTS,0.35,1,0);
        pr(0,px,py+PTS-1,PTS,1);if((tx+ty)%2)pd(px+4,py+6,0.8,1,2);break;}
      case"#":case"K":case"H":case"h":{pdr(px,py,PTS,PTS,ty<=16?0.35:0.30,ty<=16?1:4,ty<=16?0:5);break;}
      case"q":{for(let j=0;j<PTS;j+=4){pr(6,px,py+j,PTS,2);pr(5,px,py+j+2,PTS,2);}pr(0,px,py,PTS,1);break;}
      case"c":{pdr(px,py,PTS,PTS,0.30,4,5);          // 木柵
        pr(6,px,py+5,PTS,2);pr(6,px,py+10,PTS,2);
        pr(0,px,py+5,PTS,1);pr(0,px,py+10,PTS,1);
        pr(6,px+2,py+2,3,12);pr(0,px+2,py+2,3,1);pr(6,px+11,py+2,3,12);pr(0,px+11,py+2,3,1);break;}
      case"w":{pdr(px,py,PTS,PTS,0.30,4,5);          // 井戸
        pr(0,px+2,py+4,12,10);pdr(px+3,py+5,10,8,0.5,6,3);
        pr(0,px+5,py+7,6,4);pr(1,px+5,py+7,6,2);
        pr(6,px+2,py+1,2,4);pr(6,px+12,py+1,2,4);pr(6,px+2,py+1,12,2);pr(3,px+7,py+2,3,1);break;}
      case"o":{pdr(px,py,PTS,PTS,0.45,1,2);
        const sm=(a,b)=>at(a,b)==="o";
        if(!sm(tx-1,ty))for(let j=0;j<PTS;j++)ps(px,py+j,0);
        if(!sm(tx+1,ty))for(let j=0;j<PTS;j++)ps(px+PTS-1,py+j,0);
        if(!sm(tx,ty-1))for(let i=0;i<PTS;i++)ps(px+i,py,0);
        if(!sm(tx,ty+1))for(let i=0;i<PTS;i++)ps(px+i,py+PTS-1,0);break;}
      case"x":case"X":{pdr(px,py,PTS,PTS,0.4,0,3);
        if(h%3===0)pdr(px+2+h%5,py+3+(h>>3)%5,2,1,0.7,0,3);
        if((tx+ty+phase)%7===0)pr(3,px+6,py+8,1,1);break;}
      default:pdr(px,py,PTS,PTS,0.30,4,5);
    }
  }
  function house(tx,ty,roofCi){const px=tx*PTS,py=ty*PTS,W2=2*PTS,H2=2*PTS;
    pr(0,px+1,py+1,W2-2,H2-2);
    pr(roofCi,px+2,py+2,W2-4,12);pr(3,px+2,py+2,W2-4,2);
    pdr(px+2,py+14,W2-4,H2-16,0.25,3,6);
    pr(0,px+PTS-3,py+H2-9,6,8);pr(2,px+5,py+18,4,4);}
  // 城内の建物(6): 4民家+役場+あきんどの店
  house(4,9,7);house(8,9,6);house(16,9,7);house(4,12,6);house(16,12,7);
  (function(){const px=12*PTS,py=12*PTS;                            // あきんどの店
    pr(0,px+1,py+1,2*PTS-2,2*PTS-2);
    pr(2,px+2,py+2,2*PTS-4,10);pr(3,px+2,py+2,2*PTS-4,2);
    pdr(px+2,py+12,2*PTS-4,2*PTS-14,0.25,3,6);
    pr(0,px+4,py+18,8,10);pr(6,px+5,py+19,6,9);
    pr(7,px+20,py+14,8,8);pr(3,px+22,py+16,4,4);})();               // 赤い庇の窓

  render(now);
  if(!opened){opened=true;
    say(["——『ほころび』と よばれる異変が、各地に ひろがっている。",
         "調査官アルスは、はじまりの村から 北の都リーメンへ 向かう。",
         "(探索ビルド: たたかいは ありません。Aで しらべる ／ 右上で 時代をこえる)"]);
    areaCheck();}
}
requestAnimationFrame(loop);

window.DEBUG={
  st:()=>({x:P.x,y:P.y,era}),
  warp:(x,y)=>{moving=null;P.x=x*2;P.y=y*2;areaCheck();},
  era:()=>{document.getElementById("eraBtn").click();},
  msgOff:()=>{msgQ=[];msgActive=false;curLine="";},
  line:()=>curLine,
};
