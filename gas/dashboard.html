<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIアセスメント ダッシュボード</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --c-primary:#1a73e8;
  --c-primary-dark:#174ea6;
  --c-accent:#34a853;
  --c-warn:#fbbc04;
  --c-danger:#ea4335;
  --c-ink:#202124;
  --c-ink-2:#5f6368;
  --c-line:#dadce0;
}
html,body{margin:0;padding:0;min-height:100%;font-family:'Noto Sans JP',sans-serif;color:var(--c-ink);background:#f1f3f4;}
.wrap{max-width:1280px;margin:0 auto;padding:24px;}
.card{background:#fff;border:1px solid var(--c-line);border-radius:10px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
h1{font-size:24px;font-weight:800;margin:0;}
h2{font-size:16px;font-weight:700;color:var(--c-primary-dark);margin:18px 0 10px;border-left:4px solid var(--c-primary);padding-left:10px;}
.muted{color:var(--c-ink-2);font-size:13px;}
.kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin:14px 0;}
.kpi .b{background:#f8f9fa;border:1px solid var(--c-line);border-radius:8px;padding:14px;text-align:center;}
.kpi .b .v{font-size:32px;font-weight:800;color:var(--c-primary);font-family:'JetBrains Mono',monospace;}
.kpi .b .l{font-size:11px;color:var(--c-ink-2);margin-top:4px;}
.kpi .b.cat .v{font-size:24px;}
.cat-優良 .v{color:#137333;}
.cat-及第点 .v{color:#b06000;}
.cat-要努力 .v{color:#a50e0e;}

table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;}
table th,table td{border-bottom:1px solid var(--c-line);padding:8px 10px;text-align:left;}
table th{background:#f1f3f4;font-weight:700;font-size:12px;position:sticky;top:0;}
table tbody tr:hover{background:#f8fafc;}
.tag{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.tag-優良{background:#e6f4ea;color:#137333;border:1px solid #34a853;}
.tag-及第点{background:#fef7e0;color:#b06000;border:1px solid #fbbc04;}
.tag-要努力{background:#fdecea;color:#a50e0e;border:1px solid #ea4335;}
.mono{font-family:'JetBrains Mono',monospace;font-size:12px;}
.pct{font-weight:700;}
.pct.high{color:#137333;}
.pct.mid{color:#b06000;}
.pct.low{color:#a50e0e;}

.toolbar{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.toolbar input,.toolbar select{border:1px solid var(--c-line);border-radius:6px;padding:6px 10px;font-size:13px;}
.toolbar button{border:1px solid var(--c-line);background:#fff;border-radius:6px;padding:6px 14px;font-size:13px;cursor:pointer;}
.toolbar button.primary{background:var(--c-primary);color:#fff;border-color:var(--c-primary);}
.toolbar button:hover{background:#f1f3f4;}
.toolbar button.primary:hover{background:var(--c-primary-dark);}

.bar-chart{display:flex;gap:12px;align-items:flex-end;height:120px;padding:14px 0;}
.bar-chart .col{flex:1;display:flex;flex-direction:column;align-items:center;}
.bar-chart .bar{width:60%;background:var(--c-primary);border-radius:4px 4px 0 0;min-height:4px;transition:height 0.4s;}
.bar-chart .label{font-size:12px;margin-top:6px;color:var(--c-ink-2);}
.bar-chart .val{font-size:14px;font-weight:700;margin-bottom:4px;}
.bar.優良{background:#34a853;}
.bar.及第点{background:#fbbc04;}
.bar.要努力{background:#ea4335;}

.loading{text-align:center;padding:60px;color:var(--c-ink-2);}

/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;justify-content:center;align-items:center;z-index:100;}
.modal.show{display:flex;}
.modal-inner{background:#fff;width:min(900px,95vw);max-height:90vh;overflow:auto;border-radius:10px;padding:24px;}
.modal-inner h2{margin-top:0;}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--c-ink-2);}
.modal-close:hover{color:var(--c-ink);}
.score-line{display:flex;gap:12px;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--c-line);}
.score-line .lbl{flex:0 0 110px;color:var(--c-ink-2);}
.score-line .val{font-family:'JetBrains Mono',monospace;font-weight:700;}
.eval-block{background:#f8f9fa;border:1px solid var(--c-line);border-radius:6px;padding:12px;margin:8px 0;}
.eval-block h4{margin:0 0 6px;font-size:13px;font-weight:700;color:var(--c-primary-dark);}
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;">
      <h1>📊 AIアセスメント ダッシュボード</h1>
      <div class="muted" id="sheetLink"></div>
    </div>

    <div id="content" class="loading">読み込み中…</div>
  </div>
</div>

<!-- Detail Modal -->
<div class="modal" id="detailModal" onclick="if(event.target.id==='detailModal')closeModal()">
  <div class="modal-inner">
    <button class="modal-close" onclick="closeModal()">×</button>
    <div id="detailContent"></div>
  </div>
</div>

<script>
let ALL_DATA = null;
let FILTER = { category:'', text:'' };

window.addEventListener('load', loadDashboard);

function loadDashboard(){
  google.script.run
    .withSuccessHandler(onLoad)
    .withFailureHandler(err=>{
      document.getElementById('content').innerHTML = `<div style="color:#a50e0e;">読み込みエラー: ${escapeHtml(String(err.message||err))}</div>`;
    })
    .getDashboardData();
}

function onLoad(data){
  ALL_DATA = data;
  document.getElementById('sheetLink').innerHTML = data.sheetUrl
    ? `<a href="${data.sheetUrl}" target="_blank" style="color:var(--c-primary);text-decoration:none;">📋 シートを開く →</a>`
    : '';
  render();
}

function render(){
  const data = ALL_DATA;
  const s = data.summary;
  const filtered = filterRows(data.rows);

  const html = `
    <div class="kpi">
      <div class="b"><div class="v">${s.total}</div><div class="l">総受験者数</div></div>
      <div class="b cat cat-優良"><div class="v">${s.byCategory['優良']||0}</div><div class="l">優良 (≧${data.thresholds.excellentPct}%)</div></div>
      <div class="b cat cat-及第点"><div class="v">${s.byCategory['及第点']||0}</div><div class="l">及第点 (${data.thresholds.passPct}〜${data.thresholds.excellentPct-1}%)</div></div>
      <div class="b cat cat-要努力"><div class="v">${s.byCategory['要努力']||0}</div><div class="l">要努力 (<${data.thresholds.passPct}%)</div></div>
      <div class="b"><div class="v">${s.avgPct}%</div><div class="l">平均達成率</div></div>
    </div>

    <h2>カテゴリ分布</h2>
    ${renderBarChart(s.byCategory, s.total)}

    <h2>受験者一覧 (${filtered.length} / ${data.rows.length} 件)</h2>
    <div class="toolbar">
      <input type="text" id="filterText" value="${escapeHtml(FILTER.text)}" placeholder="氏名・所属・メールで絞り込み" style="flex:1;min-width:200px;" oninput="onFilterChange()">
      <select id="filterCat" onchange="onFilterChange()">
        <option value="">すべてのカテゴリ</option>
        <option value="優良" ${FILTER.category==='優良'?'selected':''}>優良</option>
        <option value="及第点" ${FILTER.category==='及第点'?'selected':''}>及第点</option>
        <option value="要努力" ${FILTER.category==='要努力'?'selected':''}>要努力</option>
      </select>
      <button onclick="resetFilters()">リセット</button>
      <button class="primary" onclick="exportCSV()">CSV ダウンロード</button>
      <button onclick="loadDashboard()">🔄 更新</button>
    </div>

    <div style="max-height:60vh;overflow:auto;border:1px solid var(--c-line);border-radius:6px;">
      <table>
        <thead>
          <tr>
            <th>受験日時</th><th>氏名</th><th>所属</th><th>A</th><th>B</th><th>C</th><th>E</th><th>D</th>
            <th>総合</th><th>達成率</th><th>カテゴリ</th><th></th>
          </tr>
        </thead>
        <tbody>
          ${filtered.length===0 ? '<tr><td colspan="12" style="text-align:center;padding:30px;color:var(--c-ink-2);">該当する受験記録がありません</td></tr>' :
            filtered.map(r=>`
              <tr>
                <td class="mono">${escapeHtml(r.timestamp||'')}</td>
                <td><b>${escapeHtml(r.name||'')}</b></td>
                <td>${escapeHtml(r.role||'')}</td>
                <td class="mono">${escapeHtml(r.A||'')}</td>
                <td class="mono">${escapeHtml(r.B||'')}</td>
                <td class="mono">${escapeHtml(r.C||'')}</td>
                <td class="mono">${escapeHtml(r.E||'')}</td>
                <td class="mono">${escapeHtml(r.D||'')}</td>
                <td class="mono">${escapeHtml(r.total||'')}</td>
                <td class="pct ${pctClass(r.percent)}">${escapeHtml(String(r.percent||''))}%</td>
                <td><span class="tag tag-${r.category}">${escapeHtml(r.category||'')}</span></td>
                <td><button onclick="showDetail('${escapeHtml(r.submissionId)}')" style="background:none;border:1px solid var(--c-line);border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;">詳細</button></td>
              </tr>
            `).join('')
          }
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('content').innerHTML = html;
}

function renderBarChart(byCat, total){
  const cats = ['要努力','及第点','優良'];
  const max = Math.max(1, ...cats.map(c=>byCat[c]||0));
  return `<div class="bar-chart">${cats.map(c=>{
    const v = byCat[c] || 0;
    const pct = total>0 ? (v/total*100).toFixed(1) : 0;
    return `<div class="col">
      <div class="val">${v} 名 (${pct}%)</div>
      <div class="bar ${c}" style="height:${(v/max*100)}%"></div>
      <div class="label">${c}</div>
    </div>`;
  }).join('')}</div>`;
}

function filterRows(rows){
  return rows.filter(r=>{
    if(FILTER.category && r.category !== FILTER.category) return false;
    if(FILTER.text){
      const t = FILTER.text.toLowerCase();
      const hay = [(r.name||''),(r.role||''),(r.email||'')].join(' ').toLowerCase();
      if(!hay.includes(t)) return false;
    }
    return true;
  });
}

function onFilterChange(){
  FILTER.text = document.getElementById('filterText').value;
  FILTER.category = document.getElementById('filterCat').value;
  render();
  document.getElementById('filterText').focus();
}

function resetFilters(){
  FILTER = { category:'', text:'' };
  render();
}

function pctClass(p){
  const n = parseFloat(p);
  if(isNaN(n)) return '';
  if(n >= 80) return 'high';
  if(n >= 60) return 'mid';
  return 'low';
}

function showDetail(submissionId){
  document.getElementById('detailContent').innerHTML = '<div class="loading">読み込み中…</div>';
  document.getElementById('detailModal').classList.add('show');
  google.script.run
    .withSuccessHandler(renderDetail)
    .withFailureHandler(err=>{
      document.getElementById('detailContent').innerHTML = `<div style="color:#a50e0e;">エラー: ${escapeHtml(String(err.message||err))}</div>`;
    })
    .getSubmissionDetail(submissionId);
}

function renderDetail(d){
  if(!d){ document.getElementById('detailContent').innerHTML = '<div>該当する記録が見つかりませんでした。</div>'; return; }
  const ev = d.dResultParsed;
  let html = `
    <h2>受験詳細: ${escapeHtml(d['氏名']||'')}</h2>
    <div class="muted">${escapeHtml(d.timestamp||'')}  |  ${escapeHtml(d['所属']||'')}  |  ${escapeHtml(d['受験者メール']||'')}</div>
    <div style="margin:14px 0;text-align:center;">
      <span class="tag tag-${d['カテゴリ']}" style="font-size:18px;padding:6px 20px;">${escapeHtml(d['カテゴリ']||'')}</span>
      <span style="margin-left:12px;font-family:JetBrains Mono,monospace;font-weight:700;font-size:18px;">${d['総合']}/${d['満点']} (${d['達成率(%)']}%)</span>
    </div>
    <div class="score-line"><div class="lbl">A. 基礎理解</div><div class="val">${d['A_got']}/${d['A_max']}</div></div>
    <div class="score-line"><div class="lbl">B. 業務活用判断</div><div class="val">${d['B_got']}/${d['B_max']}</div></div>
    <div class="score-line"><div class="lbl">C. マネジメント</div><div class="val">${d['C_got']}/${d['C_max']}</div></div>
    <div class="score-line"><div class="lbl">E. 複数選択</div><div class="val">${d['E_got']}/${d['E_max']}</div></div>
    <div class="score-line"><div class="lbl">D. プロンプト記述(Gemini評価)</div><div class="val">${d['D_got']}/${d['D_max']}</div></div>
    <div class="score-line"><div class="lbl">所要時間</div><div class="val">${Math.floor((d['所要(秒)']||0)/60)}分${String(((d['所要(秒)']||0)%60)).padStart(2,'0')}秒</div></div>
  `;

  if(ev && ev.evaluations){
    html += '<h2>Gemini 評価 — セクションD</h2>';
    ev.evaluations.forEach((e,i)=>{
      html += `<div class="eval-block">
        <h4>[D${i+1}] ${escapeHtml(e.skill||'')} — ${e.subtotal}/${e.maxPoints||15} 点 [${escapeHtml(e.verdict||'')}]</h4>
        <ul style="margin:0 0 6px 16px;padding:0;font-size:13px;">
          ${(e.rubricScores||[]).map((sc,j)=>`<li>R${j+1}: <b>${sc}/3</b> — ${escapeHtml((e.comments||[])[j]||'')}</li>`).join('')}
        </ul>
        ${e.strengths?`<div style="font-size:13px;"><b>強み:</b> ${escapeHtml(e.strengths)}</div>`:''}
        ${e.improvements?`<div style="font-size:13px;"><b>改善点:</b> ${escapeHtml(e.improvements)}</div>`:''}
      </div>`;
    });
    if(ev.overallSummary){
      html += `<div class="eval-block" style="background:#e8f0fe;border-color:#1a73e8;"><b>総評:</b> ${escapeHtml(ev.overallSummary)}</div>`;
    }
  }
  document.getElementById('detailContent').innerHTML = html;
}

function closeModal(){ document.getElementById('detailModal').classList.remove('show'); }
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });

function exportCSV(){
  const rows = filterRows(ALL_DATA.rows);
  const header = ['受験日時','氏名','所属','A','B','C','E','D','総合','達成率(%)','カテゴリ'];
  const lines = [header.join(',')];
  rows.forEach(r=>{
    lines.push([r.timestamp,r.name,r.role,r.A,r.B,r.C,r.E,r.D,r.total,r.percent,r.category]
      .map(v=>`"${String(v||'').replace(/"/g,'""')}"`).join(','));
  });
  const blob = new Blob(['﻿'+lines.join('\n')], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `ai_assessment_dashboard_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function escapeHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>

</body>
</html>
