<script>
'use strict';
/* =========================================================
   ころころスイッチ工房
   6さいむけ 2D ぶつり パズル (ギミック配置型 / ルールB)
   - どうぐ箱からギミックをドラッグして置く
   - ▶ ためす でボールがころがる
   - ゴールにはいったら「できた！」
   ========================================================= */
const { Engine, Bodies, Body, Composite, Constraint, Events } = Matter;

/* ---------- 定数 ---------- */
const STAGE_W = 800, STAGE_H = 480, TOOL_H = 120, SIDE_W = 208;
const CX = STAGE_W / 2;                 // ステージ中央(UIの中心に使う)
let W = STAGE_W, H = STAGE_H + TOOL_H;   // キャンバス論理サイズ(むきで かわる)
let landscape = false;                   // よこながレイアウト(どうぐ箱を みぎに)
const GRID = 48;
const BALL_R = 18;
const GOAL_W = 60, GOAL_H = 60;
const SPRING_V = 9.5;          // ジャンプ台の上向き速度
const FAN_FORCE = 0.0009;       // 扇風機の横方向の力
const FAN_RANGE = 230;          // 扇風機の風のとどく距離
const RUN_SUBSTEP = 1000 / 120; // 物理サブステップ

/* ---------- ギミック定義 ---------- */
const GADGET_DEFS = {
  ramp:   { label: 'さか',        w: 120, h: 60,  flip: true  },
  spring: { label: 'ジャンプだい', w: 84,  h: 26,  flip: false },
  bumper: { label: 'はねかえし',   w: 64,  h: 100, flip: true  },
  fan:    { label: 'せんぷうき',   w: 56,  h: 64,  flip: true  },
  seesaw: { label: 'シーソー',     w: 160, h: 66,  flip: false }, // アンカー=支点(pivot)中心
  switch: { label: 'ふむボタン',   w: 80,  h: 18,  flip: false }, // アンカー=下端中央(ゆかの上)
};
const SEESAW_LEN = 160, SEESAW_HALF = 80, SEESAW_MAXA = 25 * Math.PI / 180;
const SEESAW_DROP = 8; // アンカーy=いたの上面。かいてん中心は そこから DROP だけ下。
// スイッチ床・作動対象の いろ (スイッチと おなじ いろの とびら/はし/せんぷうきが うごく)
const TRIGGER_COLORS = {
  blue:   { main: '#3d8bff', dark: '#1f5fd0', light: '#cfe3ff' },
  red:    { main: '#ef476f', dark: '#c22c50', light: '#ffd4de' },
  yellow: { main: '#f4b400', dark: '#c68a00', light: '#ffebb0' },
};

/* ---------- レベルデータ ----------
   すべての座標はステージ左上原点。ギミックの (x,y) は下端中央アンカー。
   B(x1,y1,x2,y2): 固定ブロック / F(x1,x2): ゆか(上面432)
   hints = こたえ(ゴースト表示にも、自動テストにも使う) */
function B(x1, y1, x2, y2, kind) {
  return { type: kind || 'block', x: (x1 + x2) / 2, y: (y1 + y2) / 2, w: x2 - x1, h: y2 - y1 };
}
function F(x1, x2) { return B(x1, 432, x2, 480, 'floor'); }
function R(x, y, w, h) { return { x, y, w, h }; }
function Hn(type, x, y, flip) { return { type, x, y, flip: !!flip }; }
// 作動対象(ステージに もとから ある しかけ)。color は スイッチと そろえる。
function Door(color, x, top, h)   { return { kind: 'door',   color, x, y: top, w: 26, h }; }
function Bridge(color, x, top, w) { return { kind: 'bridge', color, x, y: top, w, h: 16 }; }
function TFan(color, x, ybottom, dir) { return { kind: 'fan', color, x, y: ybottom, dir: dir || 1 }; }

const LEVELS = [
  { name: 'はじめての さか',
    ball: { x: 144, y: 144 }, goal: { x: 696, y: 402 },
    statics: [F(0, 800)],
    area: R(0, 300, 432, 180),
    gadgets: { ramp: 1 },
    hints: [Hn('ramp', 144, 432, false)],
    limit: 12 },

  { name: 'ぽんと はねる',
    ball: { x: 96, y: 168 }, goal: { x: 728, y: 306 },
    statics: [F(0, 800), B(544, 336, 800, 432), B(776, 96, 800, 336)],
    fixed: [Hn('ramp', 120, 432, false)],
    area: R(240, 288, 288, 192),
    gadgets: { spring: 1 },
    hints: [Hn('spring', 384, 432, false)],
    limit: 12 },

  { name: 'はねかえして ゴール',
    ball: { x: 144, y: 96 }, goal: { x: 672, y: 402 },
    statics: [F(0, 800)],
    area: R(48, 288, 288, 192),
    gadgets: { bumper: 1 },
    hints: [Hn('bumper', 144, 432, false)],
    limit: 12 },

  { name: 'あなを ぴょん',
    ball: { x: 120, y: 144 }, goal: { x: 720, y: 402 },
    statics: [B(0, 432, 384, 480), B(504, 432, 800, 480), B(776, 168, 800, 432)],
    area: R(48, 288, 384, 192),
    gadgets: { ramp: 1, spring: 1 },
    hints: [Hn('ramp', 144, 432, false), Hn('spring', 336, 432, false)],
    limit: 12 },

  { name: 'ふたつの さか',
    ball: { x: 96, y: 24 }, goal: { x: 216, y: 402 },
    statics: [F(0, 800), B(0, 288, 336, 312)],
    area: R(0, 192, 720, 288),
    gadgets: { ramp: 2 },
    hints: [Hn('ramp', 144, 288, false), Hn('ramp', 480, 432, true)],
    limit: 14 },

  { name: 'はねかえして もどる',
    ball: { x: 96, y: 72 }, goal: { x: 432, y: 402 },
    statics: [F(0, 800), B(0, 336, 560, 360)],

/* ---------- キャンバス ---------- */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let viewScale = 1;
function fitCanvas() {
  const vw = window.innerWidth, vh = window.innerHeight;
  // よこに ひろい画面(スマホ横向きなど)では どうぐ箱を みぎに おいて はばを ひろく つかう
  landscape = vw / vh > 1.5;
  if (landscape) { W = STAGE_W + SIDE_W; H = STAGE_H; }
  else { W = STAGE_W; H = STAGE_H + TOOL_H; }
  layoutUI();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const s = Math.min(vw / W, vh / H);
  viewScale = s;
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
  canvas.width = Math.round(W * s * dpr);
  canvas.height = Math.round(H * s * dpr);
  ctx.setTransform(s * dpr, 0, 0, s * dpr, 0, 0);
}

/* ---------- サウンド (WebAudio かんたん効果音) ---------- */
let actx = null;
function audio() {
  if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (actx && actx.state === 'suspended') actx.resume();
  return actx;
}
function tone(freq, dur, type, vol, when, slideTo) {
  const a = audio(); if (!a) return;
  const t0 = a.currentTime + (when || 0);
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol || 0.15, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  o.connect(g).connect(a.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}

  { g0: '#ff8f6b', g1: '#e94f37', stroke: 'rgba(120,20,10,.4)', face: '#5b2333' }, // あかいボール
  { g0: '#7fd0ff', g1: '#2f8fe0', stroke: 'rgba(10,55,105,.45)', face: '#123a5b' }, // あおいボール
  { g0: '#a6e06b', g1: '#5fb03a', stroke: 'rgba(40,90,20,.45)', face: '#234d12' }, // みどりのボール
];
function ballStarts() { return level.balls || (level.ball ? [level.ball] : []); }
/* v2: シーソー・スイッチ・作動対象 */
let seesawList = [];           // {body, px, py, angle, place}
let switchList = [];           // {place, color, pressMs, x, y}
let doorList = [];             // {obj, body, opened, openT}
let bridgeList = [];           // {obj, body, shown, showT}
let fanTrigList = [];          // {obj}  トリガー連動の せんぷうき
let triggerStates = {};        // color -> bool

/* ドラッグ状態 */
let drag = null; // {type, x, y, flip, from:'box'|'stage', origIndex, orig, moved, downX, downY, downT}

function loadLevel(i) {
  levelIdx = i;
  level = LEVELS[i];
  placements = [];
  hintStage = 0;
  toast = null;
  scene = 'edit';
  stopRun();
}
function stopRun() {
  engine = null; ballBody = null; ballBodies = []; ballMeta = []; runResult = null;
  trail = []; springAnims = {}; runT = 0; contactMs = 0; stallMs = 0;
  seesawList = []; switchList = []; doorList = []; bridgeList = []; fanTrigList = [];
  triggerStates = {};
  for (const p of placements) delete p._angle;
  if (level && level.fixed) for (const p of level.fixed) delete p._angle;
}

/* ---------- 配置ルール ---------- */
function gadgetBBox(type, x, y) {
  if (type === 'seesaw') return { x: x - SEESAW_HALF - 4, y: y - 36, w: SEESAW_LEN + 8, h: 78 }; // アンカー=いた上面
  const d = GADGET_DEFS[type];
  return { x: x - d.w / 2, y: y - d.h, w: d.w, h: d.h };
}
function rectsOverlap(a, b, pad) {
  pad = pad || 0;
  return a.x + pad < b.x + b.w && a.x + a.w - pad > b.x &&
         a.y + pad < b.y + b.h && a.y + a.h - pad > b.y;
}
function overlapDepth(a, b) {
  const ix = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
  const iy = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
  return (ix > 0 && iy > 0) ? Math.min(ix, iy) : 0;
}
function circleRectDist(cx, cy, r) {
  const dx = Math.max(r.x - cx, 0, cx - (r.x + r.w));
  const dy = Math.max(r.y - cy, 0, cy - (r.y + r.h));
  return Math.hypot(dx, dy);
}
function snap(v) { return Math.round(v / GRID) * GRID; }

function canPlace(type, x, y, ignoreIndex) {
  const bb = gadgetBBox(type, x, y);
  const A = level.area;
  // 配置可能エリアの中
  if (bb.x < A.x - 1 || bb.y < A.y - 1 || bb.x + bb.w > A.x + A.w + 1 || bb.y + bb.h > A.y + A.h + 1) return false;
  // 画面内
  if (bb.x < 0 || bb.x + bb.w > W || bb.y < 0 || y > STAGE_H) return false;
  // ボールのスタート位置(すべての ボール)
  for (const s of ballStarts()) if (circleRectDist(s.x, s.y, bb) < BALL_R + 6) return false;
  // ゴール
  const g = { x: level.goal.x - GOAL_W / 2, y: level.goal.y - GOAL_H / 2, w: GOAL_W, h: GOAL_H };
  if (rectsOverlap(bb, g, 0)) return false;
  // スイッチ床は ゆかの うえだけ (くうちゅうには おけない)
  if (type === 'switch') {
    let onFloor = false;
    for (const s of level.statics) {
      const top = s.y - s.h / 2;
      if (Math.abs(top - y) < 26 && x > s.x - s.w / 2 - 16 && x < s.x + s.w / 2 + 16) onFloor = true;
    }
    if (!onFloor) return false;
  }
  // 固定の壁・ゆか (すこしの重なりはOK)。シーソーは あなに はしを かける ので ゆか判定は ゆるめ。
  const overlapMax = (type === 'seesaw') ? 40 : 14;
  for (const s of level.statics) {
    const sr = { x: s.x - s.w / 2, y: s.y - s.h / 2, w: s.w, h: s.h };
    if (overlapDepth(bb, sr) > overlapMax) return false;
  }
  // 作動対象(とびら・はし)とも かさならない
  for (const t of (level.triggers || [])) {
    if (t.kind === 'door') { if (rectsOverlap(bb, { x: t.x - t.w / 2, y: t.y, w: t.w, h: t.h }, 2)) return false; }
  }
  // ほかのギミック
  const all = placements.concat(level.fixed || []);
  for (let i = 0; i < all.length; i++) {
    if (i === ignoreIndex) continue;
    if (all[i].fixedSwitch) continue;
    if (rectsOverlap(bb, gadgetBBox(all[i].type, all[i].x, all[i].y), 3)) return false;
  }
  return true;
}
function remainCount(type) {
  const total = (level.gadgets[type] || 0);
  const used = placements.filter(p => p.type === type).length;
  return total - used;
}

/* =========================================================
   物理 (Matter.js)
   ========================================================= */
function rampBody(x, y, flip) {
  // アンカー(x,y)=下端中央 / flip=false:「＼」(左が高い) true:「∕」(右が高い)
  const w = 120, h = 60;
  let verts, cx, cy;
  if (!flip) { verts = [{ x: -60, y: 0 }, { x: 60, y: 0 }, { x: -60, y: -60 }]; cx = -20; cy = -20; }
  else       { verts = [{ x: -60, y: 0 }, { x: 60, y: 0 }, { x: 60, y: -60 }];  cx = 20;  cy = -20; }
  const b = Bodies.fromVertices(x + cx, y + cy, [verts], {
    isStatic: true, friction: 0.002, restitution: 0.1,
  });
  b.plugin = { kind: 'ramp' };
  return b;
}
function springBody(x, y, key) {
  const b = Bodies.rectangle(x, y - 13, 84, 26, { isStatic: true, friction: 0.1, restitution: 0 });
  b.plugin = { kind: 'spring', key };
  return b;
}
function bumperBody(x, y, flip) {
  // ながさ110のかたむいた板 (70°)。flip=false:「＼」おちてくるボールを右へ / true:「∕」左へ
  const ang = (flip ? -1 : 1) * Math.PI * 7 / 18;
  const b = Bodies.rectangle(x, y - 48, 110, 18, {
    isStatic: true, angle: ang, friction: 0, restitution: 1.4,
  });
  b.plugin = { kind: 'bumper' };
  return b;
}
function fanBody(x, y) {
  const b = Bodies.rectangle(x, y - 32, 56, 64, { isStatic: true, friction: 0.1, restitution: 0.2 });
  b.plugin = { kind: 'fan' };
  return b;
}
function seesawPlank(px, py, rigid) {
  // 上面(px,py)、かいてん中心(px,py+DROP)。
  // はしモード=静的でまっすぐ。ふつう=動的な いたを 中心でピン留めし、ボールの重さで かたむく。
  if (rigid) {
    const b = Bodies.rectangle(px, py + SEESAW_DROP, SEESAW_LEN, 16, { isStatic: true, friction: 0.012, restitution: 0.08 });
    b.plugin = { kind: 'seesaw' };
    return { body: b, pin: null };
  }
  const b = Bodies.rectangle(px, py + SEESAW_DROP, SEESAW_LEN, 16, {
    friction: 0.02, frictionAir: 0.008, restitution: 0.05, density: 0.002,
  });
  b.plugin = { kind: 'seesaw' };
  const pin = Constraint.create({ pointA: { x: px, y: py + SEESAW_DROP }, bodyB: b, pointB: { x: 0, y: 0 }, stiffness: 1, length: 0, damping: 0.1 });
  return { body: b, pin };
}
function doorBody(t) {
  const b = Bodies.rectangle(t.x, t.y + t.h / 2, t.w, t.h, { isStatic: true, friction: 0.2, restitution: 0.05 });
  b.plugin = { kind: 'door' };
  return b;
}
function bridgeBodyOf(t) {
  const b = Bodies.rectangle(t.x, t.y + t.h / 2, t.w, t.h, { isStatic: true, friction: 0.04, restitution: 0.05 });
  b.plugin = { kind: 'bridge' };
  return b;
}
function buildWorld() {
  engine = Engine.create();
  engine.gravity.y = 1;
  const bodies = [];
  for (const s of level.statics) {
    const b = Bodies.rectangle(s.x, s.y, s.w, s.h, { isStatic: true, friction: 0.04, restitution: 0.05 });
    b.plugin = { kind: 'static' };
    bodies.push(b);
  }
  // 作動対象(とびら・はし・せんぷうき)を したく
  seesawList = []; switchList = []; doorList = []; bridgeList = []; fanTrigList = [];
  triggerStates = {};
  for (const t of (level.triggers || [])) {
    triggerStates[t.color] = false;
    if (t.kind === 'door') { const b = doorBody(t); doorList.push({ obj: t, body: b, opened: false, openT: 0 }); bodies.push(b); }
    else if (t.kind === 'bridge') { bridgeList.push({ obj: t, body: bridgeBodyOf(t), shown: false, showT: 0 }); } // でるまで world に いれない
    else if (t.kind === 'fan') { fanTrigList.push({ obj: t }); }
  }
  if (level.switchColor && !(level.switchColor in triggerStates)) triggerStates[level.switchColor] = false;

  const all = placements.concat(level.fixed || []);
  all.forEach((p, i) => {
    if (p.type === 'ramp') bodies.push(rampBody(p.x, p.y, p.flip));
    else if (p.type === 'spring') bodies.push(springBody(p.x, p.y, 'sp' + i));
    else if (p.type === 'bumper') bodies.push(bumperBody(p.x, p.y, p.flip));
    else if (p.type === 'fan') bodies.push(fanBody(p.x, p.y));
    else if (p.type === 'seesaw') {
      const rigid = !!level.seesawBridge;
      const { body: b, pin } = seesawPlank(p.x, p.y, rigid);
      bodies.push(b);
      if (pin) bodies.push(pin);
      p._angle = 0;
      seesawList.push({ body: b, px: p.x, py: p.y, cy: p.y + SEESAW_DROP, angle: 0, place: p, slow: rigid });
    } else if (p.type === 'switch') {
      const color = level.switchColor || 'blue';
      switchList.push({ place: p, color, pressMs: 0, x: p.x, y: p.y });
    }
  });
  ballBodies = []; ballMeta = [];
  ballStarts().forEach((s, bi) => {
    const bb = Bodies.circle(s.x, s.y, BALL_R, {
      density: 0.0008, friction: 0.002, frictionStatic: 0.5,
      frictionAir: 0.0001, restitution: 0.3,
    });
    bb.plugin = { kind: 'ball', idx: bi };
    ballBodies.push(bb);
    ballMeta.push({ contactMs: 0, stallMs: 0, alive: true, trail: [] });
    bodies.push(bb);
  });
  ballBody = ballBodies[0] || null;
  Composite.add(engine.world, bodies);

  const springCooldown = {};
  Events.on(engine, 'collisionStart', ev => {
    for (const pair of ev.pairs) {
      const pa = pair.bodyA.plugin, pb = pair.bodyB.plugin;
      let ball = null, other = null;
      if (pa && pa.kind === 'ball') { ball = pair.bodyA; other = pair.bodyB; }
      else if (pb && pb.kind === 'ball') { ball = pair.bodyB; other = pair.bodyA; }
      if (!ball) continue;
      const k = other.plugin && other.plugin.kind;
      if (k === 'spring') {
        const key = other.plugin.key + '#' + ball.plugin.idx;
        if (!springCooldown[key] || runT - springCooldown[key] > 350) {
          springCooldown[key] = runT;
          pendingSprings.push({ ball, spring: other });
          springAnims[other.plugin.key] = 0;
          if (!simMode) SND.boing();
        }
      } else if (k === 'bumper') {
        if (!simMode) SND.pon();
      }
    }
  });
}

function activateTrigger(color) {
  if (triggerStates[color]) return;
  triggerStates[color] = true;
  for (const d of doorList) if (d.obj.color === color && !d.opened) { Composite.remove(engine.world, d.body); d.opened = true; d.openT = runT; }
  for (const br of bridgeList) if (br.obj.color === color && !br.shown) { Composite.add(engine.world, br.body); br.shown = true; br.showT = runT; }
  if (!simMode) SND.open();
}

let simMode = false;
let pendingSprings = [];
function startRun(sim) {
  simMode = !!sim;
  stopRun();
  buildWorld();
  scene = 'run';
  runT = 0; contactMs = 0; stallMs = 0; runResult = null;
  if (!sim) SND.start();
}

function stepPhysics(dtMs) {
  if (!engine || runResult) return;
  const steps = Math.round(dtMs / RUN_SUBSTEP);
  const all = placements.concat(level.fixed || []);
  const g = level.goal;
  const gr = { x: g.x - GOAL_W / 2, y: g.y - GOAL_H / 2, w: GOAL_W, h: GOAL_H };
  for (let i = 0; i < steps; i++) {
    // ちからを かける まえに 各ボールの よこの いきおいを おぼえる
    for (const bb of ballBodies) bb._pvx = bb.velocity.x;
    // 風・ゴール吸い込みは 各ボールに
    for (const bb of ballBodies) {
      const bp = bb.position;
      for (const p of all) {
        if (p.type !== 'fan') continue;
        const dir = p.flip ? -1 : 1;
        const zx1 = dir > 0 ? p.x - 10 : p.x + 10 - FAN_RANGE;
        if (bp.x > zx1 && bp.x < zx1 + FAN_RANGE && bp.y > p.y - 110 && bp.y < p.y + 10) Body.applyForce(bb, bp, { x: dir * FAN_FORCE, y: 0 });
      }
      for (const f of fanTrigList) {
        if (!triggerStates[f.obj.color]) continue;
        const dir = f.obj.dir;
        const zx1 = dir > 0 ? f.obj.x - 10 : f.obj.x + 10 - FAN_RANGE;
        if (bp.x > zx1 && bp.x < zx1 + FAN_RANGE && bp.y > f.obj.y - 110 && bp.y < f.obj.y + 10) Body.applyForce(bb, bp, { x: dir * FAN_FORCE, y: -0.00016 });
      }
      const dgx = g.x - bp.x, dgy = g.y - bp.y, dg = Math.hypot(dgx, dgy);
      if (dg < 46 && dg > 1) Body.applyForce(bb, bp, { x: dgx / dg * 0.00035, y: dgy / dg * 0.00035 });
    }
    // スイッチ床: どれかの ボールが 0.15びょう ふめば ON
    for (const sw of switchList) {
      if (triggerStates[sw.color]) continue;
      let over = false;
      for (const bb of ballBodies) { const bp = bb.position; if (bp.x > sw.x - 48 && bp.x < sw.x + 48 && bp.y > sw.y - 52 && bp.y < sw.y + 18) { over = true; break; } }
      if (over) { sw.pressMs += RUN_SUBSTEP; if (sw.pressMs >= 150) activateTrigger(sw.color); }
      else sw.pressMs = Math.max(0, sw.pressMs - RUN_SUBSTEP * 0.5);
    }
    // シーソー: ボールの重さで かたむく (動的いた+ピン留め・角度せいげん)
    for (const s of seesawList) {
      if (s.slow) { s.place._angle = 0; continue; }
      const b = s.body;
      Body.setPosition(b, { x: s.px, y: s.cy });
      if (b.angle > SEESAW_MAXA) { Body.setAngle(b, SEESAW_MAXA); if (b.angularVelocity > 0) Body.setAngularVelocity(b, 0); }
      else if (b.angle < -SEESAW_MAXA) { Body.setAngle(b, -SEESAW_MAXA); if (b.angularVelocity < 0) Body.setAngularVelocity(b, 0); }
      s.place._angle = b.angle;
    }
    pendingSprings = [];
    Engine.update(engine, RUN_SUBSTEP);
    for (const ps of pendingSprings) {
      const topY = ps.spring.bounds.min.y - BALL_R - 1;
      if (ps.ball.position.y > topY) Body.setPosition(ps.ball, { x: ps.ball.position.x, y: topY });
      Body.setVelocity(ps.ball, { x: ps.ball._pvx, y: -SPRING_V });
    }
    pendingSprings = [];
    runT += RUN_SUBSTEP;

    // ゴール判定(どれかの ボール) & しっぱい判定
    let aliveCount = 0, allStalled = true;
    for (let bi = 0; bi < ballBodies.length; bi++) {
      const bb = ballBodies[bi], m = ballMeta[bi];
      if (!m.alive) continue;
      const bp = bb.position;
      const centerIn = bp.x > gr.x && bp.x < gr.x + gr.w && bp.y > gr.y && bp.y < gr.y + gr.h;
      const touching = circleRectDist(bp.x, bp.y, gr) < BALL_R;
      if (touching) m.contactMs += RUN_SUBSTEP; else m.contactMs = 0;
      if (centerIn || m.contactMs >= 300) { finishRun('win'); return; }
      // がめんの そとに でた ボールは たいじょう(みちを つくる ボールは でても OK)
      if (bp.y > STAGE_H + 140 || bp.x < -80 || bp.x > STAGE_W + 80) { m.alive = false; continue; }
      aliveCount++;
      const sp = Math.hypot(bb.velocity.x, bb.velocity.y);
      if (runT > 1200 && sp < 0.22) m.stallMs += RUN_SUBSTEP; else m.stallMs = 0;
      if (m.stallMs <= 1300) allStalled = false;
    }
    if (aliveCount === 0) { finishRun('fail', 'そとに でちゃった'); return; }
    if (allStalled) { finishRun('fail', 'とまっちゃった'); return; }
    if (runT > level.limit * 1000) { finishRun('fail', 'じかんぎれ'); return; }
  }
  // 演出用トレイル(各ボール)
  if (!simMode) {
    for (let bi = 0; bi < ballBodies.length; bi++) {
      const m = ballMeta[bi]; if (!m.alive) continue;
      m.trail.push({ x: ballBodies[bi].position.x, y: ballBodies[bi].position.y });
      if (m.trail.length > 70) m.trail.shift();
    }
  }
}

const MISS_TEXTS = ['おしい！ もういちど ためそう', 'ちょっと なおしてみよう！'];
let missCount = 0;
function finishRun(result, reason) {
  runResult = { result, reason, t: runT };
  if (simMode) return;
  runEndAt = globalT;
  if (result === 'win') {
    SND.win();
    progress.stars[levelIdx + 1] = true;
    saveProgress();
    burstConfetti(level.goal.x, level.goal.y - 20);
    setTimeout(() => { if (scene === 'run') scene = 'win'; }, 900);
  } else {
    SND.miss();
    toast = { text: MISS_TEXTS[(missCount++) % MISS_TEXTS.length], until: globalT + 1800, kind: 'miss' };
    setTimeout(() => { if (scene === 'run') { stopRun(); scene = 'edit'; } }, 1500);
  }
}

/* 自動テスト用: ヒントどおりに置いて、そのまま物理をまわす */
function simulateSolution(i) {
  loadLevel(i);
  for (const h of LEVELS[i].hints) {
    // プレイヤーと おなじく グリッドに スナップして おく
    const sx = snap(h.x), sy = snap(Math.min(h.y, STAGE_H));
    if (!canPlace(h.type, sx, sy, -1)) return { result: 'error', reason: 'hint snaps invalid: ' + JSON.stringify({ t: h.type, hx: h.x, hy: h.y, sx, sy }) };
    placements.push({ type: h.type, x: sx, y: sy, flip: !!h.flip });
  }
  startRun(true);
  const maxMs = (level.limit + 4) * 1000;
  const trace = [];
  let lastMark = -500;
  while (!runResult && runT < maxMs) {
    stepPhysics(1000 / 60);
    if (runT - lastMark >= 500 && ballBodies.length) {
      lastMark = runT;
      trace.push({ t: Math.round(runT), x: Math.round(ballBodies[0].position.x), y: Math.round(ballBodies[0].position.y), vx: +ballBodies[0].velocity.x.toFixed(1),
        b: ballBodies.map((bb, k) => [Math.round(bb.position.x), Math.round(bb.position.y), ballMeta[k].alive ? 1 : 0]) });
    }
  }
  const out = Object.assign({ trace }, runResult || { result: 'fail', reason: 'no result' });
  stopRun(); scene = 'edit'; placements = [];
  return out;
}
window.KOROKORO = {
  levels: LEVELS.length,
  goto: i => loadLevel(i),
  test: i => simulateSolution(i),
  testAll() { return LEVELS.map((l, i) => Object.assign({ level: i + 1, name: l.name }, simulateSolution(i))); },
  state: () => ({ scene, levelIdx, runResult }),
};

/* =========================================================
   えがく
   ========================================================= */
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawBG() {
  const g = ctx.createLinearGradient(0, 0, 0, STAGE_H);
  g.addColorStop(0, '#c9ecff'); g.addColorStop(1, '#f3fbf1');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, STAGE_H);
  // くも
  ctx.fillStyle = 'rgba(255,255,255,.75)';
  const clouds = [[120, 70, 34], [190, 62, 26], [560, 100, 30], [620, 92, 24], [380, 50, 22]];
  for (const [x, y, r] of clouds) {
    const dx = Math.sin(globalT / 4000 + x) * 6;
    ctx.beginPath(); ctx.arc(x + dx, y, r, 0, 7); ctx.arc(x + dx + r * 0.9, y + 6, r * 0.75, 0, 7); ctx.fill();
  }
}
function drawStatics() {
  for (const s of level.statics) {
    const x = s.x - s.w / 2, y = s.y - s.h / 2;
    ctx.fillStyle = '#e3b077';
    rr(x, y, s.w, s.h, 6); ctx.fill();
    ctx.fillStyle = '#8fd06c';                       // 上のくさ
    rr(x, y, s.w, Math.min(10, s.h), 5); ctx.fill();
    ctx.strokeStyle = 'rgba(140,90,40,.35)'; ctx.lineWidth = 2;
    rr(x + 1, y + 1, s.w - 2, s.h - 2, 6); ctx.stroke();
  }
}
function drawDoor(t) {
  const c = TRIGGER_COLORS[t.color];
  let openOff = 0, alpha = 1;
  if (scene === 'run') { const d = doorList.find(d => d.obj === t); if (d && d.opened) { const k = Math.min(1, (runT - d.openT) / 400); openOff = k * (t.h + 8); alpha = 1 - k * 0.85; } }
  ctx.save(); ctx.globalAlpha = alpha;
  const dx = t.x - t.w / 2, dy = t.y - openOff;

  ctx.strokeStyle = '#fff'; ctx.fillStyle = '#fff'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(BTN.home.x - 12, BTN.home.y + 2); ctx.lineTo(BTN.home.x, BTN.home.y - 10); ctx.lineTo(BTN.home.x + 12, BTN.home.y + 2);
  ctx.stroke();
  ctx.fillRect(BTN.home.x - 8, BTN.home.y + 2, 16, 9);

  // 💡 ヒント
  circleBtn(BTN.hint, '#ffb703');
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(BTN.hint.x, BTN.hint.y - 3, 8, 0, 7); ctx.fill();
  ctx.fillRect(BTN.hint.x - 4, BTN.hint.y + 4, 8, 6);
  ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#8a6d00';
  ctx.fillText('ヒント', BTN.hint.x, BTN.hint.y + 26 + 14);

  // ↺ もういちど
  circleBtn(BTN.reset, '#f4845f');
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(BTN.reset.x, BTN.reset.y, 10, -0.4 * Math.PI, 1.1 * Math.PI); ctx.stroke();
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  const ax = BTN.reset.x + 10 * Math.cos(-0.4 * Math.PI), ay = BTN.reset.y + 10 * Math.sin(-0.4 * Math.PI);
  ctx.moveTo(ax + 6, ay - 2); ctx.lineTo(ax - 5, ay - 5); ctx.lineTo(ax + 1, ay + 7); ctx.closePath(); ctx.fill();
  ctx.font = 'bold 11px sans-serif'; ctx.fillStyle = '#9c4a26'; ctx.textAlign = 'center';
  ctx.fillText('もういちど', BTN.reset.x, BTN.reset.y + 26 + 14);
}
function drawToast() {
  if (!toast || globalT > toast.until) { if (toast && globalT > toast.until) toast = null; return; }
  ctx.save();
  ctx.font = 'bold 26px sans-serif';
  const tw = ctx.measureText(toast.text).width + 60;
  const y = 96;
  ctx.fillStyle = toast.kind === 'miss' ? 'rgba(255,244,214,.95)' : 'rgba(230,247,255,.95)';
  rr(CX - tw / 2, y, tw, 56, 28); ctx.fill();
  ctx.strokeStyle = toast.kind === 'miss' ? '#ffb703' : '#5b9bd5'; ctx.lineWidth = 3;
  rr(CX - tw / 2, y, tw, 56, 28); ctx.stroke();
  ctx.fillStyle = '#6b4b0e'; ctx.textAlign = 'center';
  ctx.fillText(toast.text, CX, y + 38);
  ctx.restore();
}
function drawHintBubbles() {
  if (hintStage < 1 || scene !== 'edit') return;
  const msgs = level.hintText || ['このあたりに おいてみよう', 'ひかっている どうぐを つかおう', 'ここに おくと いいかも'];
  const m = msgs[Math.min(hintStage, msgs.length) - 1];
  ctx.save();
  ctx.font = 'bold 17px sans-serif';
  const tw = ctx.measureText(m).width + 46;
  ctx.fillStyle = 'rgba(255,251,235,.95)';
  rr(CX - tw / 2, 62, tw, 38, 19); ctx.fill();
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 2.5;
  rr(CX - tw / 2, 62, tw, 38, 19); ctx.stroke();
  ctx.fillStyle = '#8a6d00'; ctx.textAlign = 'center';
  ctx.fillText('💡 ' + m, CX, 88);
  ctx.restore();
  if (hintStage >= 3) {
    for (const h of level.hints) {
      const placedSame = placements.some(p => p.type === h.type && Math.abs(p.x - h.x) < 30 && Math.abs(p.y - h.y) < 30);
      if (!placedSame) drawGadget(h, 0.35, true);
    }
  }
}
function drawDropMarker() {
  if (scene !== 'edit') return;
  for (const b of ballStarts()) {
    let onGround = false;
    for (const s of level.statics) {
      const sr = { x: s.x - s.w / 2, y: s.y - s.h / 2, w: s.w, h: s.h };
      if (b.x > sr.x - 4 && b.x < sr.x + sr.w + 4 && Math.abs((b.y + BALL_R) - sr.y) < 6) onGround = true;
    }
    if (onGround) continue;
    ctx.save();
    ctx.strokeStyle = 'rgba(233,79,55,.4)'; ctx.lineWidth = 2.5; ctx.setLineDash([4, 8]);
    ctx.beginPath(); ctx.moveTo(b.x, b.y + BALL_R + 6); ctx.lineTo(b.x, b.y + BALL_R + 44); ctx.stroke();
    ctx.setLineDash([]);
    const bob = Math.sin(globalT / 260) * 4;
    ctx.fillStyle = 'rgba(233,79,55,.55)';
    ctx.beginPath();
    ctx.moveTo(b.x, b.y + BALL_R + 52 + bob);
    ctx.lineTo(b.x - 8, b.y + BALL_R + 40 + bob);
    ctx.lineTo(b.x + 8, b.y + BALL_R + 40 + bob);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

/* ---------- シーンえがき ---------- */
function drawGame(dt) {
  drawBG();
  drawArea();
  drawStatics();
  drawTriggers();
  drawGoal();
  // ギミック
  const all = placements.concat(level.fixed || []);
  placements.forEach((p, i) => { p._bi = i; drawGadget(p, drag && drag.from === 'stage' && drag.origIndex === i ? 0 : 1, false); });
  (level.fixed || []).forEach((p, i) => { p._bi = placements.length + i; drawGadget(p, p.fixedSwitch ? 1 : 0.95, false); });
  drawHintBubbles();
  drawTrail();
  // ボール(複数対応)
  if (scene === 'run' && ballBodies.length) {
    for (let bi = 0; bi < ballBodies.length; bi++) { if (!ballMeta[bi].alive) continue; drawBall(ballBodies[bi].position.x, ballBodies[bi].position.y, ballBodies[bi].angle, bi); }
  } else {
    ballStarts().forEach((s, bi) => drawBall(s.x, s.y, 0, bi));
    drawDropMarker();
  }

  // ドラッグ中のプレビュー
  if (drag) {
    const sx = snap(drag.x), sy = snap(Math.min(drag.y, STAGE_H));
    if (!overToolbox(drag.fx, drag.fy) && drag.x < STAGE_W) {
      const ok = canPlace(drag.type, sx, sy, drag.from === 'stage' ? drag.origIndex : -1);
      ctx.save();
      ctx.globalAlpha = 0.4;
      const bb = gadgetBBox(drag.type, sx, sy);
      ctx.fillStyle = ok ? 'rgba(80,200,120,.5)' : 'rgba(240,90,90,.5)';
      rr(bb.x - 3, bb.y - 3, bb.w + 6, bb.h + 6, 8); ctx.fill();
      ctx.restore();
      drawGadget({ type: drag.type, x: sx, y: sy, flip: drag.flip }, 0.55, false);
    }
    // ゆびの うえに もちあげた どうぐ(タッチ時)。ゆびの いちに ちいさな まるも だす。
    if (drag.lift) { ctx.fillStyle = 'rgba(0,0,0,.12)'; ctx.beginPath(); ctx.arc(drag.fx, drag.fy, 10, 0, 7); ctx.fill(); }
    drawGadget({ type: drag.type, x: drag.x, y: drag.y, flip: drag.flip }, 0.92, false);
  }

  drawToolbox();
  drawTopUI();
  drawToast();
  drawConfetti(dt);

  // はじめてのガイド
  if (firstPlay && levelIdx === 0 && scene === 'edit' && placements.length === 0 && !drag) {
    const bob = Math.sin(globalT / 300) * 6;
    ctx.save();
    ctx.font = 'bold 18px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = 'rgba(255,255,255,.9)';
    const msg = 'どうぐばこの「さか」を ドラッグして おいてみよう！';
    const tw = ctx.measureText(msg).width + 40;
    rr(CX - tw / 2, 370 + bob, tw, 40, 20); ctx.fill();
    ctx.fillStyle = '#39597a';
    ctx.fillText(msg, CX, 396 + bob);
    // どうぐ箱の さいしょの スロットへ ゆびマーク
    const s0 = toolboxSlots()[0];
    const ax = s0.x + s0.w / 2, ay = s0.y - 8;
    ctx.fillStyle = '#e94f37';
    ctx.beginPath();
    ctx.moveTo(ax, ay + 22 + bob); ctx.lineTo(ax - 12, ay + bob); ctx.lineTo(ax + 12, ay + bob);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
  if (scene === 'win') drawWinOverlay();
}
let winBtns = null;
function drawWinOverlay() {
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  ctx.fillRect(0, 0, W, H);
  const cw = 430, ch = 300, cx = W / 2 - cw / 2, cy = 110;
  ctx.fillStyle = '#fffdf5';
  rr(cx, cy, cw, ch, 24); ctx.fill();
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 5;
  rr(cx, cy, cw, ch, 24); ctx.stroke();
  // ほし3つ
  for (let i = 0; i < 3; i++) {
    const t = Math.max(0, Math.min(1, (globalT - runEndAt - 500 - i * 250) / 300));
    const sc = 0.3 + 0.7 * (1 - Math.pow(1 - t, 3));
    if (t > 0) {
      ctx.save();
      ctx.translate(W / 2 + (i - 1) * 78, cy + 78);
      ctx.scale(sc, sc); ctx.rotate((1 - t) * 0.8);
      drawStar(0, 0, i === 1 ? 40 : 30, '#ffd166');
      ctx.restore();
    }
  }
  ctx.font = 'bold 44px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#e94f37';
  ctx.fillText('できた！', W / 2, cy + 165);
  // ボタン
  const last = levelIdx >= LEVELS.length - 1;
  winBtns = {
    next: { x: W / 2 + 90, y: cy + 235, r: 42 },
    retry: { x: W / 2 - 90, y: cy + 235, r: 34 },
  };
  circleBtn(winBtns.retry, '#f4845f');
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.arc(winBtns.retry.x, winBtns.retry.y, 12, -0.4 * Math.PI, 1.1 * Math.PI); ctx.stroke();
  ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = '#9c4a26';
  ctx.fillText('もういちど', winBtns.retry.x, winBtns.retry.y + 34 + 14);
  circleBtn(winBtns.next, '#43a047');
  ctx.fillStyle = '#fff';
  if (!last) {
    ctx.beginPath();
    ctx.moveTo(winBtns.next.x - 10, winBtns.next.y - 17); ctx.lineTo(winBtns.next.x + 18, winBtns.next.y); ctx.lineTo(winBtns.next.x - 10, winBtns.next.y + 17);
    ctx.closePath(); ctx.fill();
  } else {
    drawStar(winBtns.next.x, winBtns.next.y, 18, '#fff');
  }
  ctx.font = 'bold 13px sans-serif'; ctx.fillStyle = '#2e7d32';
  ctx.fillText(last ? 'ぜんぶクリア！' : 'つぎへ', winBtns.next.x, winBtns.next.y + 42 + 14);
  ctx.restore();
}

/* ---------- レベルせんたく ---------- */
let selectBtns = [];
function drawSelect() {
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#bde6fb'); g.addColorStop(1, '#fdf6dd');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(255,255,255,.7)';
  const clouds = [[130, 90, 40], [210, 80, 30], [600, 70, 36], [680, 62, 26]];
  for (const [x, y, r] of clouds) {
    const dx = Math.sin(globalT / 4000 + x) * 8;
    ctx.beginPath(); ctx.arc(x + dx, y, r, 0, 7); ctx.arc(x + dx + r, y + 8, r * 0.7, 0, 7); ctx.fill();
  }
  // レイアウト (よこながは れつを ふやし、だんの かずに あわせて たてに おさめる)
  const cols = landscape ? 7 : 5;
  const rows = Math.ceil(LEVELS.length / cols);
  const colGap = landscape ? 132 : 148;
  const half = (cols - 1) / 2;
  const gridTop = landscape ? 132 : 176;
  const rowGap = Math.min(landscape ? 100 : 92, (H - gridTop - 18) / rows);
  const r = Math.max(18, Math.min(landscape ? 30 : 36, rowGap * 0.4));

  // タイトル
  ctx.save();
  ctx.textAlign = 'center';
  const bob = Math.sin(globalT / 500) * 4;
  ctx.font = 'bold ' + (landscape ? 40 : 46) + 'px sans-serif';
  ctx.fillStyle = '#39597a';
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 9; ctx.lineJoin = 'round';
  const titleY = landscape ? 66 : 105;
  ctx.strokeText('ころころスイッチこうぼう', W / 2, titleY + bob);
  ctx.fillText('ころころスイッチこうぼう', W / 2, titleY + bob);
  ctx.font = 'bold ' + (landscape ? 16 : 19) + 'px sans-serif'; ctx.fillStyle = '#7c6a45';
  ctx.fillText('どうぐを おいて ボールを ゴールまで はこぼう！', W / 2, (landscape ? 100 : 148) + bob);
  ctx.restore();
  if (!landscape) drawBall(88 + Math.sin(globalT / 700) * 6, 96 + Math.abs(Math.sin(globalT / 350)) * -14, globalT / 400);

  // レベルボタン
  selectBtns = [];
  const unlocked = unlockedCount();
  for (let i = 0; i < LEVELS.length; i++) {
    const col = i % cols, row = (i / cols) | 0;
    const x = W / 2 + (col - half) * colGap;
    const y = gridTop + row * rowGap;
    const b = { x, y, r, idx: i };
    selectBtns.push(b);
    const open = i < unlocked;
    const done = !!progress.stars[i + 1];
    circleBtn(b, done ? '#ffd166' : open ? '#5b9bd5' : '#c5cdd6');
    if (done) drawStar(x, y - 5, r * 0.42, '#fff');
    ctx.font = 'bold ' + (done ? 13 : Math.round(r * 0.63)) + 'px sans-serif'; ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText(String(i + 1), x, done ? y + r * 0.7 : y + 9);
    if (!open) {
      ctx.fillStyle = '#8b98a5';
      rr(x - 9, y - 6, 18, 15, 3); ctx.fill();
      ctx.strokeStyle = '#8b98a5'; ctx.lineWidth = 3.5;
      ctx.beginPath(); ctx.arc(x, y - 8, 6.5, Math.PI, 2 * Math.PI); ctx.stroke();
    }
    ctx.font = 'bold 11px sans-serif';
    ctx.fillStyle = '#67573a';
    ctx.fillText(LEVELS[i].name, x, y + r + 14);
  }
}

/* =========================================================
   にゅうりょく
   ========================================================= */
function evtPos(e) {
  const r = canvas.getBoundingClientRect();
  return { x: (e.clientX - r.left) / viewScale, y: (e.clientY - r.top) / viewScale };
}
function placedAt(x, y) {
  for (let i = placements.length - 1; i >= 0; i--) {
    const bb = gadgetBBox(placements[i].type, placements[i].x, placements[i].y);
    if (x > bb.x - 8 && x < bb.x + bb.w + 8 && y > bb.y - 8 && y < bb.y + bb.h + 8) return i;
  }
  return -1;
}
let activePointer = null;
canvas.addEventListener('pointerdown', e => {
  if (activePointer !== null) return;
  activePointer = e.pointerId;
  try { canvas.setPointerCapture(e.pointerId); } catch (err) {}
  audio();
  const p = evtPos(e);

  if (scene === 'select') {
    const unlocked = unlockedCount();
    for (const b of selectBtns) {
      if (inBtn(b, p.x, p.y) && b.idx < unlocked) { SND.tap(); loadLevel(b.idx); return; }
    }
    return;
  }
  if (scene === 'win') {
    if (winBtns && inBtn(winBtns.next, p.x, p.y)) {
      SND.tap();
      if (levelIdx < LEVELS.length - 1) loadLevel(levelIdx + 1);
      else { scene = 'select'; stopRun(); }
      return;
    }
    if (winBtns && inBtn(winBtns.retry, p.x, p.y)) { SND.tap(); const i = levelIdx; loadLevel(i); return; }
    return;
  }
  // きょうつうボタン
  if (inBtn(BTN.home, p.x, p.y)) { SND.tap(); scene = 'select'; stopRun(); return; }
  if (inBtn(BTN.reset, p.x, p.y)) {
    SND.back();
    if (scene === 'run') { stopRun(); scene = 'edit'; }
    else { placements = []; }
    return;
  }
  if (scene === 'edit' && inBtn(BTN.hint, p.x, p.y)) {
    SND.hint();
    hintStage = Math.min(hintStage + 1, 3);
    return;
  }
  if (inBtn(BTN.start, p.x, p.y)) {
    if (scene === 'edit') startRun(false);
    return;
  }
  if (scene !== 'edit') return;

  // ゆびで つかんだ どうぐは、ゆびに かくれないよう すこし うえに もちあげて みせる
  const lift = e.pointerType === 'touch' ? 82 : 0;
  // どうぐばこから
  for (const s of toolboxSlots()) {
    if (p.x > s.x && p.x < s.x + s.w && p.y > s.y && p.y < s.y + s.h && remainCount(s.type) > 0) {
      SND.pick();
      drag = { type: s.type, x: p.x, y: p.y - lift - (lift ? 0 : 20), fx: p.x, fy: p.y, lift, flip: false, from: 'box', origIndex: -1, moved: false, downX: p.x, downY: p.y, downT: performance.now() };
      return;
    }
  }
  // おいてあるギミック
  const idx = placedAt(p.x, p.y);
  if (idx >= 0) {
    const g0 = placements[idx];
    SND.pick();
    drag = { type: g0.type, x: p.x, y: p.y - lift, fx: p.x, fy: p.y, lift, flip: g0.flip, from: 'stage', origIndex: idx, orig: Object.assign({}, g0), moved: false, downX: p.x, downY: p.y, downT: performance.now() };
    return;
  }
});
canvas.addEventListener('pointermove', e => {
  if (e.pointerId !== activePointer || !drag) return;
  const p = evtPos(e);
  drag.fx = p.x; drag.fy = p.y;
  drag.x = p.x; drag.y = p.y - drag.lift;
  if (Math.hypot(p.x - drag.downX, p.y - drag.downY) > 10) drag.moved = true;
});
function endDrag(e) {
  if (e.pointerId !== activePointer) return;
  activePointer = null;
  if (!drag) return;
  const d = drag; drag = null;

  // タップ(うごかしてない) → はんてん
  if (d.from === 'stage' && !d.moved && performance.now() - d.downT < 400) {
    const g0 = placements[d.origIndex];
    if (GADGET_DEFS[g0.type].flip) { g0.flip = !g0.flip; SND.flip(); }
    else { SND.tap(); }
    return;
  }
  // どうぐばこへドロップ(ゆびが どうぐ箱の うえ) → もどす
  if (overToolbox(d.fx, d.fy)) {
    if (d.from === 'stage') { placements.splice(d.origIndex, 1); SND.back(); }
    else SND.back();
    return;
  }
  const sx = snap(d.x), sy = snap(Math.min(d.y, STAGE_H));
  if (canPlace(d.type, sx, sy, d.from === 'stage' ? d.origIndex : -1)) {
    if (d.from === 'stage') {
      placements[d.origIndex].x = sx; placements[d.origIndex].y = sy;
    } else {
      placements.push({ type: d.type, x: sx, y: sy, flip: d.flip });
    }
    SND.put();
  } else {
    // おけないばしょ → もとへ (すでにあったものは そのまま)
    SND.back();
  }
}
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', e => { if (e.pointerId === activePointer) { activePointer = null; drag = null; } });

/* =========================================================
   メインループ
   ========================================================= */
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(50, now - lastT);
  lastT = now;
  globalT = now;
  for (const k in springAnims) springAnims[k] += dt;

  if (scene === 'run' || (scene === 'win' && engine)) {
    if (scene === 'run' && !runResult) stepPhysics(dt);
  }
  if (scene === 'select') drawSelect();
  else drawGame(dt);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
